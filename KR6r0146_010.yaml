body:
  text: 外信第十六明佛教於外宗有信有不信者大荒之西天子王畿五百里甸服五百里侯服五百里綏服五百里要服五百里荒服荒服去京師二千五百里今指大荒之外極西之境也申毒殊風即西天之風化與震旦有異也太古之始至聖未生所謂如來也有外道仙為世宗教首則僧伽衛世初時有僧伽外道立二十五諦義衛世外道説六句義等也中則六師一不蘭迦葉二阿夷滿三瞿耶婁四波休旃五先比盧持六尼乾子終於九十五種即蘊離蘊計我等外道也高視巖藪謀勍吾敵將危害正法荐食玄侶侵軼真境伐毀舟梁雖怙其衆不若吾寡是以舍利弗一舉勞度差之儔殄瘁矣彈盡也即勝論外道也以此仙人形醜好夜出乞食故號鵂鶹為五頂子立六句義後化為石為陳那菩薩破之一吼而石粉碎矣故以直擊亂薎有不濟但慢壘既高邪戈難偃稠林嘯聚迷津徒涉俾苦海波瀾浩而無際險道罾繳綿亘不蔇繳射鳥器也罾取魚器也蔇至也修行者不至矣聖人以是為瘼群生以是永悼嘻何莫如之何也已自白馬西來梵文貢洛後漢明帝永平十年攝摩騰與竺法蘭以白馬馱經像方來至洛也信毀迭扇君臣不一時五嶽道士褚善信等求比試焚燒經像也且遐域之壤九服謂之荒表兌方之俗四海目為戎人九服九州兌方西國而彼復謂中華封略為儒邦蔥嶺東陲為邊裔夫人情各重其所處而傲乎他邦而皆曰佛何不生中國震旦人自以此土為中國傳聞中天夏至測影而盡其表西天中印度夏至之日樹竿於日中無影蓋得閻浮之中日行正居上故彼稱中也此方雖邵伯相宅周公往營周本都鄗京召公相宅於陝鄏周公至成周營之則今洛京是也而周禮云大司徒職日至之景尺有五寸洛京雖震旦之心夏至之日午時樹竿尚有一尺五寸之景則別地更多也謂之地中天地之所合四時之所交風雨之所會陰陽之所和百物阜安乃建王國今河南陽城縣得中夏之中而影且有餘矣其不在陽城則又過乎一尺五寸矣而天上千里地下一寸故此西域萬里之外又戎夏為邦古今何定伊洛化則為戎左傳有伊洛之戎又有伐陸渾之戎皆在洛也吳越變而為夏吳越本夷而勾踐夫差皆為中國霸主矣故至聖乘時本不限於方俗但以大千閻浮為內地可此即此可彼即彼豈以文武不在洛則非天下之君乎文王居西戎武王居岐下而西域時無輪王分天下為四主東以人為主正由禮樂出乎此方仁義冠乎八荒舉稱中非必由於地宋何承天問慧嚴曰佛國用何曆嚴曰彼夏至之日方中無影五行尚土德八寸為尺一兩當此方十二兩建辰為歲首慧嚴親至西天回故能明此事也及討核分至春秋分冬夏至薄食宿度阿衡陰陽乃以為然但以西來三藏越海重譯涉歷于艱險輕百死而致乎一生既至而不知鄉國之所在固可悲也其所翻譯方諸寰中之典既乖視聽深違背欲將使積昏之士背風靡草逆坂走丸祇增其忿誠又難也以翻譯三藏來既遐遠不達此方語言致令詞有質朴文非流美如安世高所譯等經不了之士逆便相非增於謗讟則為未可者也夫雍門周承孟嘗騷屑悽感為之鼓琴琴一發而涕泗零落不知其極雍門齊地也孟嘗田文齊公子也周承為之鼓琴琴發而涕不能止而邪愚之夫承王侯疑二阻薄為之鼓脣脣一啓而訕謗搖動莫我已矣此敘輕毀宗教之士因時政之官於吾教疑二之間承便鼓扇于脣齒以毀謗致令王侯心回而信用之也是以假彼重位鴻才言為物準行為時憲佛法付與王臣凡在位官員才學之士假以護持所在三寶尤宜援奉貴其大才重位以弘護宗教矣準繩也憲法也順則誘掖背則擊搏掖提膊也信順之者提臂而引之不信者擊搏而責之也使弱喪知乎所歸食椹懷乎好音黃鶯食桑椹而音美如聞法而敬信也乃佛法金城湯池之固假尊官為外護則佛法若有城池之固而攻者罔弗敗律喪師矣若有外黨相攻無不自然摧敗也夫釋氏之難而釋氏不能違之者何外人問有難釋氏之教而引釋氏之教答之而不能違避其難者有何所以譬陰愆于序赫日晞之陽愆于序洪雨霔之久雨者陰之失序則須晴景方解久旱者陽之失序則須甘雨解之若陰濟于陰湯濟于陽則九載之水七年之旱未足多也堯有九載之水湯有七年之旱故古之賢德無位何威無賞何悅無辨何信其所酬抗多以釋教為證反資其倨答難若專引己教為證如以陰濟陰以陽濟陽也是以夷難靜暴復迷取亂挫公孫龍之辨夷平也取亂取勝也公孫龍趙人也虞鄉思以邯鄲請封平原龍以辨捷諫而止後語云龍有白馬之辨者也絶叔孫氏之毀叔孫武叔毀仲尼子貢曰夫子不可毀他人之賢者丘陵也夫子之賢者日月也不可得而踰也雖有方袍莫如服冕服冕儒士有毀夫子輒能對之豈可方袍釋子遭毀其師而無對答之者可不恥乎必資於學矣方袍袈裟也昔何承天著達性論顏延之折之並宋之朝士顏光祿也有文常好飲酒范縝搆形神滅義沈約質之梁朝賢士也文在弘明集故豺狼非狻猊不制蛇豕非鏌𮢄不斷而經稱為外援展如之人展援也假信心為外授審如此也則不失其名也嗚呼有天地焉有生成焉有信者焉有不信者焉既天地造化則有萬物人倫人倫之內有信者有不信者情不同故也其信如漢顯宗則後漢第二主明帝也傅武仲傅毅也吳大帝孫權也支與闞支謙闞澤東晉至于受終至王濛郗超許詢謝尚之倫宋文明洎宗王何顏輩魏宗恭南齊劉虬梁君臣陶隱居陶景純字隱居號貞白先主北齊顏之推此並深信之士其不信如晉蔡謨字道明東晉也東帝令作讚佛頌堅不從乃言謗佛下庭尉免為庶人偽趙王度宋周朗虞願魏張普濟李瑒楊衒之齊劉晝梁荀濟此實心毀教不信之士也夫信者靜乃一心昭窮萬化或未遺所存要報求施重因緣之理篤敬戒之心退無納隍之酷進致含光之美隍坑也若致於坑也其不信者神用匪虛鄙識濁慮或惡幢塔崇侈法籍宏奧僧居塏塏高淨也法徒尊大攄已之憾攎舒也悖乎楊言駟不及舌陷乎邪黨哀哉然有過乎信者如齊文慧太子竟陵王梁高祖陳文宣二帝魏文成獻文孝文齊高洋北齊也此諸信等皆見弘明集或開演金偈或捐擲寶位或縱民入道或竭國起寺今大宋皇帝造金銀字大藏經數藏雕藏經印板一十三萬餘板嚴飾天下寺舍每年祠部牒度僧八千餘人也太宗初登極度天下係帳童子出家其有過於不信者如拓跋魏武燾宇文周武崔皓後魏傅奕唐初為災孽魃彗焉其有君主議及沙汰者此實潔揚清之美非不信之士也昔桓玄教曰教令也沙門有能申述經誥暢説義理戒禁修整足以宣紀大化其有違於此者悉令罷道遠公與桓公書曰佛教陵遲穢雜日久每一尋至慨憤盈懷常恐運出非意淪湑將及淪湑漸漬也竊見清澄諸道人教實應本心夫涇以渭分則清濁殊勢枉以直正則不仁自遠此命既行則二理斯得然後令飾偽者絶假道之路懷真者無負俗之嫌道俗交通三寶復隆矣古者沙汰總有二意一為崇重教門惡其渝濫故澄汰姦冗務令清淨宋世祖王度顏延之蕭暮之周朗虞願張普惠李瑒衛元嵩顧觀那子才高道讓盧思道唐高祖十四人也二為憎嫉昌顯危身挾怨故須除蕩以暢胸襟魏太武周高祖蔡暮劉晝楊衒之荀濟章仇于陀劉惠琳范縝傅奕王文同十一人實心毀滅也玄教於是不及廬山夫血胎粒食者信不信何二焉但人稟五材正氣者必保乎正性正命賢者稟五行之清氣克昭懋行能明勉勵之行其憑福田故乃信也稟冷氣者必僻恣淫愎愎悷也滅沒天理其假禍亡故不信也若使唐虞元凱夏殷伊傅唐虞堯舜也元凱十六相夏禹殷湯也伊尹傳説也周之十亂亂治也太公周公召公畢公榮公南宮括散宜生太顛閻天文母十人也漢之三傑張良蕭何韓信仰眄金容俯聆玉軸則未嘗不信興五內言動群有彼何然蓋為善惟日不足故也此等雖未偶教興若遇之心大崇信也若使桀紂莊跖陽貨子臧視之瞽如聽之聵如桀夏也紂殷也莊蹻楚蜀惡賊盜跖魯暴賊陽貨季桓子家臣暴虐於魯子臧鄭子臧也瞽聞善不足化也彼何哉然蓋凶人為不善亦惟日不足故也惟生之有涯體非金石樂未備志哀以繼之老聖稱身為大患仲尼嘆交臂若失浮生流速何足貴也而釋教何讎誠心務損不為福始而處禍先真所謂能惡不能善之失也若彼果有雖欲自絶何傷於日月乎若彼教門所説因果實本有汝縱毀之亦何能傷其道子貢曰人雖欲自絶何傷於日月乎若彼果無慕立虛善足以遠害若佛教所説因果之事本無虛求善譽亦足遠害也夫虛去殺猶愈屠釣虛輟財猶愈竊盜虛潔己猶愈濁濫帷箔不修謂不治閨門況孰知其必不虛哉而釋教竊財貨財也食肉貨肉也害人貨要目領也貨賣交易也今切他財當亦還財今食其肉當亦被他食今害人之要日領當却遭害是交易之道也領項也苟使不貨善則實矣誠能不盜不殺等稱自為善其事實也其言既實其人豈虛乎佛圖澄衡嶽思大能遠視多生皆得先觀支林道安能博識強學劉遺民劉虬弓旌不顧皆晉之高士辭榮者也古招士以弓旌也許詢宗炳縷畢歲豈佛法無其實而能使彼建志不拔耶此皆賢明之士情豈謬哉昔武德初大臣不圖邇臣希旨高祖時傅奕以唐出李姓以老子為祖遂譖之令澄汰也以帝系發自玄元文明廣大與天下咸一將害我教蜂蠆且毒貝錦有章貝錦文飾之詞也惟帝時聰明終罔攸蔽罔無也攸所也蔽暗也傅奕等雖扇惑聖聰帝無所暗蔽也彼娼嫉不克彥聖之夫娼貪也嫉蠧也克勝也彥聖法淋道宣等彼傅奕情雖貪蠧終不能勝彼者也庸其德無所膚浸僨僵也用殕其凶德使浸潤之譖膚受之訴不能行焉杲杲愛日將墜復舉靄靄油雲既散又族佛日沈而又明慧雲散而復聚實有唐宗廟社之靈也克保于子孫黎民之福也夫天地邦域以元牧司之天生蒸民樹之司牧以鬼神綏之綏安也神者聰明正直福善禍淫者也苟人君失理則靈神是捨神尼傳宇文氏毀滅佛法神尼見善神皆西去後果國滅也近柴氏毀鎮州銅大悲致惡疾而終也不保于山川山川匪寧則災禍作矣故天反其常地載其妖人懷其亂稼穡病矣山崩川竭星辰失度地動山鳴賊盜競起妖怪作興水旱為沴也粢盛何有焉昔桀紂周幽桀夏癸也寵末嬉紂殷辛也寵姐己周幽寵褒姒皆以美色昏亂朝政而失天下也酒池肉林作奇技淫巧以悅婦人紂有酒池肉林糟山脯丘有炮烙之刑斫朝涉之脛剖賢人之心刳剔孕婦等為虐不及於神祇尚山崩川震星流鬼哭況剪除善道萬靈無依詎得鳴鳳造于郊玉燭為之調太階如砥乎堯時鳳巢阿閣四時和謂之玉燭于時高業沙門慧淨法琳洎宿儒望彥瑤華疊綷綷五色之文也子對反金奏諧響懷之以德強之以義淬礪矛斧傾塞巢穴有門下典儀李師政撰內德通命正邪論三篇舉其所惑詳校黜剝文在古弘明集第十四卷也文而有據最備斯作足以毗贊真門闡楊玄極後世觀者宜杜口塞淵不復疑謗但文沈隱不為凡淺之所知也近代有歸正論及釋教廢興記等亦其事也且忠臣孝子宜徼福防害繳求也以保君親敬恭禱祀精謹藥石何必知其無益而故務也只如秦皇好道漢帝求仙或變金銀抂燒鉛録竟有何成者也揆其無傷而故犯也禮云疑事無質如崔皓率己專斷以貽君親之戚魏武以惡疾而終崔皓戮尸者也安得崔也謂之忠孝乎今有蓬心之士尚欲與崔何其昏也與者許也覆軌之迹孰得二焉若以東漢已前世未有佛家國自寧今宜復其昔者此牒外人難也則義軒已前未有文字天下遂性羲軒前未有文字帝道無為自理也姬孔漸滋人用梏械所以拘手足也殆于瘥札瘥小死也札大死也則今疫癘之疾也秦正坑之亦何罪也秦正始皇也三十四年博士淳于越奏令封子弟為諸侯李斯云諸生不師古而學古非兩世諸非秦記皆燒之諸有藏詩書及百家語悉燒偶語詩書者死若以四夷之人罼弋鮮食罼免網也弋以生絲線繫箭而射鳥夫子弋不射宿也孰為施戒四夷之人以殺戮為耕作何有施戒事也而世襲穹廬者穹廬蕃帳則四夷之民何嘗有姬孔之教行於禮義而君臣父子繼焉是則姬孔亦可廢也東漢已前無佛法東漢已前國自理四夷之國無儒教四夷之國亦自理佛教如可廢則儒教亦可廢也若以平施俾家給人足謂普施賙急也不必在乎齊戒者誠亦驅其人於塗炭矣若不持齊戒而施則以殺盜淫等惠人是也夫慈心惠下宗廟不修不得謂之孝也慈雖及下敬不及祖豈曰孝乎豐物恣惡香火不修不得謂之福也如殺馬祭天等其無孝無福而望人安固如憑攸枿而待蔭者也枿斷樹之餘也殺命求福如依無葉之樹豈有蔭也若以佛無形響復不可奉者則郊祀先王先公孰有見聞而敦其禮乎考祖亦無見聞何故祀之若以鬼神不實先儒但導人為敬者則何患佛教不實而使人為善耶但謗者構惡不盈耳不足以駭聽聽者聞惡不暢心不足以承謗故聽與謗其過均矣而氛囂之世愛則廣其美惡則厚其過夫有虞氏仁孝之宗也汲冢以平陽之變非揖讓而取也汲冢書云舜囚堯於平陽以奪其位非受禪也今見有囚堯城也伊尹人臣之表也汲冢以桐宮反刺乃復夏政也伊尹相太甲太甲不用伊尹之訓伊尹放之桐宮三年俟其改過乃歸復其位以盡仁臣之道今汲冢書云伊尹放太甲于桐宮太甲自竇中潛出殺伊尹而自立與尚書之文全別凡是非徑侹之論何有窮乎故當承堯典殷書乃可經矣仲尼曰攻乎異端斯害也矣穿鑿之家害於正義也夫何不然哉觀乎古今撰製內教文章多先貶周孔而降老莊以為能文者如因明疏序等此啓戶納盜怒敵惎黨之由也惎教也比者怒道兼非儒教則是教道儒結黨為授也夫一寇尚不可玩況結二寇之衝乎使敵果至矣桓桓赳赳以頑徑為干櫓以訾讟為矛槊憤憤悱悱鬱干眥睚眥睚怒也致使愚則囅而抃仁則悶而疾囅笑也抃舞也下愚聞而笑之悶愁恨也仁者見而惡之也將欲鼓而壓之秉羽而來之比欲鼓勢以壓之舉羽以招之皆不可也實難能也夫泄之一熛始蔓草而烶於宮室邪夫之一勃始凡庸而上訕賢聖竈之火能爇宮闈邪夫之謗安懼聖賢哉何無善慎歟無不也何不慎言也古語云行無禮必自及敬人者人必敬己陵人者人亦讎已昔呂布魏曹操下將強袁渙令作書罵劉備渙曰唯德可以辱人不聞以罵彼固君子耶且不恥將軍之言君子之道犯而不校彼誠小人耶復將軍之意則辱在此不在彼矣故鳥窮則啄獸窮則攫居縛反説文云爭持物也人窮則詐馬窮則佚夫能使啄佚之不至者其唯上智哉是以當吾教昭夷之際孰不黨行余侮雖色怡於外而實腸結于內夷傷也侮慢也像教既屬陵夷誰不朋扇侮慢者也儒道之士外雖恭順內結蛆嫉也但果行育德陰搆默化漏彼所短悅彼所長百或其一味我道腴自然回席對彼二教但行恩德舉彼教之所長闕彼教之不足百人之內或偶一人味道餐風自然歸心者也夫適裸國者解裳乃合禹至裸國欣然解衣蓋順其俗也且今人是此方之人儒道是此國之教其俗縱知不加於我亦姑各阿比其門阿比朋黨也姑且也鱗張角捍安得不美而從之婉而優之綏而遷之使悅而後服豈在庸言酬酢耶所謂善戰不陳善閉無關者也若以彼説不至極慮人不驟徙節於吾道者然聖人亦各當機御物如佛與提謂説人天福而大聖豈不欲令人盡至寂滅歟但居其辰不為利矣縱説至教不契其根不利於他也其老聖豈不欲令盡至沖漠歟所著二篇之經道德二篇兼辨治於家國俾濟世者不相抑廢雖序道德不廢治國之法仲尼豈不欲使人盡至皇道歟所修六典兼存霸王將苞舉而無遺也故覆燾莫大於天地變化莫大於聖人而實二教之於我贊而不害也吾之於二教統而有歸也何謂飲醇酎者不競咀糟粕者競焉至人君子殊途同歸澆薄小人是非阿黨但人多不自信己愚而於可誷則欣欣然不知已愚而調所不及者未知丹碧好抑揚藻繪未知鉛墨好毀稱篆隸未知禮樂好升降法度未知宮羽好賞罰音律其有矚余此詞能無訧兮余之參玄私為適已也就責也矚見也恐後人見參玄語録而責於己今我蓋自取適性情而著述之也不敢謂於君子也昭文之琴文如海云古之善琴者也是非兩至寧不鼓乎不以人是非而不鼓之夫蘧大夫五十知四十九年非衛大夫蘧瑗字伯王見耕者問黧牛赤牛何者力大耕夫不答直驅牛遠方答云二牛俱得力答不平恐有怨也蘧瑗云一農夫猶懼二牛之怨我今五十知四十九年之非也孔宣父六十知五十九年非如余瑣焉耄與闔柩而已闔棺蓋也齊君懸賞以待諫慮失於治也齊威王懸賞曰有面諫寡人者受上賞書諫者受中賞謗議於市朝者受下賞也漢相貶爵以杜諫蕭何以苑中之地貸法賈人高皇大怒何遂免冠徒跣以請罪帝乃釋之審其能守也雖取捨不同而各有宜也其有沮余參儒道者沮壞也余顧彼誰或焉夫越俗輕冠以彼多水其俗剪髮文身也齊市賤屨屨履屬齊景公好刖人足晏子宅近市公更之不肯公云近市識貴賤否晏子曰踴貴而屨賤景公於是省刑豈靡已之利而捐君子之華也學以飾身不可以己不益而廢君子飾身之道耶昔孔子馬佚犯野人苗野人擯子貢之詞納圉人之詞子貢言語之士也圉人養馬之士也而野人棄子貢之言不與馬而納圉人之言還之蓋以其類相投故也蓋鄙人不悅賢談久矣孔子曰昔者季孫氏之賜我粟千鍾而交益親南宮敬叔遺我駟乘也而道益行故道雖貴必有時而後重有勢而後行微夫二人之貺則丘之道殆將廢矣夫子初將出魯聘周問禮季氏賜粟千鐘孟氏僖子賜車仍令懿子南官敬叔從師事仲尼及門徒請益者三千昔大聖之將滅顧命列國諸王洎大臣如來將入滅以教法及比丘內護之事付有力王臣也亦如仲尼之道焉西域無貴賤老幼其人叟智彥韋昭云老而有德曰叟智過三百人曰彥皆謂優婆塞壽母令妻皆謂優婆夷此謂近事男近事女也陶神五戒鄰善奉聖居俗目之美也先聖亦託以法教令率力兼道如須達多毗舍佉視王侯之亞矣昔孫權未達教之所由問於闞澤吳大史令也澤對曰臣審知佛是無上法王衆聖所歸教加一切加被也哀含萬象深同巨海不揀細流照並日月不嫌星燭嫌阻也會觸則化遇物斯乘觸對也乘運也若洪鍾之待扣似巨舟而廣運也天上人中自在尊貴縱使天有普覆之功地有普載之力皆是諸佛建立使之然也宋文帝問何尚之羊玄保尚之宋侍中玄保吏部郎中曰朕少來讀經不多比日彌復無暇比近也三世因果未辨措懷而復不敢立異者正以卿輩時秀率所敬信也范泰車騎將軍也及謝靈運皆稱六經典文本在濟俗為政必求性靈真奧豈得不以佛經為指南耶近見顏延之折達性論宗炳難黑白論明佛法汪汪尤為名理並是開獎人意若使率土之賓皆感此化則朕垂拱坐致太平矣夫復何事尚之曰悠悠之徒多不信法以臣庸弊更荷褒拂非敢所當至如前代群英則不負明詔矣中朝已遠西晉也難復盡知渡江已來東晉也王導周顗庾亮王濛謝尚郗超王坦王恭王謐郭文舉謝敷戴逵許詢范汪孫綽張玄殷顗等並東晉賢士也或宰輔之冠蓋或人倫之羽儀或置情天人之際或抗迹煙霞之表並稟志歸依措心崇信其間比對則蘭護開潛深遁崇邃八子皆高僧也皆迹亞黃中咸不測之人也黃中聖人也慧遠法師云釋氏之化無施不可適道固自教源濟俗亦為真要竊尋此説有契理奧何者百家之鄉十人持五戒即十人淳謹千室之邑百人修十善則百人和睦持此風教以遍寰區編戶億千則仁人百萬夫能行一善則去一惡去一惡則息一刑息一刑於家萬刑息於國則陛下之言坐致太平是也故佛圖澄入鄴石虎殺戮減半澠池寶塔放光符健椎鋸用息石虎後趙也符健前秦蒙遜反噬無親虐如豺虎北涼沮渠蒙遜本胡人博覽群書曉天文殺𫨻業自稱涼州牧後入姑臧即位號西河王末節改悟遂成善人在位三十年譯涅槃經法建道人力兼萬夫幾亂河渭面縛甘死以赴師厄此非是內教所被哉時羊玄寶進曰竊恐秦趙論強兵之術孫吳盡吞并之計將無取於此也帝曰此非戰國之具良如鄉言尚之曰夫禮隱逸則戰士怠貴仁德則兵氣衰若以孫吳為心志在吞噬亦無取堯舜之道豈唯佛教而已哉帝悅曰釋門有卿亦猶孔氏之季路所謂惡言不入於耳昔牟子郗嘉賓宗炳朱皓之劉協並會道控儒承經作訓警法王之路獻獲醜之功而彼言行豈由形勸而已哉魏以太延五年始起虐太延五年已卯年北涼初滅佛法也太平真君七年丙戌盡誅滅是歲宋元嘉二十三年也正平二年壬辰春二月帝崩太子晃先卒初帝南征有譖晃淫于內帝怒晃懼乃謀逆帝知之因詐死使人召晃至以鐵籠罩之撻三百後乃殺之吳王立改元曰永平是歲十一月崩魏太武正平二年為常侍宗愛所害景穆太子光立改永平元年宗愛亦害之立景穆子濬號文成帝改元曰興安也文成立改元曰興安復興也再興釋教周以天和四年己丑歲議興廢建德三年甲午大殲滅當陳宣大建六年也周武名雍佛道二教並毀除之宣正元年戊戌帝崩天元嗣立宣帝也諱贇武帝長子稅入市者人一文錢幸洛陽驛馬四百里皇后方駕而行後者罪之自稱天元皇帝咸陽水變為血已亥歲改為大成元年春復興也惟天命弗于常以禹啓夏命以湯啓殷命其將亡也以桀紂滅之禹姒姓名文命湯子姓名天乙桀禹十七代孫紂湯三十代孫惟至道弗于常以漢魏始之以晉宋弘之其將亡也以二武滅之天意以萬物不一外事豈必福者能興禍者能滅不興安廢不廢孰興乎昔玄高縊于郊南弟子經夕乃至興而告曰大法應化隨緣盛衰盛衰在迹理恆湛然但念汝等不久復當如我汝等死後法當復興也玄高道人以太子晃之師故死於平陽光至于寺弟子方知乃請尸尸至寺復起告弟子後大法果滅也魏興安初文宣皇帝甲午年也高宗詔曰夫為帝王者必祇奉明靈顯彰仁道其能惠著生民利濟群品者雖往猶序其風烈是以春秋嘉宗盟之禮祭典載功施之族禮云功施於民者祀之勞及於民者祀之能御大難者祀之等是況釋教如來功濟大千慧流塵境尋生死者歎其達觀覽文義者貴其妙門助政化之禁律益仁智之善性排撥群邪開演正覺故前代已來莫不崇尚亦我國家常所尊事之也世祖太武皇帝開廣邊荒德澤遐被沙門道士善行純誠如慧始之倫慧始足白於面時號白足阿練若魏大武沙除釋教令構得僧首者賞金始立國門來者與其頭官中賞給不暇由是而止無遠不至風義相感往往如林夫山海之深怪物多有姦淫之儔得容假託講寺之中致有凶黨是以先朝因其瑕釁戮其有罪有司失旨一切禁斷景穆皇帝每為慨然文宣帝父尊為景穆值軍國多事未遑修復以朕纘承鴻緒君臨萬邦思述先志以隆斯道今制諸州城郡縣衆居之所各聽建浮圖一軀任其財用不制期限其有好樂道法欲為沙門不問長幼出於良家性行篤素鄉里所明者聽出家大州五十人小州三十人足以化惡就善播揚道教者也已上後魏文宣皇帝再興詔周初滅法尋立通道觀選釋李門人有名當世者一百二十人著衣冠笏履號通道觀學士衛元嵩奏置也而普曠剃髮留鬚高僧也帝乃笑之大成元年春正月天元詔曰宣帝弘建玄風三寶尊重特宜修敬法化弘廣理可歸崇其舊沙門中德行清高者七人在正武殿西安置行道二月改為大象元年敕曰佛法弘大千古共崇豈有沈隱捨而不行自今已後王公已下并及黎庶並宜修事知朕意焉爰於二京各立一寺其餘州郡猶未通許四月八日詔佛教興來多歷年代論其至理實自難明但以世漸澆浮不依佛法致使清淨之法變成濁穢高祖武皇帝廢而不立正為如此朕今情存至道思弘善法方揀擇練行恭循此理令形服不改德行仍存敬設道場欲行善法王公已下並宜知悉至二十日詔選耆舊沙門懿德貞潔學業沖博一百二十人勿剪髮毀形於陟岵寺為國行道所資公給沙門任道林歷高祖天元二世諫奏有儀帝懿乃辨屢回天眷大法紹復斯人有力矣周武律德二年廢二教即陳宣帝大建五年也北齊後主武平四年也後梁明帝大定十二年癸巳之歲矣隋文潛龍時有神尼智仙言曰佛法將滅一切神明今已西去兒當為普天慈父即隋文帝重興佛法一切神明還來至此靜帝沖幼以隋公輔政欲令沙門復舊未之能也洎革周命周靜帝諱衍宣帝長子即位改元大定以隋公楊堅為丞相復佛道二教在位一年遜于隋居別宮奉為介國公食邑萬戶一切依周制開皇元年崩年九歲乃令剃落如曇延靈裕慧遠等皆不失其人也國初高祖問群臣曰傅奕每云佛教無用朕欲從其所議卿等何如魏公裴寂進曰臣聞齊桓公與管仲鮑叔寧戚等飲酒而適桓公謂鮑叔曰為寡人祝之鮑叔奉酒而祝曰願吾君無忘出於莒齊公孫無知亂小白奔莒齊人殺無知後鮑叔輔小白入立是為桓公也願管仲無忘縛於魯齊亂管仲與子糾奔魯國人納之值小白先入遂戰魯敗乃殺子糾而生縛管仲至鮑叔解之於境也願寧戚無忘於飯牛寧戚使車飯於牛下見桓公扣角而歌桓公乃用之桓公避席而謝寡人與二三大夫曾無忘夫子之言則齊社不廢矣此言常思舊也陛下昔創義師志憑三寶云安九五誓啓玄門今陛下六合歸仁富有四海欲納奕之狂簡傅奕也而毀廢佛僧此則虧陛下之往信彰陛下之今過元元失望元元黎遮也理不可也是知文武之賢固天攸縱匪惟社之臣實亦法王之臣既作衛于王室亦屏藩於聖教也若夫長民者行著一鄉智效一官樹風聲之德表為蚩氓之效仰彼氓也何有知焉舉直錯諸枉彼民之謂直也舉枉錯諸直彼氓而謂之直也本無特鑒委化上流者安得不審其動也慎其詞也昭其信也禮云堯舜率天下以仁而民從之桀紂率天下以暴虐而民從之又曰下之事上也不從其所令而從其所化上好是物下必有甚者矣今庶口喋喋音牒侫語也病乎不信余心晦晦兼慍乎信何哉夫信有三者焉有智有愚有黨智則擇物人悅其鑒如舜舉皋陶湯舉伊尹仁者至不仁者遠矣愚與黨傷蠧哉愚不辨於牛馬於其所信如休猴而冠之昔項羽屠咸陽焚燒宮闕三月火不滅而歸下邳秦之君子有言曰項籍之作猶沐猴而冠焉慕像龍而懼其真龍葉公食菜於葉姓沈名諸梁字子高好龍畫之門戶屏屋天為見真龍見之驚悸而卒也以狂且為子都子都有貌之美者也狂童也且語辭也詩云不見子都乃見狂且是也此詩剌鄭不賢之謂者也以大天為羅漢大天土火羅國僧造五逆者無憂供之以為羅漢小人之幸君子之不幸不應用而獲用謂之幸應用而不獲用謂之不幸黨則失賢與惡故君子不黨保姦害善悖亂無法使服箱之馬而見忌角於凶犢車旁之馬而隱遁者患山林之不深矣彼二者真若率信不得信之樞也北山野人瞰余之斐詞謂所居之者曰夫為道德乎經外有六典百氏足以遊神娛目端思默聽今乃鑽研簡牘也也輕役精魂規規皇皇其殆也已自有內外典籍何須更區區撰此余赧而失據徐思而對曰夫坳塘不足以隘於江湖而不孕於雚葦不可以隘小之故便不生於雚葦培塿不足以下於衡霍而不載於枳棘衡霍南嶽也培塿堆阜也枳棘刺也萬物今古各有分也昔楊雄見知於君山楊雄字子雲好古嘗著擬周易草太玄經十卷張平子見之曰只可蓋於醬瓿及桓談見之曰可以偕聖也後鬱林大守陸績注之也左沖得譽於皇甫左思字太沖閉戶十年著三都賦門戶井溷皆有紙筆得輒書之賦成皇甫謐見而譽之都下謂之紙貴愚智否臧亦何有定在乎遇不遇憫余奚何也憫惻念也尋繹往修遠慕前識慕子雲太沖也託彼庶幾善道刻鳳成雞猶利其半既非吾徒終日飽食則高天厚曾何腆乎人若不學則終日飽食無所用心焉知高天厚地哉腆厚顏也亦不以無知為愧也局踖哉身心悚然貌也後序稟學賜紫贊述草玄亭沙門諱慧寶字光用俗姓王氏東玄武縣人也其先世習儒素或陳力就列或高尚其事炳耀譜弗具詳大師丱歲出家弱冠受戒遊刃學海以傳演為雅論嘗升座隱機謂左右曰吾歷觀僧史高研精究內外然後能垂世立教出類拔萃翮隻輪任重致遠未之前聞乃於講習外博覽群深於大易春秋窮極天人明白褒貶當世名賢皆服膺請業造其門者咸曰登於龍門纂三國簡要志十卷原始要終削陳壽之繁冗也撰錦鳳囊十卷隱括聖賢奇言善行無遺逸也經摘題十卷裁章鉤深索隱史家之流也五味子三語論也玉溪新稿四十卷歌行要堅深心要定念須慈忍量須寬明曆丙子仲秋望日重裝墨林項元汴持誦北山録後序殿中丞致仕丘濬撰唐憲宗即位元年建號元和于時文章彬郁類麟鸞虬虎蘭桂珠貝騰精露芒溢區宇間若韓退之柳子厚元微之白居易劉禹錫李觀悉以才刃勍造化譬孫吳起翦當戰國際爭武勇權術之勝也河南丘濬嘗閲史傳及其遺編必慨然興感恨不得追其肩踵焉今年春正月被黜歸歙遘疾寓武林鄰淨住律剎一日僧惟賢贄謁于陋止始見之溫儼清邃疑有所蘊而來也俄與之語則志氣頴鋭將欲脫去境照漠然無礙學書易風雅春秋尤確況本教乎忽袖中出緗表五編且曰此東蜀紹竺乾弟子神清撰述也目之為北山録首之以艾儒終之以外信凡十六篇祕蓄三紀恐失傳布鍾蔽善之罰曩慕君子公於其道不諛於世態者異托其可否爾濬遂受之是夕弗就枕燭以閲之終三鼓考其大概以立空寂為本欲天下派歸于巨壑也會老子孔子經術莊列荀孟管晏楊墨班馬之説馳騖其間約萬岐而趨一正峙之則如山渟之則如淵變之則風霆平之則權衡其恢宏辨博如是之甚矣嗟夫元和丙戌迄聖宋熙寧元年戊申二百六十三歲而昔之大儒蔑一句稱謂以褒賁乎神清何也蓋專其所守不敢以徑隧生疵詬非嫉其才能而然濬生太平世老尚廢棄乏智略以佐天子無利惠以濟生人但修鍊以固其身禪定以同其塵故魯論云我則異於是無可無不可在乎今日也是以嘉賢師行業勤整能拔古人湮鬱於異代罔剽取以飾已後之衣縫掖輩孰不靦顏於鄒魯之門哉冬十二月丁酉序于卷末
