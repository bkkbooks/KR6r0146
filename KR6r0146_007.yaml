body:
  text: 諸定舉之地大震動帶猶著地佛云舍利禪定日連尚不識其名也富樓那聞智慧居弟子上而以說法知也富樓那彌多羅尼子也此云滿慈子從母彰名滿慈母姓名也大迦葉為法冢嗣而獨譽頭陀飲光迦葉男也王舍城人弃榮貴乞食自資修頭陀行舍利目連為阿毗曇而迦旃延專論義之號也阿毗曇此云無對法郎論藏也目連舍利俱造此論而迦旃延稱論議第一亦云迦多演此云翦剃種上古有仙山中既久髮長無人剃婆羅門法污人不剃髮有一仙為剃髮諸仙願護得道爾來號剃髮種尊者即其後也此大聖之弘旨非餘之所不兼焉以專美者見稱然於其間或勸或沮皆有為而言之矣故劫賓那獨窮曆象劫賓那此云房宿蓋因感之而生故曉曆象首籠那逈然精進則億耳比丘也生平已來足不履地出家後日夜行道足下血流佛為說彈琴喻須令急慢得所因證果也至於五百若以一行求之則無不居甲而非乙也其若孔門三千升堂入室者七十二人舉以四科十哲雖曾參不標德行而見稱孝悌德行政事文學言語四科也顏回閔損冉雍言偃卜商冉耕仲由冉有宰我子貢為十哲曾參不預左氏不登文學而騰翰國史不預十哲而著左傳左丘明亦孔子弟子禮經三百威儀三千唯公西赤之卓立公西赤字子華有容儀孔子云束帶立於朝可使與賓客言也故二宗風教玄符於抑揚也昔者讚大迦葉即曰同一解脫譏舍利弗即曰所不能知法華經假使諸比丘充滿十方界皆如舍利弗亦所不能知十方剎土靡不清淨獨讚無量壽國諸尊大士普蘊慈悲但顯觀自在力雪山大士睹相知終佛在俱尸入滅大迦葉住在雪山見地大動又覩光明知此必是如來終也遂來赴會所假名菩薩聞說常住蓋非所益而不善其事非可久而不宣其教假名初發心也聞佛說久住世間無益涅槃云後三月當入涅槃遂生悲泣法華經云若佛久住於世薄德之人不種善根也其傳法之人所未得者難在此矣夫執文以定義義歸壅也賾義以乖文文將害也離文穿鑿為害文也或學博而理不能精或心知而口不能辨此二者誠則有焉蓋無求備於一人也然所說經皆稱第一固有旨矣夫俞扁之於患者史記俞附扁鵲皆古之良醫陰慘焉桂椒之良也陰慘冷桂椒熱故為良陽躁焉氷雪之良也陽躁熱氷冷故為良而法大醫王慜有區之庶類佛為大醫王以般若破名相以法華會三乘以金光致哀懺各有所的而不居其次也金剛經以破相稱最上第一法華經以會羊鹿中小三乘歸大白牛之車為第一金光明經據信相菩薩懺悔一切罪障第一也而經言國君失道玉燭不調四時和謂之玉燭風雨不時疾疫是興者蓋警誡之辭耳如仁王經金光明經等警動也誡約也夫王者以風化于下其風若昏人變於惡德薄禍重安得大康故殲其人罔與守邦則祿位之亡如岻之頽殲殄也罔無也岻山名君若無道天降殃禍殄其賢良忠臣國壞如山之頺斯大聖婉而成章矣然於教中亦有言似而意非者如燕居三月敕一切不得見唯除一供養人佛之安間而處先敕不許雜人相見有和先比丘與六十頭陀行者不受請常乞食止山上著斃衣樹下坐日一食唯三衣恆坐不臥視死人不食肉如比皆頭陀行直入見佛佛覺少欲而稱嘆之其非少欲者乃悟是燕坐也由吾曹也相率如和先乃得見佛也和先因少欲見佛多欲者乃相率而少欲昔說九部經美化城之居居而無實會至寶所佛說中小之教謂之權設如人欲至寶所中路心退導師乃於中化作一滅權言寶所候憩息方言是權引之更進寶所九部小乘教於言如同其意常不同也有言乖而旨和如教誡經比丘不袒大聖貽其責也城喻經既袒不通肩又責之也袒謂露膊通肩兩膊俱覆且非袒也鶖子以正言似反取捨未諭未知可執佛言行供養袒也作福田不應袒也所貴善時非堅白之可離取捨適時進退從權非如磨而不磷方日堅乎涅而不淄方日白乎嘗告頻婆娑羅王曰勿縱惡比丘令僧田蕪穢其罪甚於剜大千眼王舍城主有時以破戒比丘如萎薝蔔王官素服勿得刑罰遺教經云薝蔔花雖萎猶勝諸餘花破戒諸比丘猶勝諸外道又云我諸比丘若犯王法或殺或打若剝袈裟逼令還俗若驅出國如生剝三百頭牛其罪尚輕蓋由仁王過仁使愚者恣慝慝惡也惡王過惡使人枉濫慮失其中設兩經以防損也戒經始命展轉相諫終命但自觀身戒經僧殘有三諫之文七佛戒又云但自觀身行莫觀作不作蓋為直己而不能直人者制使胥諫也伐善而好訟過者制令退省諸已也有事隱而言實如憍梵波提墮數粒粟而五百世為牛彼當更有牛業而但彰乎一事也即牛呞比丘過去世摘一莖禾墮數粒粟五百世作牛蹄牛口佛恐世人譏之遂令長居三十三天阿那律施一食而九十一劫受人天樂此云無滅天眼第一彼以善緣相資成於多劫然由肇自一食隱末而稱本也如世稱富者食一金錢彼始以一金錢而後成於富者也夫同躋十號何則強劣而稱拜者益有豐寡耶同以十號成佛稱禮於有見獲益不同也蓋舉一時一行而示乎不一之緣也若西方偏於接引藥師偏於救患等有理非而言過如飲酒捉寶定非沙門戒經所禁記提婆達一劫入地獄提婆達造五逆入地獄一劫重心害蟻罪重殺人如特起上品瞋心害蟻重於誤意殺人雖於事則微而緣情則極皆聖人至責之詞也故經云我說須陀洹人得成佛汝不解我意據回心修行說我說不成佛汝亦不解我意也據定性灰身未回心者說夫皇聖照機卷舒無必必專必也有以教起從人故前說人天後以諦緣而損之也人天謂五戒十善等諦謂四諦也緣謂十二緣生也前說諦緣後以一乘而損之也令捨羊鹿趣大白牛損至無損乃歸曰大道有以教不從人如華嚴前會小聖在席視聽之所昧塞也初八會雖小聖在席而不見不聞蓋非其境至第九會方見聞也有以人不從教如初轉法輪十二億衆發無上道意佛初成道謂提謂長者說法有十二億衆得無生法忍攝末歸本無量人天得法眼淨夫如是不鉤深不達矣昔仲尼修春秋陳褒貶而游夏之徒莫敢措以一詞豈不以智不及乎至若問仁問政聞斯行諸所問是一所告不同如論語雖萬流俱潤而不滓其源也故曰信近於義言可復也有義不必信可審覆之也昔大菽氏目乾連也上古有仙居山寂處常採菉豆而食因以為姓曰採菽氏尊者之母是其族也記七日後雨記七日當雨而不雨則目連觀不細也牸牛白犢終用克爽又記婆羅門家牸牛生犢額白而尾白此皆目連之粗心也五百無學同以天眼討論天地皆二三其說蓋分理事亦或乖也夫十二分教如晝夜有時寒暑有月醫藥味分闕則寡力多則無要已上皆不可闕法亦如是婆沙謂如三周偱曆四聖諦數若論之不極也三周數四諦謂減緣減行觀也夫大乘我不障小果彼犢子衆上古有仙染牸而生故謂犢子部或執之而人皆謂隨眠性我吾弗信也故天親造對法論所宗有二蓋不以一宗為盡善之門矣天親本在有部宗出家說義多宗經部也法勝造毗曇心論云若生諸煩惱是聖說有漏達磨多羅謂其生字濫於滅道乃別製雜毗曇心論云若增諸煩惱是聖說有漏也無著造般若論天親二之無著菩薩造金剛般若論天親菩薩亦造故云二也以伯仲以師資以行位天親俱弗先也無著天親師子覺三兄弟也北天竺留婁沙富羅國人此云丈夫土是天帝戰修羅處也俱在薩婆多出家無著先悟大乘往兜率宮請彌勒說瑜伽後勸天親令悟大乘也所不然者止以無著智障未除而撾不及於馬腹尺有短於寸者也智障所知障也左傳云雖鞭之長不及馬腹也喻無著雖造論猶有所不到清辨與諸徒誓於修羅窟俟龍華成道方擬問津焉謂今彌勒未是遍知也清辨菩薩以芥子擊修羅窟隱候彌勒佛下生將問不決之事今彌勒菩薩未是至聖者也後德光假龍軍而得見所不致拜又索之以形儀焉得至兜率見彌勒不禮以其作天人相也先是中土未有泥洹常住之說但言壽命長遠而已遠公歎曰佛是至極至極則無變無變之理豈有窮耶遂著法性論廬山遠也羅什見曰邊國人未有經便暗與理合豈不妙哉竺道生講泥洹經謂一闡提人皆得成佛舊學以為邪說擯之投于虎丘尋往廬山洎大本經至果與玄契泥洹經說有一類闡提無種性終不成佛及涅槃後分經至一切衆生皆得成佛果符生公之義也生乃登法座論義數番麈尾紛然而墜隱機順化生昔不死有待故也大本經未至生故待之今既至乃卒時人號之忍死生也生今之死待竟故也向無生公落詮之知則昭昭佛性隱於無知之輩矣國初玄奘至西域以花請觀自在像曰若一切衆生實有佛性惟所散花挂菩薩頸乃輒如其願今謂若使奘有生公之知則不應有是祝也儻祝之不吉將不信乎夫卜者決猶預定嫌疑不疑何卜易云中心疑者其詞枝奘非其枝乎校散也奘公不合有疑散之道若為物而然者蓋是導物為疑乃擕人之心矣奘本不疑恐後人疑故示此以導之也擕離散也內墮散後來之疑心也曇延撰涅槃疏慮匪叶于聖衷置疏於舍利塔前焚香請徵驗其疏與舍利放光通三晝夜聯照不絶而淨影之徒未之允也長已所製終於並驅夫望舒既御不假載燧望舒月光也月光既出行者不假執炬翳號既族寧期私灑翳號雲雷也雲雷既布甘澤普滋也而闔戶之家華釭特舉月影雖流蘭釭尚照營圃之叟綆自溉藝蔬不可不灌良以遐光不燭隩驟雨不滋本各惟所利為美故也議者以遠則文句愜當延則標舉宏贍學者彈其美該善而求諸不以感靈得延而廢遠也彈𠜨也北遠與曇延俱著涅槃經疏延則文詞博贍遠則言旨簡當後多傳遠疏不以延疏有放光之靈故也故古云雖有挈瓶之智而守不假器杜預云挈瓶小智也雖小智所守不可假人也其在法義匠焉今有行事皆尚中天為美梵語皆以新經為正詳夫五天諸國王制各異況年世今古風俗治亂原夫大聖隨其至邦因事演教豈得同其律度一彼量衡量斗也衡稱也故由旬俱盧舍遠近殊說八俱盧舍為一由旬或云十六里或四十里遠近不同也安居置閏延促多類安居有七前安居四月十六日中安居十七至五月十五日後安居五月十六日分四心念對首忘成及界及界有四一足及界二足及界一足及藍二足及藍并前為七也於五衆比丘比丘尼式叉沙彌沙彌尼前安居五七三十五後亦三十五成七十中安居只有心念對首二二五十也共成八十安居心念謂獨住無人作法也對首如常忘成偶忘至十七日欲明方記亦成安居中安居一月故無此也及界等謂從外來未明至寺一足入亦得也而往者未應遍覩來者何無寡知奈何欲以中天一世定聖人萬方千古之教歟經曰若人生百歲不解生滅法不如生一日而得解了之時有比丘承師誤訓誦云若人生百歲不識水老鶴不如生一日而得覩見之阿難聞而歔欷往正彼師竟不令改黨之由矣夫師者莫大於佛後之學者各師其師不承佛為師故有採相似之言逗未濟之俗祛經像傳自性曰吾宗教焉若言句之士也其釋說之家皆檢以疏論發詞斷理曾不用經通練其事曰吾受之於吾師也謂講說之家夫師者可因之學非守其所學發明在師變通由已章疏可用之為筌非可守其筌筌取魚器罤取免器以滯學封文有至於者不以文害意夫陪臣忠於諸侯而不信於天子則王化斁矣家老忠於大夫而不信於諸侯則公室危矣其由捨經文而執章疏也故黨者害上也而彼非仁知其黨也但嚴愛保乎其間利譽存乎其中損黨則所得不在已矣昔調達五邪陷於熾火調達以五逆入于地獄也西域猶有行其教者豈非海上有酷齃腋下惡氣今謂之鴉臭猶不獨處誠有慕類者焉人各有黨也夫君子祇祇庸庸祇敬也庸用也小人讎善固黨甚矣嫉善朋惡之道也相夫今世皆隱其不能而詐其能惡勝已而好不及已夫逞於不及已者若誇玄黃於瞽玩宮徵於聾徒爾為也若以離婁視師曠聽離婁百步視秋毫師曠聞聲知興廢則彼有所詳吾得盡矣故其高議奇談必若鑿暗開牖會有所見至若褒貶不佞崇替克顯崇重替廢也褒貶不徇於世可謂君子也舉世然之或謂之不然舉世不然之或謂之然衆惡之必察焉衆好之必察焉如衛靈公昏慝也仲尼以為賢君任智授能不亡社稷也昏暗慝惡也靈公雖無道而不亡者王孫賈治軍旅祝䰿治宗廟仲叔圉治賓客故也以其用人夫子稱之臧文仲淵慧也仲尼以為不賢不仁不智兩至乎三也臧文仲有三不仁下展禽縱逆祀妾織蒲三不智廢六關祀爰鶋作虛器管氏九合為功降為小器輔桓公不至王道而以霸術故小之也子貢為魯君墮玉黜為不幸魯定公十五年邾隱公來朝執玉高其容仰定公受王畢其容俯子貢曰以禮觀之此二君皆有死亡焉此年定公薨魯哀七年邾子出奔皆如其言是以口為詞圃心為智府園不德之䉉稜䉉方也稜角也有智者能圓之發沈善之輝華方可謂之人倫鞶鑑矣鞶鑑鏡也今者一夫謬非和者萬計一夫猥譽和者亦萬計隨流逐塊者衆也唯唯然都不知所以善惡也其有鄙爭好勝之門自不隱括其愚馳突擊搏以所習為矛楯以同侶為勍敵若旝投于石旝者以木引石用擊敵人若今之𣚃橰所謂拋是也以為能掩敵疆場音易邊界之地莫有攸忌於所不與者則奔嚙踶踏而可畏也朋黨宗徒互生毀滅所謂惡之欲其死也夫弘藝者不必誡精識者難為合弘則時不為要精乃人惡其察有高人之行者故見誹於世有獨知之慮者必見傲於人但不可以其然而不為之然也今翾爾學徒翾小飛之類於疏論禪法皆劣他優已以已所未聞謂人之未聞以己所未知謂人之未知曾不參較衆匠決其所專是以微善所習而愚所不習顧其器則滿無以加也籠羅於鄙俚之徒鼓扇向庸愚之內夫夢者覺乃知是夢迷者悟乃知是迷向使正處迷夢之間人謂迷夢者彼必詬咤矣詬咤怒罵也觀乎往所製撰者鮮有正於名理如續高僧傳云鸚鵡死云滅度道法徂世稱定中坐化一切定心無有死生什公誄言薨天子日崩如天地崩壞也諸侯曰薨如山摧之聲也今或以什公比諸侯也玄奘大捨懺謂之捨墮墮罪名也謂三十尼薩耆也如畜長衣十日應兩人對手假捨謂之捨若過十日不捨則結尼薩耆罪謂之墮故日捨墮今捨財懺罪但可云捨懺也蓋流俗淺誤不忌之談也仲尼云君子於其言無所苟而已矣苟且也故衛君待子而為政子曰必也正名乎衛靈公召夫子子路問夫子若至衛將何先行子云先正百物之名名不正則言不順言不順則事不成靈幹講華嚴經作華藏觀臨終天樂來迎幹辭不欲往俄見大水瀰漫坐蓮華中彼傳者若不達夫天宮亦在乎華藏也說者意云靈幹不欲生天要生諸佛土則不達華藏包含法界豈無諸天乎蓋傳者謬也曇榮有僧行道見光中七佛告云是賢劫普明佛今以百劫修相好真化求之如實未得矣十地滿心金剛定後方百劫修相好千劫學佛威儀萬劫學化行等若是真身豈容凡見若是化身安能修相好也夫事不足紀言不為典何煩簡牘耶事非稽古何足編傳是以大辨無言言則導意意必有歸故洞微而語要盡詞而旨密於其誣則不書如續傳序法進作水觀家人取柴見繩床上有好清水拾二石子安之進暮還覺背痛等此乃謬之甚也且作觀是獨影墳唯假想若令別人見則屬性境此乃宣公孟浪之談也振世必紀是謂彛准於儒老亦然哉若乃評今古諦否臧不可以尊嚴稱不可以卑辱廢不可以親厚黨不可以嫌隟頗夫為史筆一曰才二曰學三曰斷自非董孤南史之流莫當此任也彼魯之三桓季孫仲孫叔孫皆魯桓公之後識豈齊於顏閔漢之七貴金張之族七代貴盛也左思云金張籍舊業七葉珥漢貂才豈出於揚馬揚雄字子雲著大玄經法言方言等司馬相如字長卿著封禪文文賦等有子視桐棺四寸知死不欲速朽卜商引詩人興詠發起豫之嘆子曰起豫者商也自金言遐萃綴述多門廣本略本名義不同單譯重譯有無差異藏經有一譯謂之單二三已上謂之重譯也故大聖俾依義不依語此先見之著也佛有八音四辨八音一清淨音二柔軟音三和適音四諦了音五不女音六不誤音七深遠音八不竭音四辨者一法無礙辨二詞無礙辨三義無礙辨四總持無礙辨超乎群有睿心冲照靈誥真雅而譯者率情淺易章句漏慢致使搢紳縫掖搢扱笏也紳大帶也縫掖大袖儒服也相顧意有所非也以其詞非典雅如安世高其間則有採托墳素雕琢文字語過涉俗如竺法護支謙等所譯經文全如著述之體理乖精密尤失聖人之格言也難乎哉古今宣譯咸推什公門下質文繁簡雅得其所開卷屬耳泠然古風嘗致意於譯者為就梵本為就刊削乎如法華法師品羅什不載其首普門品闍那續出其末此妙法華經文少正法華與添品文具足也其間亦有誤為文者如真諦翻俱舍云見法有非得玄奘出婆沙加一十六字大毗婆沙只於真諦三藏所譯俱舍上加其文一十六字也是知不刊之言彼所未契也道安以三不易五過失詳評翻譯妙盡樞細蓋以梵文難曉聖意深遠詞旨雅當是為不易也不善聖旨章句漏失言詞蕪穢是為過也後世不能研究其旨寶為衡度以為詞不由中瞪若不聞也瞪直視貌也以古譯經文不潤遂不能討究矒然無所悟解也如安世高所譯者也且儒為此方之教自科斗為二篆古有科斗書後有大篆小篆也周宣王太史史籀造大篆秦李斯等造小篆程邈造隸書等也篆變為隸又經秦滅文或舛闕始皇三十三年因諸生各論秦事丞相李斯奏乃焚書坑儒滅先代典籍三皇五帝取捨異說或云三皇謂天皇地皇人皇或云伏犧神農黃帝五帝少昊顓頊帝嚳堯舜也魯論齊論篇次何定魯論二十篇齊論二十二篇其間又次第不同也禮記之與春秋哀公誄孔丘增減孰是孔丘卒魯哀公誄之禮傳其文互差也家語之與檀弓仲尼授琴侃侃切切其文豈同既祥而琴禮記家語其文不同也故孟莊所領亡言取意孟軻字子輿著書十四篇莊周著書十卷皆是寓言立意不可執文質義也馬鄭所注文字互改馬融字季長北海人鄭玄字康成亦北海人並注詩禮論語皆有不同也況五天異語諸部宗乖有六宗一十部不同又大小乘空性各別也屢遭無道周魏毀滅涇渭難別譯梵為漢其可一乎夫以𮞺擊鍾𮅚小竹也不盡其響以管窺天不達其畔以凡達聖曷昭其奧然不得不就𮞺之力聽其和偱管之涯察其畔竭凡之慮精其理而傳法之士惡紕繆之所以深者蓋以諒至道不篤之人也覩文籍之浩博見諸本之異同怯而不究者此學者之弊也彼以瑤軸緄縢緄帶也縢緘也所謂擊經者也出自金口為文定矣玩𤧫琢者為其經典過貶討論者為世智辨聰此乃傳心之士以講解者為耽味經典之過討論者有世智辨聰之患也仲尼曰君子以其所不能畏人以自不能而敬能者小人以其所不能不信人自既無能而又不重人之所解故君子長人之才小人抑人取勝而世有隱瑕匿疣飾智籠鄙盜玄匠之虛譽祕昏情以自誷本非蘊識便稱師匠情多罔冒每畏徵研也特不知渴極則飲多疑深則悟遠彼僣夫也所謂僣易之夫也或曰抉前賢之點則物無疵於教乎以直詮真理於物不滯以此斥前賢也日不然也神農辨百草非欲進人於毒藥歧伯議針石非謂敗人於五藏也佛說經非欲墜人也豈南華姬孔則家家無六典莊周非於周公孔子六經豈不行哉班書評馬史則家家無史記乎班固漢書非馬遷史記昔天親造俱舍衆賢撰雹而非之天親改題為順正理二論俱弘使夫來者核直祛蒙辨精麁而取捨也天親菩薩造俱舍論衆賢論師造俱舍雹以摧之如雨雹摧苗也往攻天親天親皆避之乃寄呈所造論天親覽之並順已義因改為順正理論也報應驗第十二明善惡之業報應不昧也為善天降之百祥輔德也皇天無親惟德是輔為不善天降之百殃糾淫也淫過也天者福善禍淫故順理焉異類生愛而況聖賢乎如龍神欽伏等逆理焉至親交兵而況於鬼神乎莊子云為不善於顯明之中人得而誅之為不善於幽暗之中鬼得而誅之詩云下民之𭒯匪降自天言由己也禍本無門惟人自召仲尼謂哀公曰存亡禍福在己而已矣周頌曰畏天之威于時保之西域阿育王孫弗沙蜜多下庭議曰吾如何垂名於不朽群臣曰當如先王建八萬四千塔不然反之名雖好惡俱不朽也王曰我無威德以紹先王當建後議遂乃侮皇祖之訓斁彛倫之紀彛常倫理也帝王日用常行之理也焚法垢音備塔虔劉釋衆䖍劉殺也天愁人怨靡奈其酷雖有聖賢不能違之登彼南山自求免害息心之侶血流成川殘殺道人梟首務賞府無虛日征賦由之竭矣購有獲僧首級者賞之也王益其怒更施殲虐率師至佛牙塔死於頽山之下漢桓靈世範金為佛像遭國亂流墜荒瘞吳孫皓使衛兵治禁園其有得者令置溷所四月八日溺其頭小便也曰為爾灌頂君臣相與笑樂俄爾遍體隆腫隱處尤痛毒痡五內哀聲外揚使卜覡咸以坐犯大神皓乃遍走群望有加而無瘳宮人信佛者謂是佛也皓乃迎像沐浴夙夜夤畏夤敬也稽顙叩簀簀床板顙額也謂以額扣床也陳罪責己左右聞之惻傷流涕有頃疾間小差篤潔齊戒後乃豫焉僞夏赫連勃勃胸奴也據朔漠龍旌帝服尊高己德昧乎聖人之道曰勃者佛也吾為佛也陳聖像於後坐令沙門朝集為已致拜天罰有罪迅雷震而死也故雷者靈物憑陽氣以作威者也王充論云雷是陰陽之氣相攻射而擊損物故陽氣極而生光等然雷有神為天之使護淨嫉惡者也憑陽氣而行依雲雨而動冬則藏蟄以陽氣收藏故也夫陰陽之氣舒則安而靜蓄則蒸而怒有時嫉惡而震於土木以警戒於人民於其不忌則肆乎害也肆放忌畏也若於事無所畏忌必速其害也宋謝晦鎮荊州患沙門僧昌於城內立塔湫隘雉堞音牒躬役介夫厚勞酒食令肆其武勇嚴鼓戒威莫敢不前撞擊陊徒可反壞陊崩落也又作褫壞音怪故壞也無損而特毀之也龕像摧隕欻有暴風連天雲霧作昏驍烈為之膽寒晦蒙被塵土以手拭去膚隨指落潰爛瘡痍體無貌肌竟以反而族誅也謝晦字宣明陳郡陽夏人美風姿善談笑宋文帝時為領軍將軍荊州牧反召檀道濟討之兵濱擒送鄴都斬於都市周世宗柴氏以鎮州大悲菩薩銷鑄為周通元寶錢後支體潰爛而崩此亦其類也故為罪大者為天下不吊吊恤也始濟其力將溢其禍禍極則革之矣初沙門法敏苦諫不納諫謝晦也其後為之著顯驗論魏太武以穹廬之胄穹廬蕃帳因藉時運奄有河洛其本居鮮卑山下世為君長稱拓拔氏晉武時漸通中國至懷敏為劉曜所害初都雲中後遷平城又移鄴至孝文帝遷河洛遂改姓元氏也崔皓執政訴音素緇衣於太武曰佛化無益有傷人民不若黜廢為國之大利也他日凶謀既進詔始誅長安沙門焚破經像唯留臺下四方如長安異歲有後命所在有圖像沙門一切並除自是不稔崔皓轘音患其尸轘車製也前文已解太武遘厲疾而法令寬弛弛縱也既絶又復也至文成復興夫治國者以大臣為股肱以嬖臣為耳目幸而獲寵曰嬖未有支竅邪而身不殘瘵悲夫大命未傾曾莫始悟既傾而悟方迷何別傾危莫無也始先方正也至危而悟與正而迷何別唐武宗會昌五年沙汰毀滅至六年遍體惡瘡而崩先是李德裕陳謀後宣宗貶崖州而卒也然有踐崔氏太武興於無益之論杜光庭造無佛論竟以雙瞽而卒也其意以畋獵飲酒聲色臺榭克喪于家邦只以此等為喪家邦不以毀廢為喪而便為之無益而始為之益乎曾子曰人之好善福雖未至去禍遠矣人之為惡凶雖未至去禍近矣漢東平王曰為善最樂晉樂廣曰名教中自有樂事凡此至言未嘗非益但非下士之所知也嗟乃世無賢直使崔也始縱皓妻郭氏誦般若經皓取經灰之於廁至是將刑檻車送城南衛士十人行溲其上溲旋溺也呼聲嗷嗷曰斯投經之報也出盧求金剛經驗也論曰邪見輕者將死續善善斯續矣善者淨信心也信為道元功德母長養一切諸善法緣力斷善者生地獄時續因力斷善者死地獄時續西域無垢稱論師適衆賢塔前告于幽靈矢毀大乘矢誓也破天親論言訖心狂舌出於所終地忽然而陷其坑逮于今見者惴惴然惴惴懼也孰能無傷乎沙門惠眺究小乘學聲流江漢聞像王哲講三論謗言三論明空講者著空尋則舌挺三尺耳鼻灑血精誠號悔七日乃復有安慧則晉永嘉中於洛陽以黃縑手寫大品一部為一卷凡十本周仲智妻胡母氏復姓持一本過江陵為鄰火所逮不遑取經唯悲泣若疾火熸於煨燼中得經無一字虧損崇邪者崩首而信此經至梁武世猶藏于御閣侯景之亂也亡所在矣宋北本涅槃經沮渠蒙遜譯也創行南土慧嚴慧觀謝靈運以其品疏詞野依泥洹本共加潤色刪削解脫即南本涅槃經嚴夜夢神人鎧仗惋赫色高聲勵將討其罪乃驚悟而起悸葵季反汗恍惚聚族會論欲追復前本識者止之曰此蓋為欲誡後人耳必若苟違何容即時方感嚴他日又夢曰君以弘經精至後必當見佛也晉末洪豫鑄丈六像未及開摸會銅禁甚嚴宋武時為相國豫坐繫丞相府誦觀音經夢像摩其頂問怖不豫曰自念必死安得不怖覩像胸前銅色燋沸殆臨刑會監官牛奔車壞更克日有令從彭城來原豫之罪彭城宋武也原赦也比開摸像胸如所夢焉比及也燋沸也東魏高歡為丞相有孫敬德者兵家役人也戍于邊鎮造石觀音像至誠無二後敬德為他罪所纍置死刑既迫于刑期爽旦有僧告之曰吾以經授汝至日午但誦滿千遍則免矣口受訖失僧所在敬德念罹身禍誠誦弗懈才畢其數法官行刑舉刃皆折但聞硜然如觸石之響敬德被鞠鞠窮問也曰無乃像應歟公傳往驗之其頸果有數迹高氏録其經而題之曰高王觀世音經也孫卿云報應之勢各以類至言可信矣故古者旌德以沮惡宣禍以弘善使人不以惡為無傷而不去不以善為無益而不為也但業理在徐疾順生順後為徐順現為疾也報應期乎遠近情慮生於篤薄損益差於輕重而吉凶之數屬若影響故天網疏而不漏陰府幽而甚明于公高門而待封于公定國致仕高其門謂人曰吾曾掌獄無私子孫必顯達嚴母掃墓而待誅嚴延年為河南尹酷法其母日掃墓曰我子酷法吾將待其誅也豈謬也哉人亦有言曰種植不見其長有時而大砥礪莫覩其虧終消厥厚是也砥礪磨石也人之為行必自有報善惡相符猶如影響
