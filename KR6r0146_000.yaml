body:
  text: 北山録序錢唐沈遼始余欲聞內典訪諸南屏梵臻法師於是受斯録焉南屏云往聞老師言丁祕監謂酷愛其書一見如不及至手傳其本老師之言可信不疑者丁公所述作多所自出也善乎一乘以為宗百家以為支尋其支如涉江河隨地得宜不得其源猶足以為多聞況遂達其源乎然其書出未久而世罕傳能傳者莫不有名於時而其傳者皆祕玩之以為資不肯廣也余聞神清在元和時其道甚顯為當世公卿所尊禮從其學者至千人而性喜述作其出入諸經者或刪焉或益焉凡百餘卷而斯録獨發其所縕尤稱贍博使世之學者盡得其書而達其源何患不為神清乎神清其名也生大安山下後居長平山陰故謂之北山録惟賢大師先得蜀本將傳諸好事者請余敘其大方而刻之因述南屏法師之言以為首云熙寧元年五月十二日序
