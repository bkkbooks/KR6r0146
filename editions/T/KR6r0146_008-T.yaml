body:
  text: 論業理第十三三世行支曰業徵索求理白論覺皇有業智力佛有無漏淨業八識四智等又示相門中有九業報一梵志女孫陀利謗佛二旃遮婆女繫木杅謗佛懷姙三提婆達多推山厭佛四迸木槍刺佛足五琉璃王害釋種佛亦頭痛六受阿耆達多婆羅門請佛九十日食馬麥七冷風動佛背痛入六年苦行九入婆羅聚落乞食空鉢而廻又冬至前後八日夜寒索衣又患熱令阿難在後執扇等哀哉有生貌異音殊苦樂愚智尊卑壽夭故大昭業理用啟人惑良由起異類見造異類業受異類報也小聖之所不及況非聖者乎而有譸張忿懫者譸張誑也忿儨怒也自謂得一之見人莫吾之若也所謂命矣非業之由也有一類背悷之徒不信業報皆言天命者也禮曰天命之謂性得之自是不得之自是以聽天命外典稱業為天命子云命矣夫修短之性命皆自是天之所注也仲尼曰道之將行也歟命也道之將廢也歟命也公伯僚其如命何公伯僚魯人毀仲尼於叔孫武叔夫子故有是言也子夏曰死生有命富貴在天死生總報業富貴別報業魯公欲見孟子魯平公將見孟軻以其賢德故也嬖人臧倉毀於公而止孟子聞之曰天也孟子云君不見我自是天命未會非臧倉能止是知由業故不然矣以緣業為天命也且仁者克己不仁者害人仁者危甚累棋不仁者安過覆盂積善殃咎若比干之徒為惡諧偶若曹操之類禍福篾徵其在耳目故唐虞聖德但自一己翼善傳聖曰堯以丹朱不肖而絕仁聖盛明曰舜以商均不嗣而絕也厲幽昏淫祚延七百暴虐無親曰厲壅遏不通曰幽皆周王也雖昏猶延數世三桓陵僭世執魯政季孫上卿叔孫中卿孟孫下卿夷吾匡輔嗣絕齊史夷吾齊管仲也佐桓公九合諸侯尊獎王室齊國音無後嗣也騷為天問三閭大夫屈原也著離騷經故謂騷人有天問也班賦通幽班固字孟堅著通幽賦傷賢良不用也並在文選也李推運命其不為此歟李蕭遠有運命論也故金仙之門其孰能辯之由是群言師師若妖厲憑舌前有譸張之士述之皆言是命不是於業後之承信若巫覡之傳妖厲也使君子大人聞之猶若投杼曾參母織有告參殺人母初不信再告母疑三告母投杼而走以參仁孝報者不過三母尚信之今此不經之言傳者不過三達人君子亦須信之況餘者時袒右肩士愀然不懌徂履礪刃將斬其疑時有偏祖釋子洞明業理覩其迷謬遂礪智鋒將決其疑網也曰若稱命不稱業其蔽也固蔽塞固執也夫業者生乎運動者也運動者即發行之謂也動有違順善與善順惡與善違成乎善惡福業為善非福為惡善惡鍾乎報施施戒善相應殺盜惡際會然後有性命窮通生焉於總報外有窮通貧富脩短聰暗端正醜陋皆名別報業也但機運之業有於輕重而性命之報有於今後順現業名今重也順生順後業名後則輕也必若弗假乎業而受命惟天則何天道之賦命而不均其厚薄若人等皆由天命何故其道不均必若業唯運動不能招命則祭豈有福暴豈有傷乎今以宿行定招名業善惡現感名命若唯有業者則合宿緣感無移改豈得現見祭祀者獲福兇暴者受殃皆非宿業所感也祀者但是冥助而已兇暴者亦是順現別報也詩曰莫莫葛藟施于條枚豈弟君子求福不回斯言何設歟詩大雅旱麓之卒章也旱山名麓足也取其不違先祖求福之道回違也然往世之業有定不定而感今世性命有變不變業於時報有定不定性命有變不變若順現變為蛇等別報則變總報不變也其業若定所感之命確乎不改其業若不定而所感之命則可損益之耳如憑善力轉重令輕等惡亦如是然今世之業有定不定而令昔世所感性命有變不變其業若定能改昔因如善業能改昔世之惡日不定之命致有窮通不定之命謂別報也本以惡故窮今以善力改之故通也其業若不定則一乎否泰耳謂不定能改也夫舍利弗阿那律遇佛為法醫遇耆婆為世醫而不蠲於宿瘵瘵病也如舍利弗血痢良醫云可食藕乃令目連往漫陀羅池中取藕食之等阿那律喪目等皆宿業也顏回閔損遇孔丘著德行遇諸侯務賢智而不去其貧夭蓋往世所感之命定也故今世行善不能益之也顏回字子淵弟子魯人也顏路之子家貧三十早亡閔損字子騫亦魯人有孝行家貧遭後母所苦為李氏家費宰跋難陀忮求而福盛跋難陀比丘富盛有金錢數億也阿育王酷恣而威強育王殺戮無度置地獄等而威震海隅遇沙門毱多化之建八萬四千塔也季氏出君死於牖下季桓子逐出魯昭公音死於乾侯而攝祭祀終獲死於魯國盜跖餔腸終於上壽盜跖為賊於東陵日殺行人取心肝為餔孔子不能化之竟獲其死也蓋往世所感之命定也今世不善不能損之也此以宿有善業現惡不能掩之也末利獻食為國夫人末利夫人釋官庶生極醜父王不欲見乃咨蹉供佛念誦不暇佛為見身變獲端嚴波斯匿王取為夫人舡板讓死為海神授命大莊嚴論說有比丘泛海遇風損舡少年比丘獲一舡板見上座沒念云佛今敬上座遂以板讓之海神覩見歡喜俱推出海而得存活也趙盾愍於翳桑趙宣子出見翳桑餓人問之云不食三日矣乃取食以飼之後為晉靈嗾獓咬之翳桑靈輒殺獓扶輪救之而出也漂母哀於淮陰淮陰侯韓信未遇飢甚見老母漂絮投之母餉之後佐漢封淮陰侯母已死開墳以千金投內也皆今世善業之定也往世之命不定故能變衰從盛也自末利已下此順現善業也樵客指熊而臂落經律異相云有樵夫入山值大雪寒極白熊收入窟至雪霽下山見獵人刀引之示其熊處舉手指之隨指臂落也比丘啖𮌉而腸穿有逐羊奔寺見比丘指示之乃殺之以䏑啖比丘食已䏑遍於皮下走穿腸而卒出辯正論里克見討於弑君晉獻公寵孋姬而逐群公子殺申生太子立奚齊里克殺之國人又立卓子克又殺之而迎夷吾立之是為惠公惠公至自秦謂里克曰子殺二君與一大夫謂荀息也乃自殺即惠公討之故也張祿逞志於魏相張祿范睢也與須賈入秦秦悅之須賈歸譖之於魏齊魏齊乃飲酒次打之齒折沈溷中活而奔秦改稱張祿秦拜為相後謀收魏魏齊令須賈奉使祿乃令須賈作驢仍今取魏齊魏齊出奔至死竟喪於魏也皆今世不善業之定也此皆順現業不善之報也往世之命不定故能化存為亡也前世壽本未盡為今世業令盡而受現果故也提婆達多害聖出足血推山傷佛足破僧倫必受泥犁之一劫蓋方生不善業之定也亦順現不善定業也阿闍世弑父見于佛信于法免無擇之大苦阿闍世王弑父頻婆娑羅王地獄苦見身患惡瘡歸心告佛佛以光照而瘡愈反為說法免地獄之苦也無擇獄名不擇善惡故也蓋方生不善業之不定也因懺悔而罪滅矣此乃時報俱不定也故顏閔之貧夭酬往因之不善其德行可為來生之善報季跖之富壽酬往因之善業其逆暴可為來生之重苦誠不足疑矣夫不龜手藥是一而榮賤各異龜皴坼也有賣藥以治之所獲甚少南人鬻其方歸而獻於君值征所用大得其祿也出莊子削諸侯地是一而興亡不同秦始皇削奪諸侯地而不封漢軍入秦無救者而亡也麗食其見漢王勸令封諸侯地及張良至遽止之於帳中借筋為籌畫之言不可遂不封漢果興也實由機運有工拙而性命有可易不可易也故君子知運命之不可易而樂天知命小人不知則踰己躁動不知道無以為君子是以禍福安危居然可見矣其有謂吉凶恒理由命不由運者斯不足斷矣運有否泰吉凶山人者也夫冬草覆而不死何甞不由運乎由運用而可免也有以性能則命通由運不由命者斯亦不足斷矣有便倚運動不信宿業則亦不可也夫寒木溉而不滋滋潤灌也如古柏澆水豈便滋茂蓋力堅故也何甞不由命乎夫兩信完方可謂之達奧是以信有運則業之信矣信有命則果之信矣運乃業因命則業果信運命而不信業果者何異聞朝三暮四則怒聞朝四暮三則喜乎莊子云如云朝三暮四之言眾狙皆怒却云朝四暮三則眾狙盡喜而不知名異而事同者也故此方先聖儒雖不顯言於業果而陰以運命之隲定也以運命暗定業理故也名殊而義一耳易曰知幾其神乎莊氏云萬物出於幾陰符云心生於幾死於幾本作物見物而幾生也心能發幾目能見幾生死之心在於物成敗之幾見於目也張湛云幾者群有之始動之所崇也幾者動之微蓋言於業運也或曰業興於動其報理均曷有輕重定不定乎所發業是同何有輕重等受報不定者乎曰心有喜怒事有恩酷能發之心行有不同故形不忍乎色逞炮烙于心紂之無道改炮烙之刑行刳斮之虐此業之重也而書云宥過無大刑過無小宥放也不以罪大而不赦不以過小而不殺也經云為團鐵小亦沈水為鉢鐵大亦能浮莫不以是業雖重而悔猛亦免業雖輕而不懺亦受又若以三業三時合離為八身口意單名離三業俱等名合離合二種兼三業三時為入三時三世也兼之則重差之則輕三業同發名重不同發名輕輕則不定重乃定矣由是瓶沙餒於逆子瓶沙即頻婆娑羅王釋黨死於凶王琉璃王也堯聰明而洪水湯湯洪水蕩蕩懷山襄陵下民昏墊等湯仁德而大旱湯以仁德而有天下七年大旱禱於桑林等也張毅單豹以養求生俱不能生齊人張毅者畏慎之士也見高門懸簿無不走也年四十以內熱之病而卒此過之於躁滯外也單豹者魯人巖居飲水不與民共利年七十而有嬰兒之色不幸遇餓虎食之此滯於內也豹養其內虎食其外毅養其外病攻其內俱求生不得生也薄俱羅周后稷不以養求生俱反其生蓋運命之定也薄俱羅此云善容曾施一訶梨勒九十一劫不患頭痛遭後母方便殺之經五難不死出家後目不視女人身不入尼寺不為女人說一句法無憂王知其少欲施其塔一金錢湧地不受也周后稷帝嚳之子姜原所生生而毛遂棄之深山寒氷陋巷三棄不死因名棄善播種仕堯至十五代孫文王得天下黑風飄而獲濟有商人入海遇黑風飄入羅剎鬼國俱念佛而皆獲免也富羅正而長謝有比丘見輪王威勢愛之晝夜精勤求之佛恐不得解脫欲謝其千輪之福乃為一正富羅富羅矩靴輪王業謝也桑穀匪殷宗之禍殷太戊以伊尹子伊陟為相桑穀共生于朝一且大拱懼而修德桑穀死三年重譯而至者十六國乃稱中宗熒惑退宋都之災火星見宋之分野景公懼而修德火星乃退三舍也文王錫武王三齡齡壽也武王夢上帝之九齡文王賜之三齡故至九十三也秦穆赦孟明再死蓋運命之不定也秦將孟盟伐晉兩度過河不利秦穆赦之後焚舟而往晉不出乃雪前恥而歸摭茲理例考之人事豈云無業哉此皆業理分明之事其有恃重玄者以為雁序羽羔跪乳烏黝鷴白棘尖𪙉方蘭馨蕕臭彼則自然之數也此皆外道所計自然義故也豈由業乎重空人撫衽告之曰不然也夫老聖云自然者其道也至道與萬物同體故曰萬物自然萬物與至道不即離即曰一陰一陽之謂道道者寂然無體也神無方而易無體在陰以生在陽以成故曰一陰一陽之謂也莊氏云在瓦礫在稊稗非謂萬物無因緣之義也觸目皆道故也夫稟性命者以業運為因緣有情者皆憑宿業熏習為因緣也處外物者以氣數為因緣無情者憑根種為因陰陽氣數為緣也故羔雁徵之於業習雁序羔跪皆由業習也𪙉棘求之於水土假水土為增上緣也烏反哺梟反噬蓋前生之行逆順之餘習也橘榮南而枳蕃北蓋隨風土之所變也江南種之成橘江北種之成枳也夫水潤下火炎上金從革木曲直土爰稼穡水䶢火苦金辛木酸土甘因五氣成五質播為五味凝為五色流五音然後錯而雜之剛柔強微所稟有異萬象生焉何異因緣之義乎上皆洪範文義也若又責以造化之本陰陽何施而孕育繁委使玄黃異視宮微分聽者則其酷矣若一一窮究則其品類繁酷矣夫萬物始於太極無因緣相構觸類成象不生而生萬物本不生緣會而生生於不生道本無生萬物憑之而生陰陽無心造之非我理自玄應故曰無心天地無功老子云天地不仁以萬物為芻狗聖人不宰故云絕聖棄智大盜乃止擲玉毀珠小盜不起也今古莫知夢幻之理於焉得矣故老氏云無名天地之始有名萬物之母無名者妙道之本權輿天地也有名者滋生萬物故名曰母也莊氏云大塊噫氣其名為風文如海云大塊自然也噫吐氣貌也由是象帝之先不可得而有始也若又責以外物觸氣流形內命亦何業之由者外云如因無情擊觸內命而起愛憎豈是業耶誠不足類也夫外物無心無心則業內命懷情懷情則業起故飄瓦之與投瓦俱及於人則有怒不怒也何斯之無別乎劉子云飄瓦擊人虛舟觸己雖有忮心而不怒者以彼無情於擊鯛也或曰善惡之業報施必臻故易曰積善之家必有餘慶積不善之家必有餘殃何瞽生舜舜生均鮌生禹耶瞽之頑而生舜聖舜之聖而生均不肖鮌之兇而生禹聖此義何在對曰聖人舉天理而立教語其多而不語其少也語其順而不語其違也聖人舉慶善殃惡者乃天地常理也又言之則順不可言善招惡豈導物乎故公劉洎王季克生聖嗣至于文王大造于周邦周自后稷播種德及黎民公劉世守其官不窟迂西戎至季歷生聖子文王生武王而得天下三十七帝八百餘年皆積善流慶之道故也弗父何洎正考父克邁仁德至仲尼光定文教湯之後微子啟封宋至弗父何讓位厲公因賜孔姓至正考父三命益恭世修仁德至孔子蘊聖多能光顯文教者也是以考歷象授人時者貞其所次式恒其紀貞正式用也歷象日月五星為七政也其或俶擾錯亂變化為凶祉誠則災異也若又或以聲不代響形不貿影貿易也形不能代易於影安有祖考施而子孫當其報者自作自受各不相均則義可得詳焉夫善惡以類相資而不相代故先人以福施後世以福繼之非無福者而為其子孫矣先人以禍施後世以禍繼之非無禍者而為其子孫矣故龍與雲合虎與風合龍吟則雲起虎嘯則風生銅山崩而景鍾震漢殿鍾震蜀銅山崩似類相應也葭灰消而月暈缺淮南子云隨灰而月暈缺注云以取蘆灰環月缺其一面則月暈亦闕蓋應會之數矣以類相感故也常俚以殘淫𭤑寇傷生破產方謂身之罪也常俚鄙俗也𭤑寇盜劫也則淫盜殺皆身業行也訾言勃詐凌犯君親方謂口之罪也語集也機慮無法潛毒懷虐方謂心之罪也意業也曾不知有百行乖儀五常失守處俗於忠孝不至出家於慈悲不厚釁生於微積而成形則為罪矣水滴雖微漸盈大器常俚以徇物捐軀蹲膜擎跽蹲膜禮拜擎合掌跪胡坐也方謂身之福也誦言講法悅人進己方謂口之福也愛惡絕向忌剋不入方謂心之福也曾不知手足之所措詞論之所及念慮之所經興意介益孚于惠心省罪引慝所謂懺悔也則謂福矣故五穀不易其種百行不反其報仲尼莊生云夷齊仁而餓死伯夷叔齊遼東孤竹君之二子父死讓位歸周聞武王伐紂叩馬首而諫不從乃隱首山之陽不食周粟以至餓卒也尾生信而溺死尾生與女子約于橋下未至而水爆漲生恐失信不移而至溺死也伍胥忠而伏劍死伍員字子胥相吳諫夫差不納西施王不聽乃伏劍死越音收吳也以為外事無必必專也定也斯實滯名害德失乎中庸之道非謂以善召禍也昔大士坐道樹戰天魔業之然也如來於菩提樹下成道破四魔所謂天魔蘊魔煩惱魔死魔處巖穴灑足血業之然也造濱州食馬麥業之然也故語今報則善酬往業豈滅禮曰子夏喪其子而喪其明自睛也曾子弔之曰吾聞朋友喪其明則哭之曾子哭子夏亦哭曰天乎余之無罪曾子怒曰商爾何為無罪也商子夏名吾與爾事夫子於洙泗之間退而老於西河之上華陰之地也使西河之人疑爾為夫子爾罪一也喪爾親使民未有聞爾罪二也喪爾子喪爾明爾罪三也一不稱師二於親恩薄三於子厚是罪也而曰何自謂無罪歟夫如曾氏始謂見天地之心知禍福之萌矣石駘仲卒衛太夫石碏之後無嫡子有庶子六人卜所以為後者吉者從之沐浴佩王則兆齊潔求吉兆也五人沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉心王且知禮石祁子兆衛人以龜為有知也是知業理冥奧儒辨此世釋通三世一張一弛範圍天下備矣而經亦云誤殺誤報甞有山間比丘誤蹈一蟻蟻死為野豕觸石而崩比丘亦誤死於是也而世有色雖仁而行違言雖澤而心詖詖險也所謂色厲而內荏言偽而辯也衒聲名冐祿利知善且蔽忌惡而黨捨人急己輔高弱下力行僭賢畏罪矯容滅裂行其事恢張希其報都不見其功過相磨恩害相補上智審諸己中智求諸人下智昏昏然皆謂其損益自然也夫李廣不封侯李廣隴西人號漢飛將軍善射手不虛發甞射石虎應絃沒羽戰蕃殺戮至甚以此竟不封侯白起死杜卸白起秦將善野戰坑趙降卒四十萬竟死於杜卸驛也虞詡相朝歌漢虞經善斷獄詡即其後也詡奏帝以雍州三郡為屯田省也竟不得其死雖保節忠主而皆要功害物故將死之日方始省其前過者也住持行第十四泥龕塑像佛寶也黃卷赤軸法寶圓頂方袍僧寶此乃住持之道也簠簋俎豆皆宗廟祭器也制度文章為禮之器升降上下周旋褐襲褐裘上服也禮云襲所不人公門上必加褐狐白裘錦衣以褐之是也為禮之文鍾鼓管磬鍾金鼓革管竹磬石也羽籥干戚羽翟牌也籥如笛而三孔此文舞之禮也干楯也戚玉鏚鉞斧也此武舞之禮也為樂之器屈伸俯仰綴兆舒疾為樂之文置茲則禮樂廢矣繕寫繢刻香臺法几為道德之器髠袒拜遶禪講齋戒為道之文弛茲則道德微矣弛廢也微匿也音佛升忉利三月佛生七日摩耶生忉利天佛往過夏為母說法也優陀延王南海王也懷不歸之詠目連以三十二匠往瞻相好刻紫檀為像王洎國人若與神對像設之興自此始也佛初成道居樹王下賈人奉食佛初成道帝履富婆長者將五百乘車賈販至山下風雨甚山神告之如來成道可往供養遂至山也請示作福大聖授以髮爪令歸國起塔塔廟之興自此始也成道踰年化力風行降象頭山入王舍大城此云上第瓶沙所統瓶沙王率統內官士庶御于郊野因以迦蘭陀竹園為佛寶舍迦蘭陀此云好聲鳥昔有王出獵樹下睡有大蛇出自樹將螫彼王此鳥悲鳴以覺王因捨此園令鳥居止今王捨以建寺也有云迦蘭是鼠非也佛勅為僧居伽藍之興自此始也正法有二謂教與證教資持說證在修行不持則真文闕矣不說則至理擁矣不修則聖嗣絕矣故世親云法無久近隨三人住世經師律師論師三人又持說證三人人在法在人亡法亡也或謂正像千年末法十倍之此但舉其大限示興喪之於天下也或以大聖云有如法眾說戒則我法住矣由律師持律故佛法住壽五千年戒經云若不持禁戒如所應布薩喻如日沒時世界皆暗瞑此乃舉益以彰勸也故經律論為住持之教本僧財食為住持之功烈務教而法眾盛矣宣功而金界治矣故使至道淳懿凝味不散如大羹之在鼎祭宗廟之羹也不致五味故左傳云大羹不致靈神降祉此住持之法度也天三學孔揚德輶鴻毛孔甚也輶輕也言所習光華若鴻毛之輕舉也人思服道善故能久欲使真風玄緒取陵夷於天下又不可得也西域知事僧揔曰羯磨陀那此方為維那亦以悅眾呼之也彼國克艱于厥位先聖徵賢則仁人次之維那者掌事僧西國求之甚難多以賢人為之其次以仁人次之也而中國之聖不顯于聖惟德惟行求諸己乎於無恒者輕諾者諒則有闕若用不恒輕易之徒信為闕則罔有始終也既虞覆餗餗糝也亦果敗類故與夫無良為任使下民化之寧為聚盜之藪也主掌僧田非其才器惟貪貨賄不務修葺若任官非其人州縣不治寧居冠盜之藪不甚此也佛在世飲光統眾於靈山身子莅事于竹林泪沓婆摩羅年十六得阿羅漢其後念身不牢固請知僧務大聖憫其誠愿愿謹愿也命僧差之既懃于職於衣食乃孜孜不暇給先物後已率籲玄侶籲和也玄侶僧也流聞暢乎八方皇覺懿乃嘉績讚曰我弟子為僧知房舍臥具差次請食沓婆摩羅為第一也罽賓有長老達磨多羅手爨於僧厨客比丘二人自遠欲展勤初不識之就前問曰大聖尊德今止何處達磨指云在彼最上房住二比丘如其言將往而達磨遽以神力先復本坐比丘後至默識是前所見者接足致敬已問曰大德名滿閻浮胡為躬燀薪蒸燀燒也大曰薪小曰蒸任茲廝役耶達磨喟然曰喟然嘆息也汝既有問吾則何隱吾所念累劫受生死苦險難長遠洎五百世為狗惟飽兩食況餘惡道若使吾頭可燃者吾並燃之矧茲燃火及餘支乎中夏姚秦世棄俗者十室而半羅什入關學徒籯糧籯籠屬不遠千里而至者三千因立道䂮為僧正慧遠為悅眾維那也法欽慧斌掌僧錄主簿書若今僧判也給車輿吏人僧正祑同侍中餘別有差震旦有僧官自秦始也魏世立監福曹又改為昭玄司備有官屬以斷僧務周齊革為崇玄署北齊後周若功德司也東魏高齊尚其統宋齊梁陳尚其正而復寺三官若今三綱屬其統正焉隋革周命弘法尤盛天下三藏分置十統今國家罷統立兩錄而司於京邑僧錄掌京城外州別立僧正其三綱特以德望求人也藍摩國塔昔與諸國分舍利而營之歲久地荒惟野象銜芳薦實以牙除䕌以鼻拚灑而有遊方沙門感其事遂反戒為策勤諦葺舊址總眾役于厥躬也反戒捨戒也策勤沙彌何為然以有戒則掘地圻樹露地燃火皆為破戒故不可作興葺之事也晉道敬王右軍之曾孫捿若耶山立懸溜精舍反戒如藍摩之事焉故仁人為善天下同矣不仁為不善亦天下同矣吉人為善惟日不足凶人為不善亦惟日不足崔慧元營寺於武陵既歿武當山下有見者神色甚暢寄語於寺僧曰勿令寺業有廢自是空中依時有磬聲也今蜀之卭州霧中山及彭州金閣寺空中皆有讚唄磬聲等廣州法獻創寺於藏微山有二童子携手來歌曰藏微有道德歡樂方未央未央秦宮歌訖忽然不見之也夫神以誠感道由神助匪誠何德匪神何怙故禎應之所翔宜勵乎未翔者耳齊周顒於鍾山雷次宗舊館立草堂寺或謂之山茨求慧約為寺任約以邑居雖近而蕭條物外冥賞素誠便有終焉之託顒歎曰山茨約主清虛滿世梁武造光宅寺詔法雲為寺主創立僧制雅有後範雲之有孝德又以業行承天之休荷國寵光夫孝者事歿如事生思親如不欲生曾子以事親聞執親之喪水漿不入口者七日高柴以思親泣血三年未甞見齒言泣無聲如血出也笑之微故不見齒雲無僧旻之讓則殆乎不勝喪矣法雲持母喪幾至毀滅僧旻勉之方進食也沙彌歲覃思法華甞造幽巖竪石為聽徒執松枝獨講故其後首出此經雖有眾師難能偕也甞於一寺散講感得天花如雪滿空而飄于堂內罷坐乃去時有一僧願欲齊雲夢神人誡曰雲法師燈明佛時已講此經宜速措汝意措置罷也勿圖非望也今法門之季人向其意各趣向己意也前哲遺列後生何顧背德向利易進難退恒覘常住若膏腴則賂求其司覘竊視也用財求主務也既得之握彼公符暢乎有位遂致專蒙造次不肅僧命紊六和之秩夷九仞之功洎儲廩空虛田蕪已綠此明將常住寺務句當翻致破使莊田荒廢便則謀求退免也或則謀老或則辭疾府寺曾不察其殿最省其姦直漢書音義云上功曰最下功曰殿姦邪也直正也遽則遂其背就致使狡夫得計甚矣且彼之菆爾也菆爾小輩也處俗猶俟乎人治豈服緇則能為物致治乎但府寺始以貨選而彼負罪亦終以貨免或眾所不蔽稱其罪以告而訊獄者且頗反陷於告者于理也蔽蓋也頗偏也初求主持以財而求之及侵使後以財而求免或為僧訟之於官官亦以情倖反加罪於告者此皆公中長惡然也甞未諭於府邑既籍其田業列為庭旅諭曉也籍借也古十一而稅民耕十畝之田公借其力耕一畝為貢賦庭實旅百則進貢也或以方外期之或以飛行視之公府顧僧侶或謂方外出俗之士或謂神仙高士相顧也則宜選賢任能也致於政化之外莫有選賢勸能俾其維葺蓋以公府以物外之人而不治之也是使福門隕墜人神太息得非有土而漏其威惠耶庶緇之獄繩乎公府眾首罪也眾僧有罪令公府正之是僧之罪也眾首務理豪勢沮之俗官之罪也僧田無故為公家侵撓官人過也有二罪而不討亂何有止焉或有假釋氏之官籍規僧田之法蔭勞務所及雀躍掉頭以為寧居逸體或主持院舍或管領莊田減刻眾僧侵損常住結託州縣依附形勢峻設隄防使論訟者莫得其勝然後嚴潔鞍乘華麗僮僕雀躍掉頭深為得意也得志遂性其在我而已寺有損益不驅不馳寺有貨植不躬不親寺有鍾磬不孝不擊寺有庭戶不掃不灑於財與難但苟而已矣但苟且而已此乃法族之懸疣人流之駢指也五指更生一指謂之駢指無用也今以此喻之也夫出家者務以行其法而為形容不以謀其利而為形容故能隨時高下所在益物如南薰而和萬品如蒼精之福一方角宿曰壽星亦曰老人星乃蒼龍之精見則為福何但氣遏飄風力制奔馬勇於安己廉於取善耶故中人慕下浸而成俗習以成性故也使匡弘統理者終鮮其人矣夫夏殷之末何至皆誅靡不化為惡也唐虞之際何至皆封靡不化為善也桀紂之民比屋可誅唐虞之民比屋可封今大法將墜吾黨從媮媮薄也又苟且也靡不化為不肖耳其或方將就夫教源剗鑿其弊疏流導波造舟為梁造舟維舟為橋也復支賈之綱紐支遁等賈惠遠也追雲約之礎構法雲惠約之徒也固亦非今之所尚也或有業行薄崇器望微彰若今負一經一論之徒或吟味蘊識之子等裒其有利則無所謝於眾務則曰妨道去維持之意驟作辭于飾必為之辭以求苟免此乃族庖之折刃未得良庖之投刃也莊子族庖初學解牛必折其刃若良庖目無全牛曰投刃無所損也君子不器此器者也不方圓也上善若水此不若水者也天學道者先乎行後其守行礙乃守守通則行當行而守是謂矯竊夫庶官為理知賢授材省謗申冤得人則省謗無滯則申冤去苛務惠此六者濟生民之至矣而師表法望鎮重方隅何莫放其徒若是焉至若結攬賢能分勞析司不潤於身不虐於眾總百過歸于己推眾善歸于他恩先于有功後施于平民令行于所親後及於所疎心夷愛憎事均榮醜泛逸乎若不繫之舟逍遙乎若遨若遊安得不為道哉殷大夫周柱史漆園吏彭祖老子莊子也皆祿位之士也在濁若珠投於水履寵若風過于草何甞以外事而汩於道德乎和其光而同其塵也昔孔蔑為邑怨乎三失孔蔑孔子兄之子也與子賤俱事孔子孔子過蔑而問之汝仕何得何亡曰未有所得所亡者三王事若聾學焉得習是學不明也俸祿少饘粥不及親戚是骨肉益疎也公事多急不得吊喪問疾是朋友之道闕也有此三失密子賤為邑喜於三得密不齊也孔子往問之曰所得者三也始言之今得而行之是學益明也俸祿所供被及親戚骨肉益親也雖有公事而兼以吊喪問疾是朋友信薦也孔子喟然嘆曰君子哉若人魯無君子者斯焉取斯也仲尼稱密為君子非薎之有也悲夫有累之質百年人世在凡籍乎官寺在聖隸乎仙寺居官寺者寧辭以人事處之耶其有仙寺而莫吾能適也如卭州大邑縣霧中山有五百羅漢居三學山聖燈峨眉山普賢菩薩等又如感通傳有僧亡名至竹林仙寺等是皆昔竺曇猷造天台赤城圓通往鄴東石鼓慧寶寓宿巖室皆仙寺也莫不有師長有威儀將欲寄形彼不我留故人間往往聞絕壁深林鍾聲梵響神燈奇像者斯可徵也是以僧居每於說戒解夏日不得不清嚴法宇整眾翼翼儼若在乎聖人之前入大乘論云賓頭盧羅睺羅等一十六人大阿羅漢恭承遺顧遂行人里佛滅後罽賓國勝軍王難提蜜多羅尊者為之舉出十六大阿羅漢也近世梓潼郡有大長老律師胡氏亦感通之流也郡南鄙有靈鷲山胡領徒而夏安居說戒夜人數則定籌數每過眾莫識其然僧每以十五日夜及月盡夜令一人誦戒經必行籌先數僧有幾人沙彌幾人令知籌數多少夏既末有二三胡沙門出山至路隅與穡人揮手相別律師聞而奔走其徒四騁挍其去則不遠然而莫得見之矣夫聖人之心自我人心鬼神之靈自我人靈至誠感於神明也慧患講居無水將徙其屬山神謂之吐溜如梓州慧義寺無水有僧神曉念金剛經期以七日至期果獲迸泉出今見在僧範說戒夜寓宿他寺觀竪義者廢其事靈祇怒而仆之斯誠與調不可僭矣梁慧超為大僧正好山水翼從之聲聞于數里居則羅列童僕顧王侯之不若彼豈為僧正歟夫僧正當正己以為政匪廉則何有於正乎道達之為南兖州僧正罷任唯五束故紙奚廉與濁之不相概也概猶平也平斗斛者僧旻不為大會謂門人弟子曰大會雖有一時起發之功吾寡乏手力米樵菜湯踐蹈澆炙傷害極眾如假官力使役雖眾彌難盡意故吾不為也議者曰靜者善其動動者善其靜是為周濟之士形躁好靜質柔愛剛之道也又如以寬濟猛之義也若靜而行靜則庶心寂寞德不光華其跡沈隱故也若處動而逾動則物理滋彰道德浮偽故賢者履動靜之間適有無之外總萬善於無為無善不為也夫大禹卑宮室而盡力乎溝洫菲飲食而致孝乎鬼神豈好手足胼胝而脛胈無毛耶夏禹治水䠊無胈脛無毛韋昭云胈股上小毛也蓋不私其安而欲以功施天下也長者子善德建大施會維摩經說也聖人悅而教之顯博施濟眾福與心遠其樂無窮也故西域有鉢遮于瑟即大供會也上智行之積而能散歸惠于我歸財于人陳錫載周實則兼慶陳桓子豆區釜鍾重施於民而皆周遍終致有後於齊故也夫大士苟益於物雖害於己亦所不避況匪害乎菩薩修行身為肉山魚米欲行大道何視小徑若以興功害物命則幢塔泥木儀像服饌所出孰罪耶舍利弗乞食觀空中虫如彼駛雨如器中粟乃多日不食大聖告言當以肉眼所見固可食也靈裕教誡學徒無貴賤無少長皆述己名稱彼仁者絕於呵棰違言必譴彼何施至於此歟茲或可傳而不可繼也詩曰予懷明德不大聲以色言文王不發大聲以顏色也又云不識不知順帝之則也仲尼曰聲色之於人末也作威震色此乃下也夫不刑而治世皆尚之但今之人懼威而侮德威勝於恩也聖人猶其疾之詩曰君子如怒亂庶遄沮言君子若怒其亂眾必潰散也又曰王赫斯怒爰整其旅言以威止亂也夫良馬必假其銜策好鳥必俟乎剪拂良材必資於剞劂未有捨於此而能自致其美者也易曰小人不恥不仁不畏不義不見利不勸不示威不懲小懲而大誡懲責也謂責以傷害損棄之罪而便大誡作福興功之利也故禦眾者當達人於未顯刑人於未亂使人仰其威惠勉而祗懼可謂善始矣始既立默若五氣相宣八風啟序濟濟允諧言行有章雖有訾扑訾罵責也扑杖也而無所用之是謂善終也人鮮有終而裕則有終譽焉唯靈裕能也餘人則少爾觀夫雖不撾辱而譴出眾外或則亦已甚矣譴謫也若今付衣鉢出堂也經云是殺生是殺生報是地獄是地獄報律開教授毀呰不犯夫何義耶蓋欲以刑期於無刑故也此乃謹誡罪犯令其不作也故譽善則誘善彰惡則塞惡愛語羅睺叱呵調達其不然乎羅睺佛子調達佛冤而仁者恕在心狡者恕在口仁者忠誠故恕在心狡者詭譎故恕在口在心則躋物就益在口則敗物矯慈今之人庸細者聽於口而不知其心以面柔為慈惠巧言令色足恭者人皆悅之故也以行高為強傲彼不知周之夷厲姬周亂主下堂而朝諸侯愚柔而削也炎帝軒轅起伐亂之師不得謂之無為之君也炎帝伐共工氏黃帝戰蚩尤夫為師者所利在法何恤人之言䘏憂也利濟不以害而不為也喻若為國家者寧懼於誅伐但世有積矯翳直德卑價重延慈悲之譽盛慕羶之黨令無節之夫則沒己之行模範其事使少貞者效己而為之也反以大聖慈而不加於我遂使五種惡馬七類治人永墜于地矣今吾教叔世叔世季世也法徒多難朋姦濟亂若苞桑之固矣苞叢生也欲由吾直當度其可否慎厥機亦聖人之教也昔客三藏見無罪覆藏讓而從革准律比丘犯僧殘罪則令別住十日謂之波利婆沙言省罪也十日未滿更犯僧殘不覆藏便說已發露則不應羯磨作覆藏罪有客三藏見其如此遂責讓之因此乃從而改也舍利弗遇非法羯磨昔伽藍內淨人男女長大比丘四人作羯磨令其嫁娶舍利弗知其非法欲呵之先白佛佛言汝不應呵一不呵眾也又彼眾汝寡恐反致害是以默而不止也其由公劉避狄國弱而就德公劉后之後也后事堯封邰為官不穴出失官竄西我至公劉復修其職戎人貪其土逐之至太王遷于邠居岐山之陽文王受命武王克殷而有天下也文王伐崇師強而取亂崇諸侯之國也崇侯費仲為紂耳目之臣不修德故文王舉戈伐之時旱師起而雨也皆變通精照之弘也其有謀不道財營不速之福卑崇臺而改作陋華鏞而列危以侵虐之財營平急之務屋宇宏敞鍾檻輝華也財由枉濫事生貪冐誠為罪福不相補矣夫放生者哀彼將餼齊將殺牛釁鍾宣王令以羊易之孟子曰王悋一牛王曰不忍見其就死日王但見其牛未見羊也君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以君子不近庖厨也遇而存之是謂生生之福也昔趙簡子元日放生國人聚捕而獻彼恩生於害則勿若不放之也故維持者計德不計利則利由德博計利不計德則德由利削嗟乎法既陵頹劫極滓下聖凡攸隔天龍潛戢魑魅作威正雅難辯祈塔寺以重鎮假貞哲以扶荷豈只香臺庇影法供澤膚興亡不繫於肺腸笑語自怡於旦夕奄若白駒過隟白駒天窓飛塵也窀穸沈魂窀厚也穸夜也永夜即生死長夜也楚子語也緇田無一籄之功鐵圍陷百刑之痛靜言此理孰不寒心酸鼻哉但玄綱久紊紺園徒廣版籍藏於王府井賦歸於郡縣祗奉迎接若邑胥之畏於尊吏焉是以廉懦者避色避言而不居也潔己以避州縣愚慝者費力費財而無益也金田化為枳棘實則患是之由夫如是蓋將廢寺舍於府縣也何只笑於二武焉府縣侵耗不讓二武也故臨民者在知人在安人宜察其言行於其善者施折腰沒階之禮且以力援否者當降之使君子小人不同日誠則祇林欝欝布金之望如可待也由是寺廟之興興有道者也故入其境自大國至子男幢廟修整僧徒肅穆則亦是以見俗政之清淨矣西域常住給僧衣食以田園所產由乎施者豈施只論於衣食哉夫僧饌以時擊鍾乃食餕則歸僧勿己有也餕餘也殘宿食者犯戒異界不以法不通也三聖之財出納有司匪則有悋三寶之財典座掌之無有祕之悋也王臣力勢肆求所備固無得而辭也劫賊凶人校力不制末違其欲也僧有病而無藥隨有而給之其貧無衣即隨貨而益之死者之衣從之既葬復于僧也若有三寶常住財物貯之以備王賊貧病之僧若貧無衣則以衣備之死葬之後却取納僧常住也其經務有勞者以衣食倍之若今主事者別與施利也故律謂之福饒類也而任務者每事匪專舉必詢眾詢眾不恒宜立知法故律謂之處分人也若今寺院主首若以物非我有縱心糜散事自我逸廢業墮功鳩役計食量衡無節鳩聚也量衡秤也尺寸無法也致使傷蠧眾財此職司復于罪也昔僧伽舍見海上寺僧以膿血為食以器相擊蓋迦葉佛世同一淨宇有客僧至忿怒藏食故也宋法豐死為不食之鬼巡寺作餓駝聲以專寺任刻薄故也臨邛僧孫氏見身如廁持鉢食穢以儉歲割杓減粥故也智瓌死作眾奴以寺布借人故也如聖壽寺僧清訓念蓮經每在送終處於行食者求酒肉及色之以歸一日驟無聲經年不通食漸不通水自云生入餓鬼也鏡茲冥運孰莫是徵高僧傳十科一譯經二義解三習禪四明律五護法六感通七遺身八讀誦九興福十雜科以住持為興福余每考行其事實則有福興焉昔吾聞諸梵僧問吾師曰頹墉釁許近反礎必焚炙奧渫音洩者居焉華軒綺疏必懷氷澡雪者居焉疏窓也惜哉今驗若不虛矣又曰佛圖澄建八百九十餘所寺洎天台三十有五吾今不能興弘一二蓋非夫也非丈夫也爰在爾徒因涕下承睫在予狂惑不克荷負尚書云其父析薪其子不克荷負俾式光遺寄積行于艱難為法衡倚愧瞻雲日愴然永慕耳
