body:
  text: 梓州慧義寺沙門神清撰西蜀草玄亭沙門慧寶注天地始第一聖人生第二法籍興第三真俗符第四合霸王第五至化第六宗師議第七釋賓問第八喪服問第九譏異說第十綜名理第十一報應驗第十二論業理第十三住持行第十四異學第十五外信第十六天地始第一明儒釋序天地開闢物象始興之事艾儒為儒奮于休聲艾長也老而有道時人所重曰艾所謂刻意尚行離世異端有上古之風此乃山谷之士非常人所好者也奮擊也休美也群儒即而慕教焉群眾也即就也以艾儒博識休美群儒就而習學者也此評世教誨之道遊居好學者之可慕焉予小子或以宇宙權輿再拜致懷者予小子謙也或疑也宇宙天地也權輿初始也言我疑於天地初始開闢之事再拜而伸及懷抱者也艾儒曰富哉問之也富盛大也吾知夫天地溟涬之人也溟幸廣大無際混然未分之貌也旦旦乎旦旦明曉也如言三辰昭昭也居吾語汝居坐也起而致問故令復坐而示之易有太極是生兩儀鈎命決云易有五太一太易氣象未分也二太初元氣萌也三太始形之端也四太素形變有質也五太極形質已具也從太極而生天地清濁兩儀也厥初未兆馮馮翼翼澒澒洞洞清濁一理混沌無象澒胡孔反大水貌也厥其也淮南子云天地未形馮馮翼翼洞洞灟灟皆形象未分之謂也混沌者未開通之貌也殆元氣鴻蒙萌芽資始殆及也資助也鴻濛混元之氣也莊子文粵若盤古生乎其中萬八千歲天地未分猶如鷄子清濁既兆是曰兩儀清氣為天濁氣為地和氣為人是為三才然後盤古生乎其中治萬八千歲矣天地開闢天日高一丈地日厚一丈盤古日長一丈頭極東足極西左手極南右手極北開目為曙閉目為夜呼為暑吸為寒吹氣成風雲吐聲成雷霆天地既開天則日高一丈地則日厚一丈盤古四體極大極盡也曙明也四時行焉萬物生焉八紘九圍之大其孰與多八紘四方四角也九圍九州又八方中央三皇五紀之尊其孰與先也三皇伏犧神農黃帝也五紀金木水火土也伏犧木紀神農火紀黃帝土紀金天金紀顓頊水紀以五行相生受命百代可知也太古之時燔黍擗豚污樽抔飲蕢桴土鼓燔燒也中古未有釜甑擇米擗肉加於燒石之上而食之污樽鑿地為樽也抔音步侯反手掬之也蕢音凷捊鼓杖也以凷土為鼓杖也冬則居塋窟夏則居橧巢寒則累土暑則聚薪柴居其上也未有火化食草木之實鳥獸之肉飲其血茹其毛文選茹謂啖食也未有絲麻衣以羽皮此上古之時也後聖有作然後修火化之利修治也範金合土鑄燒器用也以為臺榭宮室戶牖以炮以燔加於火上以烹煮之鑊者以炙貫之火上以為醴酪蒸釀之也酪酢酨也酢音醋酨音在有本闕此一句治其絲麻以為布帛以養生送死以事鬼神焉自太古至于今年世不可勝紀伏犧之後凡四十餘萬年變化財成為君為臣為人為民民劣下之稱也害益興亡害損也前儒誌之誌記也後儒承之浩浩紛紛未可一日而殫論也已矣殫盡也已上乃艾儒所敘天地開闢之事也涪水之濱北山野夫背華離俗為日久矣野夫謙也神清字靈庾姓章綿州昌明縣人兄弟三人出家師次也獨為頴拔綿州開元寺法雲和尚即其師也建中末卒于梓州惠義寺撰法花玄箋十卷釋氏年志三十卷律疏要決十卷語錄十卷二眾初學儀并識心澄觀俱舍決等論鈔共百餘卷尚志於古而所知不博率躬由道而至方是礙爰在始學簉于鄉塾之末塾學也禮云鄉有塾黨有庠聆儒風而悅之曰大哉儒言暨更業乎釋氏涉其涯始怖若河漢斷斷然無斁慊乎暨及也更改也涯始畔岸也莊子云驚怖焉其河漢而無極也斁厭慊恨也若患聞之不早聞也曰何其曰乾竺聖人乾竺天竺也聖人佛也云前劫既壞天地已空空而復成此劫方始世界成住壞空各二十劫自人壽十歲百年增一年至八萬四千歲却百年減一年至十歲名一劫如斯成住壞空共八十劫周而復始也是時空有微風風漸乎烈居此界之下寔為風輪烈猛也寔是也立世阿毘曇論云世界空二十劫後將成乃有毘嵐風鼓之而為風輪最居其下厚九億六萬由旬廣十二億三千四百五十由旬也大雲昇空降雨如軸積彼風輪之上結為水輪水輪最上堅凝為金如乳停膜是為金輪地下一億六萬真金所成上餘八萬金銀銅鐵等七界雜成俱舍論云水輪轉堅如乳凝冷也三輪既成雨自空飛霔金輪上既廣且厚雨渧如車軸晝夜不息猶如河瀉無數千年水厚二億四萬由旬廣十二億三千四百五十由旬周迴三十六億一萬三百五十由旬風擊此水清濁異質為梵世為空居有風名攝持吹令世界成又有風名旋圓起成東西二州復有風名琵琶起成南州復有風名四方四角起成北州初成梵世由宿因緣梵王住處如一四天下大是時梵王生此梵子亦生也欲界六天猶如夢覺俄思往事爾時諸天結群遍滿案行咸作是言昔日此處有須彌山善見城惡口園等如是皆憶也為寶石為山海為土地為宮室品物惟錯若風成山次第而上山則有頂若風起或正或傍山相或平或聳大地山川平凹岩洞穿穴皆由風勢不同也品類也錯雜也區域肇成上界諸天死者下生體有飛光足若御雲不飲不食年期無數有天捨報於中受生復有天人壽終生四天下受人道生是時諸人喜樂為食依喜樂住意生化身自然光明安樂而住飛空中行是時日月未出於世星宿未有晝夜不分未辨年歲無男女父母姓字等事洎乎地味如飴地皮孔甘林藤流芳香稻發滋是時大海乍增乍減開川源路水所減處有地肥出大甘美味生長覆地色香觸味可愛具足如細蜂蜜復有地皮人皆食之地皮盡已次食林藤林藤盡已有自然粳稻香味充滿也食此四者災乎其身其體堅重其光隱沒日月星辰從茲見矣時有一人嗅此地肥香味起欲著心指捻大味嗅而甞之知其甘美餘人相効良由地味身稍堅重不能飛行身光失沒既失光已世界黑暗遂生日月乃出星辰遂著蠲穢導氣人道成焉蠲除也明也有大小不淨之事導氣有男女欲染之事也忿悋既萌愛欲是興有父子焉忿嗔也悋慳貪也由有愛悋遂起貪為人所侵則嗔由此顏容醜陋福德鮮少神通則失矣有君臣焉畫野分邦列國興焉我疆我里貨殖阜焉閑邪討罪刑辟立焉閑防也辟法也此皆建國之本也自此閻浮提則有州之地因閻浮樹以立名也至于百億閻浮提自此四天下至于百億四天下東弗毘提利養勝故西牛貨州用牛貨易也北爵丹越心直善故此四州天下也距大鐵圍山距至也以鐵圍山遶之也皆同此時成為一大聖之寰宇也此大千世界同為一佛王化之境也至若人壽漸減減至于十減而復增增至八萬初二萬歲有鐵輪王次四萬歲有銅輪王次六萬歲有銀輪王後八萬歲有金輪王如此統一閻浮提至于二三四天下也鐵輪王統一天下銅二天下銀三天下金統四天下也今賢劫第九減也賢劫千佛出今當第九減劫也餘十一劫可知也於一減末三十饑饉二十疾疫十歲刀兵作矣是為小三災矣減至三十歲有飢饉災七年七月七日由漫風起吹其方所令時節失度穀米不成也至二十歲有疾疫災由惡鬼神損害於人七月七日也至十歲時有刀兵災于相殺害唯有刀杖以自莊嚴七日七夜而止劫既壞矣世界欲壞諸天變身似犀晝夜三宣告令令修無覺定最為妙樂於壽終之後生勝光天後七日輪起於空時大地須彌皆發火焰俱時洞燃以其熱故吸下水輪水如蘇油一切皆盡火災洞乎九天九天欲界六天并初禪三天也旋嵐蕩乎三禪旋嵐風名蕩盡也風災至遍淨天也水則湯湯然於焉其閒矣湯音傷水流貌水災至二禪故云其間七度火災一度水災七度水災一度風災萬化既盡自壞之空壞二十劫十九劫壞有情一劫壞無情也自此空二十劫空之既成復為後劫始也空已復二十劫成成已復二十劫住經曰成住壞空各二十劫為一大劫焉正法念處等經所明夫崇篤莫大乎天地崇高也篤厚也久遠莫過乎今古偉哉大聖知天地始知天地終知天之高知地之厚知三辰之昭昭三辰日月星也昭明也知時年反劫知古之往知今之來強視莫如夫天眼聲聞見一千世界緣覺見二千世界菩薩見三千世界佛見大千世界強聽莫如夫天耳所聞如天眼數強念莫如夫宿命宿住通憶過去無量劫事有此洞鑒而不盡天下者無之矣故覆燾之所不及日月之所不照如有頂無間等也霜露之所不墜四時不遷也舟車之所不載自然所獲如諸佛之界等尚達之於心目目則了之心則達之而況一區之蝸角乎昔魏𭭱與田侯謀約田侯背之魏瑩怒將伐之惠子聞之而見戴人戴人梁賢人也曰有所謂蝸角者君知乎然有國於蝸角之左者曰觸氏有國於蝸角之右者曰蠻氏時與相爭地而戰伏尸數萬逐北旬有五日而復返君曰噫其言虛曰臣請為君實之在四方上下有窮乎曰無窮曰知遊於無窮而返於通達之國謂往來也如一芥之在太山如一毛之附馬體何用爭之也哀余生乎此中為醯雞乎醋上小虫也為蟪蛄乎一名仙蛄一名螻蛄一名石鼠也夫何能知宇宙之遼廓年劫之悠永但諒誠於聖人也嗟己同於微昧何知天地之闊遠但誠信聖人之所說也夫積年以為億安得億年不為劫乎積土以為邦域安得邦域不為世界乎湯問革日上下八方有極乎革曰無極之外復無極也語在莊子意問世界有窮盡乎答云世界十方無窮盡也世界之外更有世界也與列子少異冉有問仲尼曰未有天地可知乎仲尼曰古猶今也冉求意謂問造立之前也答云天地壞而更成減而再興也是知古先哲王洎先儒非不有知者但默昭而已矣夫登蒙山而小魯蒙山魯邑東也登太山而小天下況有高於太山者乎太山東岳登之可以望天下也知天下之不大也況更高者故四海九州如毫末之附馬體誠不虛矣古者黃帝帝鴻氏也晝寢夢遊華胥氏之國有國名華胥在弇州之西台州之北不知斯齊國幾千萬里斯離也齊中也蓋非舟車足力之所及其國無師長自然而智無惡死無夭殤不知親已不知疏物故無愛憎不知背逆不知向順故無利害都無所愛惜都無所畏忌此皆華胥國風化之事也洎黃帝寢寤怡然有得夢中神遊及寤若有所得吾考思其國若北欝之天下也即北俱盧洲也立世阿毘曇云彼國無師範自然衣食定壽千歲不嫁他女亦不娶妻若有欲心諦瞻彼女女若見男視之隨到別處曼殊沙樹即便覆蔽欲事即成若不覆蔽知是親屬即不敢犯生兒不乳放四衢道行人以指內口嗍之七日成人無憎無愛任運而化也神清考其所夢似是比北洲也居九圍之外人間九州在瀛海之中居須彌北面大海之中也非天老力牧太山稽所知也三人皆黃帝之臣也帝鴻氏齊心服形求養身理物之道故神所遊焉非北洲則不如所夢也故吾教小聖謂中小乘人也前劫後劫各八萬見聞二千界天眼見二千界事天耳聞二千界聲等也中聖能知三千謂菩薩乘也大覺則既矣既盡也無所不知無所不見日月星辰麗乎中虛麗明也中虛空界也日月無興亡常在於天但運轉四世界為須彌隔之故有晦明也星辰無虧盈一晝一夜照四大洲日月長照二洲且如南洲日初出東洲正午北洲黃昏西洲半夜也南洲日午東洲黃昏北洲半夜而洲日出南洲日入東洲半夜西洲日午北洲天曉也餘洲倣此也向南北以分寒暑夏則日近北而月近南冬則月近北而日近南春秋平也風力所持不停不墮皆為旋嵐風空中任持運轉而不墮也在須彌之半下上有諸天居焉其宵旦短長頗與此方分至啟閉晷漏同也此西國俱舍成實等論所明也分春秋分也至冬夏至立春名啟立冬名閉日五十一由旬月五十由旬星巨一由旬微則一俱盧舍由旬或云踰善那此云應聖王一日應行之程或三十里或四十俱盧舍此云一牛吼地二里也小乘一由旬十六里也微小也下面庸乎火珠水珠庸用也火珠日也水珠月也而在魯之年星隕如雨魯莊七年四月五日如雨也在宋之都隕石數五左傳魯僖公六年正月隕石于宋五蓋皆云是星隕也蓋忽焉祥異矣儒說東南海之外淮南子稽聖賦等也大荒之中甘泉之間有羲和國有女名羲和生於十日常浴日於甘泉堯之世十日並出命羿射之羿古射官名九禽斃于地日中之烏也至德之萌日月若合璧五星如連珠五星歲也熒惑也太白也辰也鎮也有至德之君日月如合璧群星從東而西日月違天而東群星與天盤右轉從東而西也日月逆天盤從西而東也太昊畫八卦伏犧氏也通神明為書契代結繩女媧補天立極共工顓頊競為帝共工頭觸不周之山天柱折地維絕故天傾西北日月星辰就焉地不滿東南百川水潦歸焉百川皆歸於巽揚珠云太古之事滅矣孰誌之哉誌記也其磨滅無所志記也三皇之事若有若亡五帝之事若覺若夢三王之事或隱或顯未必周備夫如揚子之辨辨別也則吾從何質焉質信也仲尼云五帝用說三王用度言遠則但由言說邇則修法度事既已往但可以言說而知虛實無質三王近古依其法度或當或否也中國以天下之峻極者曾莫大於崑崙之丘焉崑崙山者按山海經云河水所出也漢書張騫尋而莫見上有五方之霞下有五色之波非大人靈仙莫往莫來故黃帝登之南望而旋軒轅也穆王讌王母于瑤池瑤池在崑山周穆王與王母會燕于此王母戴王勝豹尾虎齒主人間疫癘之鬼也乃自彼降巍巍乎窮造化之力矣此崑崙之山也而釋氏特以須彌聞其大也其山出海水八萬由旬崇袤相均四寶所成崇高也袤廣也四寶東黃金南吠琉璃西白銀北頗胝迦寶其下四方有層級彼最上者有四大天王宮室焉下有堅首持鬘恒憍三天為帝釋之外蕃作捍于修羅迹盧之頂方乎八萬其上廣八萬由旬其平如砥其路如纊砥磨石也纊綿也帝釋所都之地方各八天朝于中宮是曰三十三天焉須彌山四面各有八天中有善法堂帝釋所居諸天朝之共有三十三天皆是忉利一天所攝海上諸山多地居天蓋四天王之所都邑也故若方丈蓬萊居海中鼇魚負之行也年長貌美光碧紫翠以為房閣其務仙道者咸神仙遊集之鄉也願言羽翼而棲息之其天帝釋股肱輔衛有嚴有翼統彼諸天照冒下土御千輪殿網以珠綴煥乎其間有所顯焉故群黎罪福死生遐促吉凶期會其欲不見于珠中不可得矣罪福之事事皆見帝釋珠網中也是以上流有罪天執其罰故云天命極之也下民之罪天假其罰天生蒸民樹之司牧於善者福亦如之矣而君子稱禍福顯乎天命言簡在帝心也又曰吉凶不僭僭濫也差也言乾道正也故神農后稷在人周祖皆播種百穀以勸民代天之養也臯陶堯時治獄官也甫刑周穆王以齊侯呂伋為司寇使定五刑故曰呂刑呂侯後為甫侯故曰甫刑官也代天之刑也成湯周發成湯伐桀武王伐紂代天之討也傅說殷高宗之相邵伯周太保代天之治也其或享用五福五福一日壽二日富三日康寧四日攸好德五日考終壽也威用六極一日凶短折二日疾三日憂四日貧五日惡六日弱非聖人莫能見彛倫之象也尋常也倫理也大梵臣帝釋帝釋臣四天四天臣群神洎群后書曰敢用玄牡敢昭告于上天神后竊或得非大梵天歟否者天之蒼蒼無馨無臭孰為真宰焉非大梵而誰也夫有事于圓丘天子祭天於圓丘類乎昊天上帝類祭也饗靈威仰等五方之神東靈威仰南赤熛怒西白招拒北叶光紀中方含樞紐禮于日月星辰斯或大梵王天帝釋四天王等之事也凡五氣五郊五帝昇壇五神配饗百神從祀或四天王帝釋焉但後世行事率承古典古者洪荒朴略洪大也上古天地大荒純朴省略而已各以方壤所據氣運所成所據方域乘五行之運氣而王也裁為禮經呼其神祇以古事裁為禮經呼天地神祇也奠以牢牲其名雖異而事或玄符也故西域無壇墠築土為壇除土為揖祭告天地所也而有天祠與華夏互為風也昔趙簡子享鈞天之樂史記曰趙簡子疾不知人七日而窹曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動心也秦穆公拜鶉首之賜秦穆公夢天賜與金冊鶉首之地秦之分野鶉南方朱鳥之星鶉首鬼柳為鶉首翼軫為鶉尾也蓋神與天交魂往形居高卑雖遠其應孔邇天高地卑孔甚也邇近也申生為被髮之訴狐偃行次見申生使之御云夷吾對余無禮余得請於上帝以晉與秦後果如其言也上帝天也皆晉事也劉約有美玉之請劉約劉聰之太子夢入華胥國七日而活蓋天授其靈示死有知孰厥下民克誠克信孰誰也厥其也克能也若無其靈應下民孰其能信自此三十三天之上皆曰空居非獲神通不可以往凡有二十六所自炎摩天終非非想計二十六天也層雲重構年顏倍永自五百歲至非非想八萬劫也其或微雲其或微形統以三界昭其目也括以四生旌其類也統總也昭明也微細數目雖多總不出三界二十八天以攝之也胎卵濕化四生以旌表攝盡也渾天儀曰天如鷄子地如中黃地如鷄子中黃也地在天之內也居於天內天大地小表裏有水天地各乘雲而立水載而浮焉地在水外有雲浮之却有水裏又有天裏之天外有水却以雲浮之也有好問者曰設端以徵之也彼盤古判為厚地之趾其將安據歟彼渾天之外復誰與載歟而一家之學者邕邕焉何思何慮邕邕塞滯之貌也而可獲其事也河出崑崙山山海經河出崑崙在大羊同國蕃語謂崑崙山為悶摩棃山譯為紫山東去長安五千里又張騫本傳尋河至大夏見笻竹杖知與蜀地相連唯杜佑通典偏明也浸流積石山為禹所導經于中國東漸于海斯阿耨達池之一源也今黃河水即阿耨達池所出也其池自中天之北過七黑山距大雪山之陰香醉山南攝乎二山之間距至也山北曰陰攝迫也水在二山硤中而流也方五十由旬四寶為岸四面各流出一大河東面金象口流出天信度河南銀牛口流出天徙多河無熱池流出西徙縛蒭河北頗梨師子口流出各入四方之海也而東注之河自葱山分流潛邁也扶桑靈柯昇于大明此或閻浮樹也其大者百由旬其果可食佛在時有羅漢取得之自皮展手一臂方至果核分之以賜大眾其色如爛椹也盛乎此洲之南極也鯤鵬之大或則摩竭魚迦樓羅之類也莊子逍遙篇說有鯤魚化為鵬面南而飛展翼垂天此或則是經中摩竭魚金翅鳥等迦樓羅即金翅鳥王也楚王不識於萍實昭王過江見一物大如斗紅如日觸王舟皆不識令聘問宣尼云是萍實可以食之有德而出也臧氏命祀於爰鶋爰鶋海鳥飛而遇風遂泊魯東門臧文仲為大夫不識令控御而祭之孔子云爰鶋也其鳥大於驢也向使不遭孔聖則謂彼二物恢詭也恢大也詭怪也故方夏古今燕鄉越鄉於關內關外於其言蓋物同而名不同方者四方夏即中夏也燕在北越在南言語呼名有所不同也矧乎異域何相韙也矧況也韙是也須彌之趾八功德水以為巨海一清二冷三軟四輕五香六不臭七飲不損喉八不損腹深廣之量與須彌同須彌入水八萬四千海亦深八萬四千海環于山循海外涯有持雙山如輪圍海高厚之數若須彌之半其山如車輪繞須彌山號七金山一曰持雙二曰持軸三曰擔木四曰善見五曰馬耳六曰象鼻七曰魚觜出水四萬二千由旬上與日月齊焉餘山餘海間而繞之既降又狹相次半之第七山外方有鹹海所謂由乾陀海伊沙陀海佉羅眡海善見海馬耳海毘那多海尼民多海又云一鹹海二乳海三酪海四酥海五蜜水海六吉祥海七酒海而四大洲對妙高之四面各在鹹海之一方矣是謂一小世界一四洲也千小世界謂之小千一千四洲一千六欲天一千箇梵世名一小千界千倍小千名一中千一千箇小千界一千箇二禪名中千界千倍中千為一大千一千箇中千界一千箇三禪名一大千界也是知天地無窮品物流形孰為六合之外哉儒衣緇衣各理其優優勝也有務玄先生辯蘊儒學家富道書曰爾來余評惟釋氏之博大吾無以擬議雖聖人之末皆得於糟粕糟酒滓粕油滓皆聖人之殘末也而甘酸腴瘠腴肥也瘠瘦也孰不云乎異矣故遙劫非隷首能計隸首古之善算也曜靈非夸父能遂曜靈日也夸父逐日不及渴飲黃河而竭擲其杖化為鄧林也彼日域朱崖月窟玄墟蓋四海之有截截邊也東日域南朱崖西月窟北玄墟也渾儀昕天穹隆宣夜並古史天文志之名也歷造化之一塊耳古者中國聖人謂伯陽尼父等知來而藏往察往而知來窮神而知化原始而要終苟非其時道不虛行聖人知西國有佛以非時故未欲行其道也姑修伯益之經大禹之迹著三綱五常姑且也謂刪尚書等明九州治水山川之事被于諸夏是謂一天下也至若皮服雕題左袵窮髮題額也此四夷之類為王化之所陋其歸命貢琛有來則書否則已已不書之況在大千之野浩然無垠於方冊斯闕不欲衍其文也聖人慎疑其未審之事不欲書之有以釋宗為誕誕虛大也彼流競者也夫誕則天厭之久矣安得行乎天下哉誠恐槍榆枋則笑乎南溟之遠也尺鷃飛所不過槍榆枋而笑大鵬一飛九萬榆枋二木名槍七良集也故酌聖人之心以求則萬計或一萬慮一獲也封區內之心以求則於一罔克罔無也克能也則於一事亦不能也封滯也夫蠻與觸蠻觸二國之事如前蝸角處已解聞僬僥侏儒盈尺之軀寔駭寔實也駭驚也僬僥國人長一尺五寸侏儒國人長三尺也僬僥侏儒聞防風鄋䐽長狄僑如此國人並長三丈僬僥侏儒小人也其骨專車其喉戟舂皆大人也吳破塗山獲專車之骨問夫子云禹時防風氏後至戮之此其骨也鄋䐽國長狄喬如伐魯叔孫得臣以戈舂其喉而殺之也其駭亦蠻觸耳彭祖之傷於殤子也彭祖殷大夫姓戔名坑字長孺壽年八百歲二十歲已下為長殤十五歲已下至十二為中殤七歲已上為下殤也而不知為王母之殤子也蛇以鉏鋙傲乎風鉏鋙不齊貌也夔以跉勅錦反踔丑略反傲乎蛇趻踔跛也蛇雖鉏鋙不端齊而行猶勝風無形而行夔雖一足而跛猶勝蛇全無足也故恃小者不知其大恃近者不知其遠恃寡者不知其眾夫何不然哉聖人生第二道契無為仁高有象德掩群功化周萬行稱之曰聖易云聖人與天地合其德此正指釋迦牟尼聖主降生之事也惟周王二十四年甲寅春二月八日大聖誕于迦維姬周第四主昭王名瑕康王之子在位五十一年二十四年歲在甲寅四月八日佛生于迦毘羅衛國歡喜園中無憂樹下即淨飯王城中印土是也敷德教于五天此周人之不知也東南西北中五印土皆稱為天本梵天之裔也敷布也化在西國周人不知也初河泉泛溢大地震動瑞氣浮空入貫太微遍乎西方作青紅色周人雖不知於四月八日晨朝忽見地動泉溢望見西方有虹光等瑞上貫紫微王問太史蘇由曰若何祥乎昭王見西方瑞相不測而問蘇由也大史占天文者史曰有大聖人生在西方王曰於天下何如曰即時無他一千年後聲教被此太史以古書占知西國有大聖人降生王疑屬於彼土故問天下如何答以千年之後聲教方及於此即今無他自周昭二十四年至後漢明帝永平十年計得一千九十六年矣王因刻石于南郊用紀此事出周書異記昔高麗問於齊人而法上亦以此告高麗未達佛生之事而問之齊人高僧法上亦引此文而對之也夫昭王承文武成康之烈文王武王布德開基成王康王讚承帝祚以至於昭王也刑措國治措置也向能正思無為謹變乎道而目觀其瑞心不精求蓋福應斯來有數故也昭王雖覩奇瑞不能求訪聖人而南巡楚鄉膠舡溺於漢水此蓋聖人緣合有時故也昔世界初成有千花見焉遠表賢劫有千佛興矣昔劫初時海中有千蓮花出見表有千佛出世今第九減劫人壽六萬降至于百而四佛利見于天下今第九劫中人壽六萬歲時俱留孫佛出世四萬歲時俱那含牟尼佛出世二萬歲時迦葉佛出世人壽百歲時釋迦牟尼佛出世也餘佛在於餘減劫餘九百九十六佛出餘減劫也大聖以嗣聖之儲位繼迦葉佛之後也自知足宮降神于王家光被百億其所將從乃大威德天格于上下神祇至是鬼宿合時於毘嵐園波羅樹下右脇而生也格至也知足即兜率也毘嵐此云婢守波羅樹即無憂樹也以右者順也脇生者異凡也古者樞虹應誕表厥命世故大聖亦以白象為瑞也顓頊高辛等皆感虹光繞樞星而生其稱命世之君佛亦以日輪白象而生表其瑞也古者八采重瞳陟于元后陟升也元大也后君也堯眉八采重瞳故大聖亦以三十二相示昇階也國有老仙老仙謂阿夷頭耆或云阿私陀也言於王曰嗚呼王子有奇表在家為轉輪王出家成無上道觀乎相好炳著不得在家矣炳明也著見以王子之相好恐不得在家為輪王多出家成道也淨飯王聞之心忉怛焉忉怛悲慘也誠國嗣不在此則吾氏泯矣信如先生所言若太子不在家為輪王即恐吾氏族無繼紹而滅絕也黎民弗保子孫其賓於國乎其國安在哉保守也失國子孫為二王後乃稱國賔其圖惟安則剪其心立保傅以作訓歷射御以昭藝王子乘羊車詣學堂行在三之教謂世子入學與國人齒讓也一父在故讓使知父子之道二君在故讓使知君臣之義三長在故讓使知長幼之節也於是選師友教太子六十四書等也由是駕象弦弧馳騁捔逐備物致績莫有不為天下先者將思謀安安之於家則宜剪其脩行之心立師保訓以至文武之道擲象射鼓角抵之戲備物致功無有及者爰復考少陽之宮徵傾邦之曼玄黃頳練綽約繽紛考成也曼長也美女長弱列子云娥媌靡曼也為太子立宮既成徵求美女謂娶善覺王女耶輸陀羅等飾玄黃之服綽約繽紛乃容儀舉動之貌擊石拊石鼓琴鼓篁石樂磬也此謂悅之以音樂也姑務以歡娛榮宴狂醒蕩慮闇鈍耳目泊其道性姑且也泊淡也而歲始芳謂二月八日也感應時來鬼神合謀謂淨居天子至也夜未艾艾正也又中也哀含膽肺厭極嬪嬙策素馬以凌虛詣青山而斷髮太子於是逾城矣爰祈作佛也體常樂而化成天下者也嗚呼人謀蔽於鬼謀鬼謀蔽於天謀蔽猶暗也人謀況議於眾也人雖有謀暗思神之謀而不得用也人謀從欲天謀從道鬼猶非人之敵而況資於天乎是故抱關士虛謹其戶抱關謂閽者挈壺氏虛謹於時周禮有挈壺氏掌箭漏者宮衛偃甲禁兵之屬也軒懸失舉樂奏之士也彼昏迷之不暇豈能致勤於其職也故應生之質雖曰天性功存被物而不得行乎天性矣父子之道天性也佛雖以應現化生之身而本在濟物濟物之行必假道成道成不可在於愛欲是以不得不行乎本意之事也父王遲其不歸宮室曖而無輝曖暗也顧彼山林悠然長往涕泣漣洏詔族父洎伯舅氏五人而往求之即俱倫五人等皆太子族也令入山求而伴之也令候其暄涼遂其行藏無咈太子之欲咈違戾也過六載載省載悟枯餒之行不為功德乃以腴腸實腹為至道之器大載日餐麻麥為降外道乃云吾有一法世莫能知一切眾生皆依食住遂受乳糜六斗四升而餐之乃成道也以是月以是日以是夜夜何其銀漢已轉群動已息據金剛座如龍蟠結戡剪大難萬德來朝巍巍乎浩劫鴻勳爰𨍐于箭漏之間耳以十二月八日食乳糜已尼連沐浴於金剛座入定示將三界九地諸惑斷之以三十四心而成正覺也夫天期昭昭之多地一撮土之多山一拳石之多海一勺水之多昭昭耿光也天以積小明而成地以積撮土而成山以積石而成海以積勺水而成也並中庸篇文也故積而為大能致大用大士往修大行舉善無遺以普賢願普入一切普賢行願如華嚴經故於茲辰其身遍坐一切道場而小智觀之以丈六大士觀之以遠大遠大則該乎報體丈六則專乎化軀其猶自牖而窺於天道隨隟而見乎多少爾雖以丈六之身於伽耶畔金剛座上成等正覺而實量無齊等非屬三界悲夫苦海混淪瀑流洄澓疇先觸涯俟濟吾必津之以道焉疇誰也涯岸也俟待也濟度也津濟也誰先觸涯岸求渡苦海者吾當濟之由是四顧躊躇經三七日乃朝步造乎施鹿林施鹿林者古佛前化林在波羅奈國昔王有千鹿將盡殺之如來提婆達多俱為鹿王各領五百遂告王曰許日供一鹿供次者身有孕鹿王乃代往王感其仁慈遂盡免其鹿即以此園施鹿遂號施鹿園也今獲五人於此地即五俱倫也一者憍陳如二者十力迦葉三頞鞞即馬勝也四者跋提五者摩訶男也符其往事矣殆微言三轉所謂見道脩道無學道三轉法輪唯大器前悟也餘則末吾知也殆及也末莫也雖云初談四諦而其間悟入不同是時地祇興聲百神咸和上暢于九天云天初禪三天共九天有耳識也下遍于黃輿黃輿地也淮南子云地形如車輿旁流于八方人天交慶日月貞照莫不踊躍莫不抃呼群靈熙熙于胥樂乎熙熙和也胥相也萬聖樂推以大覺為法王者也穆王時西極之國有化人來入水火貫金石返山川移城邑乘虛不墜觸實不礙千變萬化不可窮極當周穆王時已有化人來至但群生感應未興故也既以變物之形又且易人之慮既能現神通又能化人心慮也穆王敬之若神事之若君化人無何謁王同遊王執化人之袪騰而上者中天乃止謁請也袪衣袖乃暨化人之宮搆以金銀絡以珠玉出雲雨之上而不知下之所據望之若屯雲焉王自以為居數千年不思其國王居化境不思返國化人復謁王同遊所返之處仰不見日月俯不見河海光彩所照目眩不能得視音響所來耳亂不能得聽此乃化人與穆王遊入諸佛淨土也王請化人求還化人移之王若墜虛焉既悟所坐猶向者之處王問所從來左右曰王默存耳左右見王默坐而王與化人神遊淨土耳王自三月不復更問化人化人曰吾與王神遊也形奚動哉且曩之所居奚異王之宮曩之所遊何異王之囿王大悅竊思被所遇者佛矣如來在世雖聲教未被於此而佛亦曾來矣而未悟是佛也惜哉胡獲焉君陳曰凡人未見聖若不克見既見聖亦不克由聖誠在此矣此乃周書之文孔氏注云凡人有初無終未見道如不能得見已見聖道亦不能用之所以無成也今穆王見聖而不能求趣聖信為惜哉其菩提樹凝陰厚也金剛座無傾動也在摩竭陀國伽耶山西南十四五里即畢鉢羅樹也莖幹黃白枝葉青翠冬夏不凋光鮮無變高數百尺金剛座居其下菩薩證聖之所亦曰道場大地震動獨無傾搖也樹為座之表居其座則蔭其樹樹宜勿剪勿伐之美也座當不騫不崩之固也皆邵伯之詩也聖人之道成而德重天下其不在茲餘所弗堪也宜存其舊物以表聖跡也故外國先王䤿石為像南北標志以觀遺化也䤿刻也於金剛座菩提樹下刻二大石菩薩後世佛法若減菩薩沒地奘公去日已至胷也老氏生于定王老子周定王三年九月十四日生于楚國陳郡賴鄉曲仁里姓李名耳字伯陽諡聃也仲尼生於魯襄仲尼以魯襄公二十一年冬生于魯國平鄉也老氏默識於能仁仲尼問禮於伯陽清淨法行經以大迦葉為老耼以儒童菩薩為孔丘西昇經云道經也吾師化遊天竺善入泥洹此乃老氏默識能仁也斯守雌保弱之道也不敢為天下先之訓也老氏之德全於是乎詩云無競維烈老氏有焉此毛詩清廟之什競強也無競競也此詩美武王有伐紂之功烈業也能強其功業如老子有道德不為天下先也符子云老子之師名釋迦文符朗字元達符堅從弟為青州牧為謝玄所降歸晉後為王國寶譖而殺之有識度善別味著書數篇號符子此或追老氏之言也昔商太宰嚭則吳太宰伯嚭也問於孔子曰夫子聖者歟曰丘博識強記非聖人也三王聖者歟夏禹文命湯王履周武王發為三王也曰三王善用智勇聖非丘所知五帝聖者歟少昊顓頊高辛堯舜為五帝也曰五帝善用仁信聖非丘所知三皇聖者歟伏犧神農黃帝謂之三皇也曰三皇善用時政聖非丘所知太宰大駭曰然則孰為聖人乎應言上古皆非聖者太宰所以大驚也夫子有閒動容而對曰西方有聖者焉不治而不亂不言而自信不化而自行不以干戈刑憲而法界之內率服得不治而不亂乎不以號今誓約而龍天莫不圍繞得非不言而自信乎蠢識信向物類知歸得非不化而自行乎蕩蕩乎人無能名焉此乃仲尼以知西方有佛故此答太宰也是知儒道昭融如日在天而能謙虛若此蓋釋師之黨潛化著矣三教玄同彛倫克諧但法被乎多方經籍出乎多門釋宗以因果老氏以虛無仲尼以禮樂㳂淺以洎深籍微而為著各適當時之器相資為美其猶天地四時不以麰薺故不春麰大麥也薺甘菜也菱苕故不秋菱苕草屬也故儒教漸至也殷湯改祝孔釣不綱桀君無道置網祝日從天地四方來者皆入吾此網殷湯除其三面唯開一面改祝日請負命者投吾此網論語云子釣而不綱但以一釣取之雖殺不多此皆儒教漸行不殺之文也老教中至也一曰慈二曰儉三曰不敢為天下先此道教謂之三寶也釋教極至也自鳥獸芻土違而必懲律文之誡也如有用釋教者使人居乎漏盡如有用老教者使民至於冲和如有用孔教者使民登乎仁壽是以大聖生于盛王謂周昭之代五天之人千乘之邑百乘之君階于聖智者也千乘之邑百乘之君謂淨飯王之諸侯也以佛生之世國皆證果齊聖者也二教生乎衰世而大道躓于陵夷自周第十二主幽王寵褒姒失御天下平王遷都洛邑諸侯專征禮樂崩壞謂之衰周也故老聖潛其龍德隱於柱下紫氣浮關邁于流沙老子為周柱下史見周德凌遲遂出關往流沙因為關令尹喜說道德二篇也仲尼祖述堯舜憲章文武自衛返魯而修春秋感其靈應反袂拭面稱吾道窮皆非其志也仲尼以魯哀公十一年自衛返魯十四年西狩獲麟而修春秋也而知道者關尹也知儒道者顏回也行二教者百王也老氏為高仙仲尼為素王聖謀洋洋與天地而無窮者也時有慍見者曰此乃假賔主問若不貶二教已甚矣而胡德之歟胡何也乃可教而何德之有余謂彼不知矛楯者也昔有賣矛楯者雙誇其功言楯則矛刺不入言矛則能穿十楯或云賣汝矛而穿汝楯如何彼無詞矣吾經以二士為至化今鄙之為迦葉為老子儒童為仲尼也則何反其義哉穆王五十二年壬申二月十五日大聖示滅焉是日也黑雲四起大風動地西方有白虹十二道南北通貫連夜不滅王問太史扈多扈多曰西方有大聖人滅是其衰相耳初穆王聞西方有聖人又亟覩光氣亟數也慮非周道所宜慮其聖人來侵土墳也命呂侯會諸侯於塗山塗山在會稽吳越分野呂侯呂級也以備其變至是靡不大啟沃也今聞西方聖人滅無不慶悅也昔大聖顧託大龜氏法藏大龜氏則大迦葉姓受如來之顧命也事畢詣于雙林道場即俱尸那城跋提河畔也末命七寶床上北首而臥於靜夜中寂然無聲正遍知月隱于大涅槃山佛身喻月圓寂喻山萬彙號慟泉填岳墜惡星驟墮諸河返流阿難心沒憂海羅睺羅但觀無常有學無學愴然悠逝諸天稱曰苦哉其娑羅林梵云娑羅此云堅固凌冬不凋也四雙八隻合為二樹垂條下掩離離皓素如白鶴色以是謂之鶴樹也勁葉含霜凌冬不凋故謂之堅固林也初大聖將復乎無為則未滅前發毘舍離至于南河岸上履大方石顧阿難曰此吾最後望金剛座及王舍城所留之跡也毘舍離國在恒河南中天竺界七百里賢聖於中結集處即毘耶離國也故今石上有佛雙趾長尺有咫一尺八寸也廣三之一闊六寸也下有千輻輪相指端萬字花文及瓶魚等光爛爛焉至今石上有此文見自古邪徒毀而還復原茲聖人寄跡以表教教存而跡不亡觀者泣其依然則長想之懷有在矣周之二月今十二月也周朝十一月建子之月為歲首則今十二月乃是周之二月也十五日西土之晦也西國於一月三十日內分前十五日為白月後十五日為黑月自月一日為白月朔十五日為白月晦自十六日為黑月朔盡日為黑月晦也彼十二月各以星名呼之正月利咀囉二月吠舍佉三月逝瑟吒四月頞沙茶五月室囉伐拏六月波囉鉢陀七月頞濕縛庾闍八月迦剌底迦九月伽始囉十月報沙十一月磨佉十二月頗勒窶拏也星始為朔星盡為晦故此十六日當彼之朔也合三十日成前十五日白月後十五日為黑月也半月前號黑魄死謂月初黑景漸消也後半月號白明生也謂十六日時月光正盛分十二月為三時肇正月十六日至五月十五日為熱際謂夏正也自是十六日至九月十五日為雨際自是十六日至正月十五日為寒際涼暑之風稍與此曆象會耳古者三代之正有所取捨夏后氏尚黑建寅為正夏禹姒姓名文命以天錫玄珪之瑞以建寅之月為武首號人正祭祀旌旗衣服皆尚黑以平旦為朔也殷人尚白建丑為正殷湯子姓名履字天乙有白狼銜鉤之瑞以建丑之月為歲首號地正祭祀旌旗衣服皆尚白以五更時為朔也周人尚赤建子為正周姬姓名發有火流王屋之瑞以建子之月為歲首號天正祭祀旌旗衣服皆尚赤以夜半為朔也而大聖在乎周年故得以十一月言正異乎今之世也佛既生周代凡經中所有年月皆取周朝正朔與今建寅夏正別也是月也天地否閉龍蛇斯蟄微陽潛布於下泉匃萌未達於上土以茲生者應氣運而來以茲滅者應代謝而去也北山和尚以佛滅乃用周正涅槃與今之二月十五日涅槃別也句萌則物初生如鉤也萌生也夫居終而不能死者非聖人也聖人與物無滯其生也示相同凡其滅也示化歸真雖現生而無生雖示滅而非滅也既死而不能生者非聖人也此方緣盡見化他方非同小聖灰身而已故云常在靈鷲山而實不滅度也非死非生而能死生者是謂大聖人也本不屬於生死而示同生死真大聖也而六合之間萬類職之未捐於有為未窳於無為生而復生未始有極而聖人應生者亦何有極焉職主也捐捨也窳憜也佛是萬類之主而未捨於有為故示相未怠憜於無為故化終而歸寂此方緣盡他方化故未有極盡者也是以大聖生可生之世滅可滅之世生滅在物固不在己也示相生滅真本元無故云而眾見劫盡大火所燒時我此土安隱八日而生表始華而就滿也周四月佛生是今二月也物正榮華八日者月漸圓滿也十五日而滅者顯自盈而之虧也以十五日月圓之極慮眾生起常見故現無常十六之後月漸虧也滿則滋華虧則害盈以八日漸滿故滋於榮也以十五日後漸虧故害盈也揆其日是以見生滅之有為耳又方晝而誕反晝而逝者蓋生顯死晦旦勤夕逸之徵也佛生以晝入滅以夜者蓋生則顯明也死則晦暗也又生居旦必有勤勞之用死居夕乃是閑逸之義也嗟乎群生紛紛若乎在夢或有見佛生者滅者近者久者體常存者本不生者隨心所悟不同化相雖有多般法身本無生滅也譬同室而異夢彼夢者不知彼所夢也且有大覺而後知彼所夢者也有聖教說佛以四月八日生七月十五日降生二月八日逾城十二月八日成道二月十五日入滅又有聖教以二月八日生二月八日逾城二日八日入滅又有以二月八日生十二月八日逾城十月八日成道十二月十五日入滅諸部所記不同如一室而異夢也果有其分而異者不能合其同而同者不能離其異也以今四月八日生者據夏正說以二月八日生據周正說即今北山和尚是也俱以二月八日乃天竺小乘別部所計也有以莊王十年為佛生時按據魯史曲裁經意但多穿鑿之美此乃費長房以周莊王十年是魯莊公四年恒星不見星殞如雨便為佛生此乃據春秋妄為穿鑿也佛生是周第四主昭王二十四年四月八日生莊王是第十五主也又恒星不見是四月五日乃是佛滅度後文殊菩薩於雪山化五百仙人而歸本國光明掩於恒星不見也有以三月十五日為佛滅時蓋西域他俾羅部之言餘則不然也老聖為秦佚之吊若復歸周也莊子云秦佚入吊老子三號而出也仲尼夢奠於兩楹仲尼云夏后氏葬於東楹周人葬於西楹殷人於兩楹之間吾殷人之後其亡乎遂卒也俯萬化而同盡也天智出宇宙死齊宇宙其真耶其權耶真則象聖權則乃聖匪真匪權則以見起滅之心矣宇宙者天地也若人智出天地而生死與天地萬物同者問其是真耶是權耶若是真則象稱於聖矣若是權化亦乃得為聖焉除斯之外若不屬真之與權則無由達生死之心矣
