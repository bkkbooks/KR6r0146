body:
  text: 法籍興第三此篇明如來一代時教經律論興建之由也道樹降魔穆清天下佛初成道於伽耶城菩提樹下金剛座上以智慧力降魔之後法界肅靜也垂世立教四十九年以三十成道四十九年説法度人七十九歲入滅也以經律論為三藏也經為修多羅藏律為毗奈耶藏論為摩得勒迦藏也以五戒十善四諦十二緣六度為五乘也五戒為人乘十善為天乘四諦為聲聞乘十二緣生為緣覺乘六波羅蜜為菩薩乘統之以十二分一契經二應頌三記別四重説五自説六緣起七譬喻八本事九本生十方廣十一希有法十二論義亦呼十二部教也開之為四宗經律論呪教始興乎一音而大協于群心目之曰甘露亦謂之毒鼓應其病者除其熱惱故曰甘露不應其病起煩惱故謂之毒鼓至聖既沒而微言殆絶至聖即如來也大迦葉遽命應真之侶千人撰定詮序俾罔墜厥旨王城始會造于石室撰音選自佛滅度荼毗之後大迦葉命羅漢千人往畢鉢羅窟結集法藏請無憂王為檀護主也龜氏尸其位尸主也龜氏迦葉也首唱優波離令誦律部優波離者是諸釋子剃髮師諸釋子出家遂以瓔珞環釧奉之波離得已內自思惟此人性高體貴尚能捨去況我貧賤守寶受苦乃懸樹上誰有須者任意因求出家常弘律部波離避席將就座大迦葉初於畢鉢羅置三法座一令集律藏一令集經藏一令集論藏故優波離起就座也禮僧足而升執象牙扇如先佛所説不愆于文字一依佛在而説並不愆少一文一字也一千漏盡迭察迭書再覆其言然後乃定滿八十反號八十誦波離旋記而説大衆旋書而集之也次命阿難阿難本以身居有學不得預衆被逐在堀外乃以三界九地惑束為九類起九無間道斷九解脫道證然後獲得三明六通以神境通從戶鑰孔入故得在會迦葉乃令集經藏迦旃延集論藏阿難曰諾如波離過三月飲光虞逸亡以願智力觀之無褊慢矣飲光即迦葉也虞慮也逸亡散失也恐經日久散失遂常以智願觀之無於怠慢也凡百年夷路既廣人用知訓自佛滅後迦葉弘持法藏二十年付阿難亦二十年又付與末田地二十年末田地又付商那和修二十年商那和修又付與優波毱多五人共一百年弘持法藏也百年後毱多違世法驂𢍿軸違世遷化也服外謂之驂𢍿殘也喻毱多滅後而法乘摧毀也雖跋闍干紀擅興十過而離波多等七百無著人殄之如金僕姑而穿魯縞矣佛滅後百年毗舍離國有跋闍子比丘説十事為清淨謂指抄食飲酒受畜金銀等十事皆佛制不許長老離波多與一切去上座三浮那及搜婆村長老等七百羅漢作羯磨而殄其罪也出四分律五十四卷縞素帛也金僕姑箭名魯莊公以之射南宮長萬也暨大長老摩訶提婆即大天也本土火羅國商主之子因父他往染其母父歸殺之後殺其母及阿羅漢懼罪而求出家聰明博達三藏竊聖人之譽怙王者之力自云我得羅漢入無憂王宮常為王者之師怙恃也鄙爭為心離析是謀增損佛語黷亂聖典因僧十五日説戒而妄有稱説黷亂聖言與僧不和也群聖叱其庸違僭而不經上座聖衆責其違亂佛語遂成爭競王不能和也其徒蝟張剪為冠讎大天之徒如蝟毛而張熾與聖衆共為寇讎也群聖不克禦侮克能也大天部強盛聖衆部不能制止也遂破為二部大天為大衆部聖衆部為上座部二部派流有蕩不返逮數百年浸為二十部大衆內分出成九部一説部二説出世部三雞胤部四多聞部五説假部六制多山部七西山住部八北山住部并本部成九也上座部分成十一部一説一切有部二雪山住部三犢子部四法上部五賢胄部六正量部七密林山部八化地部九法藏部十飲光部十一經量部雪山部則本部也成二十部哀哉化醇為醨大義於是乖矣醇濃醨薄也佛滅度自百年之後分為二十部法味澆薄也析金爭㲲分河於是飲矣譬如一金杖分為五段段段皆金如佛法分為五部也迦葉佛父吉利枳王曾作十夢皆表釋迦遺教弟子內一夢見一張白㲲二十人爭此㲲㲲終不破表此二十部大小乘爭後遂分河而飲水也故諸部云如是契經我部不誦而於自部皆至于解脫者也各以自部教是佛語他部則非也其大乘宗智論謂文殊師利與諸徒大會于鐵圍召阿難誦之非諸聲聞所預聞也智論亦云智度論説大乘結集乃是文殊菩薩與阿難等在鐵圍山結集時皆大乘聲聞小智不預其衆也聲聞聞之迷亂倒錯斯或別乘之謂也謂二乘實聲聞也或不回心之人也謂定性聲聞定不回心灰身滅智者一類聞説大乘迷錯不信也餘經餘聖貶不由論豈行之艱而亦不能知者乎或有餘部經教及諸部聖人貶論而不取者蓋以論是慧學義理深玄學之實難而知之亦不得易也彌勒造瑜伽凡一十七地一五識身相應地二意地三有尋有伺地四無尋唯伺地五無尋無伺地六三摩呬多地七非三摩呬多地八有心地九無心地十聞所成地十一思所成地十二修所成地十三聲聞地十四緣覺地十五菩薩地十六有餘依地十七無餘依地也備舉三乘開張演布梵云瑜伽此云相應謂一切乘境行果等所有諸法皆名相應也即十七地稱之為師後諸學者以文殊為法性以慈氏為法相法性以真理融觀為門法相以識相行布為旨各封涯域互馳章句自伐其美後人所宗性相有殊宗性者以融觀為美宗相者以區別為善各黨其宗者也致使西極東華人到于今有南北兩宗之異也故南宗焉以空假中為三觀觀遍計煩惱空處能顯真理為真諦觀觀依他假有為俗諦觀觀真俗混同為第一義諦觀也北宗焉遍計依他圓成為三性也遍計依妄情而生依他假衆緣而起圓成即真理者也而華嚴以體性德相業用範圍法界即能所證體用而論範圍籠羅也得其門統於南北其猶指乎諸掌矣學華嚴者盡達性相之原俱盡南北之旨印土傳法自大龜氏至師子比丘有二十四人雅紹真誥流演溥暢自佛滅後大迦葉弘持法藏以至師子比丘共二十四人雅繼能仁之軌躅妙弘祖聖之玄風也暨師子遇害於罽賓自是相承相付泯矣師子比丘傳法至罽賓國為罽賓王害之自後法藏雖傳其道澆也然戒法防患獨為大聖所制戒者梵云毗奈耶此云調伏藏以防非止惡調伏有情三業如來親制最為付囑以戒即七支之業業性甚深獲業智力乃窮其數七支身三業殺盜淫口四業惡口兩舌妄言綺語共為七支也獲智力者了業之數故開遮持破關乎損益而前佛後佛皆不寄口而言之或法之中有開則許其通容有遮則絶其為作持為堅守不犯破為誤犯不持也律藏是佛親制不因寄口而傳説也又峻設其防言不浮行心資定慧以至懸解如來明立禁戒峻設遮防浮泛也心習定慧以至懸解懸解者若以繩繫物而懸慧解了達若解之也故亦謂之波羅提木叉也波羅提木叉此云別解脫戒謂七衆所持各別而解脫又持一戒得一解脫經通五人説智度論云五人者一佛二弟子三神仙四天五變化也以彰善惡導物起信刊定邪正皆得謂之繩墨義也彰明也病也病於惡而明於善導引起生也有不信者引之令信不定者刊削之邪曲者則正之如世繩墨能正材之斜曲也窮括性相不令散失貫于人心皆得謂之結鬘義也經內性相無不窮括義聚前後聯貫猶若西國之人以線穿貫花鬘而為嚴飾也至言有準規矩合度而民是則之皆得謂之法義也猶若王言出則天下準承規者圓也矩者方也方圓皆合其制度為人之準故名為法法者則也其言如蘭其信乃恆天下酌之而不知其竭皆得謂之常義也蘭香草也恆常也若湧泉而不竭故謂之常也論通弟子造以能合離真俗舒蓄名理壼奧在彀風味淵派法義之所由生故皆得謂之摩怛哩迦也論者循環研核究暢真宗為義本唯佛説散在衆經後乃大小聖弟子通亦造之而能離合真俗區擘色心定有無之指歸盡名義之壼奧其唯論藏乎梵云摩怛哩迦此云本母能生智慧如母生子也矯伏擒縱啓塞關徼矯詐也伏順也擒奪縱放也論義之道或詐現縱伏而後奪取其義也啓開也塞閉也關門鑰也徼小路也論宗有開有閉有遮防塞其關要也發期爾的弛有餘勇發言之道須有準當若箭發機須期中的弛放也放其義題須令勇氣有餘也苦理門四宗中不顧論宗等也外道異黨莫余敢侮論乃摧邪顯正故外道之徒莫敢侮慢也故皆謂之優波提舍也梵云優波提舍此云論義也法謂所對屬於所照之境慧則向觀謂能照之心向則克滅謂能證智起則諸惑皆滅也觀則克聖謂慧照理若燈之照物則能顯於聖道故皆謂之阿毗達磨也梵云阿毗達磨此云無對法佛昔一時有言曰彼此中間而入於定佛一日言彼此中間三件未指而入定也諸大弟子各以己解競宣聖意或以生死為此涅槃為彼道為中間生死謂分段變易二種生死為此也涅槃謂四種涅槃所證之理為彼道則能證之智為中間也或為眼根為此色境為彼識是中間根為能照境為所照識在中間為能了別如是乃有五百言不相與志不相奪雖各不同亦各言其志也暨大聖起定舍利弗等騰情稽疑佛言我説觸為此集為彼受為中間觸為對境集為能染心受於中間領納也爾曹雖非我意然皆為滅苦之因並應受持不宜忘失也曹輩也弟子所説雖非佛之本意然亦無爽道理也故佛日未亡舍利弗造集異門足論二十卷一百八十九紙玄奘譯目連造法蘊足論二十卷一百七十八紙玄奘譯迦多演那造施設足論一萬八千頌此未見行上三論皆是如來在日諸弟子造也玉毫既晦提婆設磨造識身足論十六卷佛滅後一百年造玄奘三藏譯世友造品類足論十八卷二百九十紙佛滅後三百年造戒身足論三卷四十九紙世友造已上謂六足也迦多演尼造發智論十六卷三百六十五紙大義具足故號此論為身以六足為足也佛滅後造凡七論奮揚才藻控越風猷傍求聖意式弼神化其大窮天地其細考鄰虛七論並小乘之文辭藻宏曠風規超奕至於性相心色無不具論也鄰虛極微之塵也方諸儒門三傳四詩各金玉其音也三傳一左丘明傳二公羊高傳三穀梁赤傳四詩魯詩魯人申培公漢武以浦輪徵之已八十餘以詩經為訓口傳無傳也二齊詩齊人袁固生所傳三韓詩燕人韓嬰所學四毛詩河間毛公字文操所傳於子夏也由是四百年初迦濕彌羅國五百六通依發智論撰大毗婆沙佛滅後四百年初有羅漢名迦旃延子擊乾稚普告十方諸天及賢聖不得入滅有於佛所聞一曷一句皆會迦濕彌羅國諸聖既至遂集所聞是者取非者去乃成大毗婆沙此云廣解禁之不令出國謂婆娑頭拔尊者潛入彼國誦之出國歸罽賓傳之後方流於諸國也備釋三藏謂經律論以品有八譯者謂之八蘊亦日八藏是也蘊藏皆聚義也即八揵度至五百年龍樹學窮域內自謂一切智人方立為大師阿耨達龍引入于宮示以塵沙祕藏愧所負罪九旬假誦於龍宮而特悔其所稱者也龍樹本南天竺國梵志也誦四韋陀因入王宮厭欲出家經論誦盡嫌佛所説經不多後龍王請入宮經九十日點經題不盡深悔言失通解造智度論十萬偈天竺立廟敬奉如佛其所誦習人間或得之由是廣製諸論丕守先教丕大也謂大能弘守先聖之教也洎千年世親初學小乘常欲不利於大乘其兄無著愍之假疾召使至具以微言誨天親退而省其咎矍然將自援刀斷舌無著聿來其前止之曰罪自汝心匪舌之咎昔既以毀今盍以讚盍何不也斷之何補焉遂乃制論千部或宗或釋翊贊于五乘也天親菩薩北天竺留婁沙富羅國人兄弟三人俱在有部出家兄無著先悟大乘常往兜率請彌勒説瑜伽天親在有部日先造小乘論五百部廣非大乘後因無著化之既悟大乘乃却造五百本大乘論廣贊大乘故號千部論主也秦正世秦始皇姓嬴名正字祖龍秦襄王之子收六國築萬里長城令方士入海往蓬萊求仙藥也有十八沙門自西域至謂室利房等十八人也彼暴嬴方有事于天下不遑大道遑及也不及行於大道醜我有德獄沙門於重垣為力士神奮威擊垣始皇惟降服禮謝道人却反西國夫秦之於吾道也如石不濡於水焉膏肓之門不足以發藥其在此也秦方無道以善化之故不相投也晉景公有疾求醫于秦夢疾化為二竪子曰彼良醫也懼傷我焉其一曰居肓之上膏之下若我何醫至曰疾不可為也今秦暴惡不足以善化若疾之膏肓也雖當時沙門不見申於秦而鞠之亦頗得其由矣室利房等雖不蒙秦之見遇而又禁之蓋以秦暴而不納於善亦為騰蘭之因也夫人心險易間于山川爾後所來實幸失利房等先嘗之不求之不至也嘗試也以失利房等先試來秦雖不納後來三藏幸此事而知之故若無蔡愔使人求請即不至於此也漢永平七年辛卯以年曆推之合是甲子今作辛卯誤顯宗夢金人顯宗謂後漢第二主明帝名莊光武之子陰皇后所生項佩日光在殿庭而飛乃宵衣俟旦俟待也夜夢金人身有光明遂坐以待明召群臣以問傅毅對曰是佛神也時王遵傅毅等奏周昭王二十四年大史蘇由云西國佛生一千年後聲教流此今千載餘合是佛神來至也俾蔡愔秦景將命求諸夢遂使蔡愔等一十八人往西國求之也及大月氏與攝摩騰竺法蘭遇焉至月氏國見二三藏一姓迦攝名摩騰一姓竺名法蘭也彼二士宿蘊遐遊濟俗之志獲秦蔡而合矣秦景等見二三藏於月氏求請以歸漢國十年甲午本作丁卯甲午誤漢使至自西域二沙門入于洛時後漢都洛陽獻釋迦圖像并諸經於是肇有寺于洛城三藏初至館于鴻臚寺以白馬馱經而來遂呼為白馬寺若就梵語為僧伽藍此為衆園謂行道處也為像於南宮清涼臺及關陽門顯節陵上也皆於此等處圖像也其經始命翻譯以四十二章載其首摩騰二三藏最初譯經一卷號四十二章經緘于蘭臺石室俟可聞者聞焉於穆哉蘭臺石室漢藏書閟閣也於嗟歎之辭穆敬也夫聖教之於時其可順也不可強也順則渥物渥霑也謂若漢明之代而來強則疵物若秦代而來疪病也故推引之道非至智不能見之矣人亦有言曰夫永平何世漢明何德蓋元淳漸澆仁義漸廢道德與五經將墜于地自永平時道德既薄文籍將墜言世澆漓之甚也而慈運遠構釋教彌布使此方黷先所習者欣新所聞佛法於澆薄之代而來使厭仁義禮樂者欣其新教改往習新而行之也革違從勸三訓萃舉以光被天下也訓教也萃集也以三教集舉而化世也故吾道焉將不可舉雖千年參辰背焉吾教為化導之本若與世未合縱歷千載之期若參星與辰星必不相合也將可舉雖萬里風馬通焉其或教可舉行途雖萬里亦可通也風馬謂牝牡相逐也齊桓伐楚楚子云至於風馬牛不相及也是以漢詔降于天陲聖日出于東方陲邊也謂秦景等至月氏聖日謂摩騰東來也燭生靈於重垠示大覺於昭回垠邊也佛日照燭群品光華天地也夫假一宵之夢樹風聲於萬古如帝莊者天下實有君矣漢明一夢金人西求教法始立風範聲教終為萬古之規宣心茂猷光啓有漢如王傅秦蔡漢室實有臣矣茂盛猷圖也宣心盛圖開明漢祚謂王遵傅毅秦景蔡愔等也為法王之遺徒遺苗徒弟弘嗣德音如騰蘭者天竺實有僧矣能嗣聲教眇觀前古豐德厚利實勤於生民者民荷其賜播其休烈盛于祠秩眇細也觀前代有利於民感其恩必揚其美業大陳于享祀也故禮曰法施於生民死則祀之以勞定國則祀之以能禦大災則祀之能捍大難則祀之而炎氏與二三臣暢金仙之教適未聞之俗使人以悃悃之誠悃悃切也知罪福所歸厭有涯之形尚滅心之理漢明與二三臣初道開佛教使迷倒之俗悟解罪福厭有盡之身達證無生之理恢恢焉玄化之功冠乎仁祠而世不崇其寢昭其奠禮雖古之云闕而今亦未得也恢恢廓也以其功雖恢廓造化於祠典合冠其首而世不崇其寢廟明其亨奠於古之云闕今亦未得不闕也自漢中興之始涓涓乎濫觴濫溢也漢水初出只可溢於一觴佛法自後漢之初涓涓細流如漢水之初出也魏流束薪至曹魏之代漸如流於束薪迄今我唐其風寖廣自漢佛法初至到今巨唐其法漸廣矣鞠搜衆部鞠窮也八千餘卷今來梵僧翻譯未已其間齊梁之世二蕭之家南齊蕭道成梁武蕭衍兩朝二蕭並都金陵也學優詞洽多乎製撰如竟陵王子良鈔集衆經別為七十部二百五十九卷齊竟陵王以部類抄集之也雖當時自意不欲外傳而後世寫之編諸正録梁太子綱即簡文帝撰法寶聯璧二百卷沙門僧祐撰弘明集十六卷僧旻住虎丘山蕭昂往禮之高臥不起人號為梁代素王寶唱楊都莊嚴寺僧博識洽聞梁武令撰經律異相五十卷智藏梁高僧明博識咸皆纘述頗多條目後葉或有廢通莊而遵岐路者也通莊大路謂正經也岐小路群集也時太學江泌女梁朝學士年始八歲自永元元年至天監四年永元南齊年號天監梁武年號自己卯至乙酉計七年靜坐閉目自然誦出三十卷今藏內有題目而無經文既非佛語今在偽録也議者以為天授之也夫何區別其真偽哉大乘以一法謂實相也實相謂真如也小乘三焉謂諸行無常諸法無我涅槃寂靜然有乖乎此者則不為吾教也其有蕪纍凡淺如七佛神呪普賢證明法華度量天地八陽延壽命等經乖於衆典失聖言之體存乎疑偽非所論也並存疑偽録其或質濁繁細如陰持入道地等經如漢魏失譯并藥師等經尸利蜜多羅及與鹿野寺惠簡譯今在正録雖不雅奧且非虧謬驗之重譯不可廢也然得禽雖一目之網而藉萬目資乎一目出苦雖一門之法而兼萬法資乎一門雖以一目獲禽不可唯開於一目雖以一法契機不可唯演於一法故演而伸之為八萬四千之法藏也牟子云牟子蒼梧太守也著書曰牟子佛經前説億載之事却道萬世之要太素未兆太始未生乾坤肇興其微不可握其纖不可入佛悉彌綸其廣大之表剖析其窈眇之內靡不紀之故其經卷以萬計言以億數故龍樹九十日龍宮不能盡其籤題譬如臨河飲水飽而自足焉知其餘哉函夏二聖之經謂孝子宣父居百氏如北辰之於懸象矣孔孝為北辰諸子為衆星而孔老之外猶有象聖之格言楊朱惠施虛無之流也出莊子墨翟韓非濟世之流也出史記其間馬遷修史司馬遷字子長漢武時人為太史繼父修史記一百三十卷先黃老而後六經六經春秋禮記毛詩尚書周易樂記為云也班固藝文班固字孟堅修前漢書一百二十卷始儒家而次道德三於吾宗為三教所謂儒道釋揚日月於不朽至於廢興取捨皆繫於時也或取或捨或廢或興皆繫於時數也其有後世作者或詞勝於理或才不及事或詞雖富贍其理疏曠或事雖備引而才力不足也務華去實漏失也好史筆者於實事多失尚玄否黃知之者患居浮促孰能與死者交論既知偏執之非而所患浮世短促誰能與前代之人交論是非者矣不知者誠誦在心播流無極不了之徒但知持誦在心布流無盡而已然儒教以朝祀喪戎為國之綱紀朝謂殷眺會覲之禮祀謂宗廟六禋之事喪謂弔贈葬臨之儀戎謂講武征伐之事統行其道鮮克攸紊攸所也紊亂也能總其事而行之則於禮少有紊亂釋老之教理在虛玄迹參權實理既虛無幽玄其道或權或實也致令中人已下上士聞而行之中士如存若亡下士侮而笑之阿附曲演非妖則妄鄭聲亂雅魚目欺珠是以道則有化胡經晉時王浮道士所撰一卷後漸添成十一卷夷夏三破十異九迷皆道門非釋之文釋則有滅惑駁夷夏甄鑾笑道論等並在弘明集破邪辨正唐沙門法琳撰紛然陵駕既悖而往亦悖而復互相矛楯情意忌慕忌者惡之慕者好之義不由直相附如糾纏以曲為直也相酬如響答糅以編簡糅雜也閟以緄縢緄縢緘也豈關十二分五千文之本歟聖人之旨元無是非之文西域統一世之教以為三時謂有教即阿含等是空教即八部般若等是不空不有教即解深密經是此方以五時辨例一則四諦謂苦集滅道四事小乘教也二則般若謂八部般若空教三則淨名思益等謂維摩等論不思議教四法華會二歸一中道教五涅槃圓寂教或有謂之不然今存乎古也謂三時教真俗符第四冥契無為之為真有相動用之為俗俗非真而莫興真非俗而莫顯真俗互依有無相顯故曰符符契也昭機之士是有也昭顯也依言論之教歷修證之門也冥機之士是其無也冥默也超言論之相離作為之境也相反為道説真者於俗猶迷存俗者於真未了各執為道如隻輪騁衢奇翰戾天偕何得也奇單也翰翼也車本雙輪方轉鳥以兩翼而飛今於真俗若不圓通如隻輸之車單翼之鳥也偕齊也但道之不弘為物所宗篾其攸濟篾無也攸所也若不弘真俗之道欲為物之宗匠必無所成也濟成也故以真俗兩門為道之樞總吹萬有於一指靜群動於絶眹蕩蕩焉真可入不二法門之夷路也攝萬有而入於一指趣寂衆慮而泯其形兆於所對則了然無滯內外不取中間本無此則入不二之門也何則會極捐情之謂真起微涉動之謂俗未必以造至極之境便為之真涉有作之相便謂之俗豈期然乎真也者性空也謂真性之空圓成之理俗也者假有也謂依他幻有也假有之有謂之似有其法本無仗緣而有緣離却無似其幻化之有性空之空謂之真空真性之上百非四相了然無得故也故悟士立真於俗相違真即無為俗即有為二法不同故也合真俗於不二真者理也俗者事也事無理而不興理無事而不顯無俗不可言真無理不可談事不即不離故為不二也中道洞照赫然玄會未嘗有一事當情者也夫如是簡易之理于何不著久大之業于何不備繫辭云易則易知簡則易從易知則有親易從則有功順萬物之情通天下之志則能成可久可大之功雖僧祇云遠法身無外於焉悟哉阿僧祇此云無量也自十信初發心至世第一末名初僧祇從見道至第七地末名第二僧祇從第八地至解脫道名第三僧祇此三祇外方得成佛不亦遠乎然法身之理本來混融迷悟雖殊而非外得者也故萬象語其真以空為性青青翠竹盡是真如鬱鬱黃華無非般若辨其假以有為相依假即真空之相既空假一質二際無得非中道如何空是性假是相相不離性性不離相故云一質二際者二邊也二邊無得故契中道也是以觀象之生也不有自體待彼衆緣生既待緣則象本無矣萬象之法本無自體緣合而生緣離而滅若心法四緣色法二緣自不能生則為無體也根於空矣假有之象以空為本空含於象待象以顯顯既在象則空為象矣象外無空矣無為之空含有為之象將顯無為必仗有為有為則能顯無為則所顯也譬諸水月緣會則見孰得謂之空也形虛無在孰得謂之有也月本在天影流于水誰言其空水本無月假影所流誰得言有也故聖人妙體有無之間能成有無之用是謂至矣是以聖人方了其體用清辨云有為如幻化無為如空花也掌珍論云有為之法猶如幻化本非有故無為之法猶若空花定不起故也夫幻法假有蓋以有而適無兔角本無幻師以手巾而假有離手巾外都無兔角猶有為之法仗衆緣而假有離衆緣外假法元無則是以有而適無也空花本無蓋以無而似有無而似有湛乎真際真性本無不起猶若空花為焉有為作依所以似有了此似有本無即是湛然真際也有而適無復歸無物若以有為假有之法緣散歸元即本無物也叩兩喻以表法則法無所在矣兩喻幻法以喻真性有為也以空花喻真性無為也但善文字者得其徼而不得其數善心學者知其極而不知其象物生有象象然後有數徼者邊也極者終也尋文之徒雖得邊徼之小徑而不得其指歸之總數傳心印者雖得終極之妙門復不知原始之兆象也守兩崖而不泯患在此焉一則緣文字而著有一則斥衆相而著空各守一岸之邊豈達中道之徑也故滯有者濫於常沈空者涉於斷計有者執諸法是常若外道計四遍常等又小乘計一切有等執空者如外道計七斷滅論等又吾宗亦有撥諸法全空等與其涉斷寧與濫常常則有法可修斷則無善不棄棄則當乎邪見修則漸乎真道矣如以菩提涅槃皆撥為空等故云寧可著有如須彌不可撥空如芥子今有封於喪有取空為至極之門者如近代説禪滯於喪有之道者便全執空為至極之道試問此空為可取乎為不可取乎設爾何失若有空可取則空便是有空既可取豈不是有蓋是以封執之心取混茫之空此但滅蕩然之空也何關修行見性之理歟若空不可取則與有俱遣有亦不可取與空何別既與有俱遣則亦與有俱存有既不可取存空遣於有空亦不可取何妨亦存有何獨存空道歟夫能雙遣雙存蕩然無纍居相則空有不無混真則有無俱泯始曰大士之正觀道場之玄照矣離二取相故名實住唯識龍樹云譬有適異國者館於逆旅逆旅客舍也逆旅主人享之以肴飯方撤撤去也謂收飯賓作而辭曰何有哉見食美而起致問也主人曰吾國有醬故也彼退而私曰醬與味合而猶至是矧若獨為味乎乃宣主人之惠也宣明也謂明憶主人之言也由是陰於鬻醬家陰暗也鬻賣也貪恣己求處無人之室屬饜而食屬饜飽縱也鹹過渴而死夫以偏空為道者亦卒以空為害矣滯而不通故為害也中觀云若人見有空諸佛所不化畏其著斷之誡也經云勝意比丘聞喜根説淫怒癡是道喜根菩薩説淫怒癡為道者如言先以欲鉤牽後令入佛智等不平其理忿慢是生喜根觀乎他世有益強授不忌今雖未達終為他世之善因也忌怨也但今邪見者誤執其文以為名相皆空為惡不怍怍慚也聞説空言不得其意便撥名相皆空而不慚也豈得經之意然而書曰皇建有極會其有極歸其有極皇大極中也凡立事當用大中之道此與尚書文小異爾大中之道非聖人莫能庶幾行之大中之道謂九疇也一曰五行二曰敬用五事三曰農用八政四曰協用五紀五曰建用皇極六曰乂用三德七曰明用稽疑八曰念用庶徵九曰饗用五福威用六極此九也聖人君子帝王也禮曰中庸其至矣乎禮記第十六有中庸篇庸常也用中為常道也故皇極者萬化之中中也中庸者亦萬化之中中也所謂萬物者各有道在其中為至德之性也為萬物之形容也為萬化之主張陰陽之真宰也老聖云三十輻共一轂當其無有車之用老子道經第十一章文也三十輻者衆也一轂者少也以少總衆也此舉轅廂有體之法而資無體之用也埏埴以為器當其無有器之用埏和也埴土也和土為瓦器是有以內空處有盛物之用也故有之以為器如有為事法也無之以為用如無為假有為事法而顯也無則中也以中喻至道中示一也故曰天得一以清地得一以寧老子第三十九章文物得道用故天清而地寧用失則實喪也易曰神無方而易無體繫辭文神乃陰陽不測易則唯變所之不可以一方一體而明之也又曰一陰一陽之謂道道者寂然無體之稱陰陽雖殊無一以待之在陰以無陰陰以生之在陽為無陽陽以成之故曰一陰一陽也但揭厲有深淺而三門之説異矣論語云深則厲淺則揭爾雅云以衣涉水為厲若淺則和衣而入也淺則揭揭衣也淺揭喻行道觀之有淺深也夫秉大中於內行德教於外天地和平鬼神不靈故大庭赫胥皆之前治之君也得環中之術總萬化於無為也不親其親不子其子無為而自化也昔魯桓之廟桓公則魯惠公之子隱公弟仲子所生者有欹器焉形如小瓦甕以之盛水虛則欹欹傾也中則正滿則覆喻守中正也示人以中正之表夫中則正正則虛滿合度超然特植始在于目而畢應乎心淵而諒矣特樹之者令初視之於目而終悟之於心玄而可信也書曰剛而無虐簡而無傲舜典文也剛失入虐簡失入傲子溫而厲威而不猛論語文溫和也又嚴厲也雖嚴而又不猛烈也皆聖人君子權衡物理心融事會而不失其中也已上雖外典所明皆取其中庸之義也北山和尚意指學空學有者宜得其中智論以大士觀於色空如屠牛師弟子大智度論文與莊子文意全同也莊氏以為庖丁解牛目無全牛庖丁為文惠君解牛手之所觸肩之所倚足之所履膝之所踦𮀒然嚮然奏刀騞然莫不中音合於柔林之舞乃中經首之會以神遇而不以目視以一刀十九年解數千牛刀刃若新發於硎者彼節有間而刀刃無厚以無厚入有間恢恢乎其於遊刃必有餘也此乃莊生寓言況道也取其利用不滯之意夫何故耶牛之質戴角垂胡胡項肉也有也骨節間無也無厚之刃入有間之軀安得不恢恢焉何牛之有也屠牛師昭其易也未解牛時所見無非牛者三年之後未嘗見全牛以神遇者也屠牛師弟子昭其難也其猶良庖族庖更刀有近久也良庖歲更刀割也族庖月更刀析也與十九年刀異也故體中者不以實物為礙得其道者物不能礙也而妙高納於芥實委瀚注於豪隙委瀚海也誠可得而易矣淨名經意老聖云兕無所投其角虎無所措其爪兵無所容其刃此不求害物無害心也故無投角措爪容刃之所矣莊氏云大浸稽天而不溺大浸海也稽同也逍遙篇文大旱金石流土山燋而不熱不為寒暑而遷其相不為世物而奪其操也仲尼見呂梁丈人懸流三十仞恃忠信而遊泳七尺為仞恃忠信之道而不懼險阻也豈不皆以含大中之理和品物之性而能至於此耶故蹈水赴火觸刃履危身能輕舉耳可洞聽目可徹視正由心虛而已老子云虛其心實其腹夫心虛故不逆於萬物無彼我而接之也萬物亦與我玄順浩然之性無往不合虛心求物所遇玄會也且夫水火物之害也水能漂溺火能焚爇皆是物之害也而鱗育於泉魚龍得水以生獸生於火如有火鼠火龜皆生於火中彼豈假禦水火之術乎但性合於燥濕氣同於寒燠故相容而不相違相生而不相害誠則全也既不相傷則信水火能全於物況有道者而德全於萬類乎故大士以此心學目之曰禪禪者靜慮也梵語三摩呬多此云靜慮此定能止寂心慮也外境不足以遷情目之曰定梵云三昧此云正定定者專一也其有以身即佛屏除像設居大聖之位者誠愚悖虐己者也如金剛禪之徒苟誠之以水火寧得多其幸而免哉若投之於水火又豈能逃於害乎下識惑其遊言不理其實行附瞽而求直路難已矣如盲引盲之類也夫為道之人知心行心使心三者審諸已然後語其所至知心謂了其真妄行心謂滅其愛憎使心謂變其垢淨心淨則世界淨等也今始學之流方欲似知於餘則闕何求自誷焉今之禪師往往有自謂得而誣誷於人者如山果金剛禪等妖妄者多矣故大悲無窮香飯無窮也大智不礙方丈不礙也如維摩詰大悲無窮所取香飯不盡所修智行不障礙今方丈所感亦不障礙也經云若得作佛時具三十二相等法華經文始可謂永盡矣衡嶽天台即思大和尚居南嶽也智者大師居天台也一心三觀謂摩訶般若摩訶法身摩訶涅槃也一從假入空觀色即空故顯法身二從空入假觀空即色故顯般若三空假平等謂色空無異故是涅槃也成乎圓伊三德已上三法相須而成謂之三德亦曰圓伊梵書伊字三點若摩醯首羅面上三目也蓋得之龍樹也嘉祥權實雙行成乎悲智兩足慧皎會稽嘉祥寺僧學通內外善經律論著梵網涅槃等迹以大悲故樂度生大智故樂斷證也相依如人兩足也蓋得之於華嚴也此乃得實性之旨也菩提達磨致思無為無思無慮得之於性空以梁天監中至此也而近世不知空不離假廢有求空異端於是作矣以真空不離於假有奈何然履俗者知假不離空履事法須知事法以空為依則達我之所為不謂俗也雖俗而能達其身豈得謂俗耶居真者知真不離假則照我之不為不謂之真也居真能知真以俗顯則不執真而自滯也故大聖存三界為無生二乘滅三界為無生大乘乃即俗談真小乘乃滅俗而談真偏圓於此優劣矣大乘以圓通解脫小乘以偏執自滯經曰雖知諸佛國及與衆生空而常修淨土教化諸群生雖知有相是空而不廢度生是謂行中道也如是鎔金繕素孰謂之有纍趺冥目孰謂之空於有作而了有作之相誰言其墮於有耶於無作而達無作誰言其墮於無作之空耶其能體達行於非道通會佛道者始可與言其極能體達其非道而能通會佛道方可論其至極之理也彼孤陋者謂之何哉迷空著有之徒豈識此道也有智保者謹於名節挺然孤介而能以持律著譽而不能虛心合道但堅小節之心有昧圓通之道寒則入水熱則就火渴則食鹽其死悽然哀為寺神雖勵操篤誠而不知道之所由矣夫寒暑天地之恆紀彼尚愎而違之愎戾也況能冥情於物我乎第二十祖名闍夜多至羅閲城見一頭陀六時禮念少欲知足長坐不臥一食而已尊者告大衆曰此頭陀者汝見如何衆曰不可思議常修梵行此是道耶誠如尊者説曰今此頭陀不久墮落與道懸遠心有所得不名道故衆曰何知尊者曰我不求道亦不顛倒不六時禮亦不輕慢我不長坐亦不懈怠我不一食亦不雜食我不知足亦不貪欲頭陀聞説即生敬重天竺呼為遍行頭陀即婆修槃頭也故生勞其形死淪無狀也而小乘於大乘持律為破戒如瑜伽説菩薩若見有情受惡業則斷其命自受殺業令其得脫苦身等也精勤為懈怠耽玩小法是懈怠也信為智障信小果而不起大智義可見矣有執忘言為道者固亦頗類此焉夫不知言而言妄言者也不知言而不言慎言者也承言而言學言者也承人之言也知言不言靜言者也其欲亡於言而不果於亡言之心則雖響息於外情躁於內蓋不亡者也口雖泯言而心逐名利則是不果亡言之心也夫能體言生於物物物皆自化言者亦自化終日言而常默是謂真亡言者也雖言而心不著者也而經中淨名不言由前諸大士言已至盡言不言為真入不二法門也復何謂也莊氏無為謂不告知北遊以其人不能體言而即道乃不告也告請也自印證不請告也如經云是法不可示言詞相寂滅法華經文此談真理之相也豈則不説乎是以般若漚和為圓宗之兩備去方便則般若孤照矣梵云般若此云智梵云漚和俱舍囉此云方便方便與智體用相依若去方便之用即般若之體為孤照矣故至道焉統天地含萬物動變化得之入一塵而曠乎法界一塵不窄法界不寬也失之行法界而隘乎一塵不得其道者雖法界而窄於微塵大山之與秋毫迷悟何相遠矣太山秋毫小大不齊迷悟之情通滯亦別也
