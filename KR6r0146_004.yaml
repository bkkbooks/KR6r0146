body:
  text: 宗師議第七議經律論禪各有師承宗祖之道奈苑餘波永平肇流波羅奈國之苑也亦云婆羅痆斯國此云注繞城以江繞城種於花木有苑號鹿野如來常於此説法後漢明帝永平十年佛法始流於此故云肇也蔥嶺之東暨于流沙風光漸遠震旦之西山最高者曰窗嶺以其窗翠故也被于中夏在於漢世微有經學禪律未融融明也自竺法蘭等創齎四十二章經至又安清等持經像到然未曉禪律人雖落髮事猶類俗衣無條葉食通肴胾供會齋懺頗均祠祀僧無戒律與俗不異衣謂袈裟此云壞色有三種衣一僧伽梨此云合成割之重合三長一短也二鬱多羅僧此云上著衣最在上者兩長一短今七條也三安陀會此云中宿衣謂近身即五條也亦謂執作衣此乃三衣也如來皆令割載以為條葉取象稻田蓋取出生福慧義肴胾肉也均同也朱士衡為出家首焉士衡頴川人出家後以大法為已任於洛陽講小品往往不通每歎此經大乘之要而譯理不盡遂往至于闐果獲正品梵本遣弟子送歸洛陽于闐小乘白王云漢地僧以婆羅門書一亂正典因焚之不損即今放光般若是也魏初曇柯羅創傳戒法金牒玉檢五篇七聚元魏也佛法入漢戒律自柯羅始也波羅夷謂殘波逸提提舍尼突吉羅五篇也加偷蘭遮惡作惡説是為七聚繩口體之愆違繩正也口過有四妄言綺語兩舌惡口身有三種殺盜淫持戒律能正之使無過也節服饌之慢易烈烈乎商飈淒淒乎寒霜秩秩乎科條烈烈威也凄凄嚴也秩秩清也言戒法嚴峻也不威而肅不刑而治神州有沙門自柯羅始也漢雖有沙門而戒律未備昔漢末安世高吳康僧會並遐域之畸人也世高安息國王太子僧會康居國王太子所謂方外而不偶人俗者也莊子云畸人者畸於人而侔於天也學究天人之奧德動鬼神之契孫皓將禁淫祀及欲毀廢令張昱詰難會盡日不能屈也世高遊至䢼亭湖神乃見因化之而捨惡趣也至若智參幽運會如不及世高知有宿債而兩來酬之也制作垂文會或過之會才辨立言成典也自是已前師訓未彰自漢永平至吳赤烏雖有翻譯未甚流美也會之牆仞莫有得其門者子貢云夫子之牆數仞得其門者寡魏世有月支人支謙受業於支亮亮受業於支讖語曰天下博知不出三支本月支國優婆塞漢末遊洛精究成藝遍通異書曉六國語多所探習也謙為人細長黑瘦眼白而睛黃語云支郎支郎眼中黃形軀雖細是智囊漢末避難歸吳孫權拜為博士輔東宮與韋曜同列而吳志不載史臣之不直也東宮即太子和也遭讚而廢韋曜字弘嗣好學善屬文遷太子中庶後纍遷至侍中修吳史未就為孫皓所誅蜀有普曜經莫究孰為譯者一卷入藏見行夫草昧至言於忿欲之俗則必鑿枘鉏鋙柄鑿柄也鉏鋙不齊貌楚詞云不量鑿而正抦而木破矣如以善而投惡疑謗紛糾非神德尊威之賢則無崇功被物而蜀志不記傳其人者蓋劉氏將欲反漢舊物興戎于魏遊玄之教雖弘元匠之勳未顯遂使後世集録者耿然追恨劉備承漢獻之末三分據蜀北有霸魏之讐東有孫吳之敵積穀訓兵干戈日阻豈暇弘闡於空寂之教哉又陳壽蜀志云諸葛相失在不置史官是以無文而載矣晉初竺法護時號焞煌菩薩高僧竺法護焞煌人八歲出家後往西國篤志好學萬里尋師孫綽方之山巨源譯正法華等經晉惠時卒於繩池也門下有作者七人其始譯正法華既定詁訓命康那律講授諷誦者翕然為美至羅什世重譯為妙法蓮華而護所譯稍潛其耀羅什弘始年於逍遙園重譯於世盛行正法華稍歇今在藏內蓋覩大輅者不以椎輪為貴也文選云椎輪為大輅之始大輅寧有於椎輪之質增氷為積水所成積水增微於曾氷之凜椎輪古棧車也大輅玉輅也得華忘朴之義護門法乘竺法乘依法護為沙彌幼而神悟玄鑒過人有詐投護急求錢二十萬護未苔乘年十三在師側即語云和尚已相許前人果非求財者將觀護之道德也才慧俊拔孫綽方諸王濬沖以皆少有機悟之鑒也王戎字濬沖太源人渾之子與阮籍友少之二十歲相得如時輩每至某家輒之戎室謂其父曰濬中清尚非鄉倫也與鄉語不如阿戎矣竺法雅河間人擬正有庶少善外學長達佛經才思俊贍時賢企慕兼善著述康法朗中山人善戒節西遊諸國還以經中義類擬議儒書為生解之例謂之格義以訓門學嘗與道安法汏講談諸經皆妙盡其要朗門人令韶每入定數日不起朗終刻木為像如事生之禮帛法祖風神之秀也於王導則以簡率於下望之則莊敬以為王公風道斯言卞令軌度格物故也帛遠字法祖本姓萬河內人才思俊徹敏朗絶倫日誦萬言值晉亂將遁隴右秦州刺史張輔重之欲令反服不從遂殺之蕃漢追悼孫綽道賢論方之稽康也祖弟法祚德行沖允實祖之季也祚亦有少譽被博士徵不就二十五出家洞明佛理梁州刺史張光以祚兄不肯反服輔殺之光又逼之祚亦堅志不從亦為光所害帛高座卓朗之傑也帛尸梨蜜多羅吉交國人時呼為高座以其善説法故本國王之子讓位出家於東晉譯藥師等經王導謂之曰外國有君一人而已尸梨蜜笑曰若使貧道只如檀越為今日豈得遊歷至此晉咸康中卒春秋八十餘葬石子岡岡在吳後起寺焉支遁常遣人就竺潛買剡𡵙山側沃洲小嶺支遁字道林姓關氏陳留人幼有神俊聰明秀徹王濛甚重之後於沃州小嶺立寺晚出山陰講維摩經許詢為都講也潛曰欲來輒給豈聞巢許買山而隱竺潛字法深姓王晉大將軍敦之弟事忠州劉元真為師元真有才譽後隱剡山當世追蹤問道者也遁後與高麗道人書曰上座竺法深忠州劉公之弟子體性貞峙道俗綸綜往在京邑維持法網內外具瞻弘道之匠也頃以道業靖濟不耐塵俗考室山澤修德就間今在縣之𡵙山率合同遊論道説義高棲浩然遐邇有詠孫綽以潛比劉伯倫謂曠大之體同焉時𡵙山竺法友從深受阿毗曇一百卷一宿便誦深曰經目則誦見稱昔人若能仁更興大晉者必取汝為五百之一人矣法友年二十四便能講説後立剡縣城南臺寺焉晉成世康僧淵康法暢支敏度俱過江僧淵本西國人生長安為僧常乞食自資德逾暢度與殷浩對問內外典籍浩詞屈不能對暢常執麾尾行每值名賓輒清談盡日庾元規曰此麈尾何以常在暢曰廉者不求貪者不與故常在耳著人物始義論支畝度著譯經録今行於世支遁初至京王濛器重之謂人曰精微之功不減輔嗣殷融與衛玠交時謂其神情俊徹後進莫有繼之者及見遁歎息以為重見若人若人如此人謂珍也遁每講善標宗會而章句或有所遺時為宗文者所陋謝安聞之曰此乃九方堙相馬略其玄黃而取其駿逸莊子云九方堙善相者淮南子秦穆公召伯樂使求馬三月而反曰已得矣在沙丘公曰何馬也曰牡而黃及至驪而牝公怒曰子之所求毛色牝牡不知之伯樂喟然曰一至此乎所觀者天機也得其精而忘其粗在其內而忘其外見其所見而忘其所不見馬至而果天下之馬也後出沃州於山陰講維摩經許詢為都講遁通一義衆謂詢無所措難詢設一難亦謂遁不能通世説許詢字玄度好遊山水而便登涉隱永興幽穴每致四方諸候之遺山陰縣在越州即王右軍蘭亭曲水在此有越王勾踐小城猶在哀帝徵出京王濛宿構數百語謂遁莫能抗遁徐曰貧道與君別來多年君語了不長進郗超問謝安林公談何如嵆中散郗超字嘉賓桓溫記室參軍形質短小多機辨嵆康為中散大夫安曰嵆努力裁得去耳又問於殷浩何如曰亹亹論辨恐殷制支超拔直上殷有慚德後超與親友書云林法師神理所通玄拔獨悟數百年來紹明大法令真理不絶一人而已遁幼以雞子無命其師與爭辨且不勝死後見形投卵於地殼破雛行遁乃感而蔬食遁與師論卵生用未足殺之無罪以其慧辨師不能勝乃死之現形擲卵以悟之也禮云國君春不圍澤大夫不掩群士不取麛卵遁若始乃未知既知矣則不違仁何俟師之誨焉蓋師見其前猶未悟爾有遺馬者養之曰吾愛其神駿聊復畜之耳有餉鶴者放之曰爾沖天之物寧為耳目之玩乎先經營餘姚塢山至於名辰獨還塢中或問其意曰謝安在昔數來相見輒移旬日今觸情舉目莫不興想孫綽比諸向子期向秀字子期以雅尚莊老風好同焉于法蘭高陽人少有異操隱居巖壑時氷雪甚有一虎入房蘭神色無忤後往江東將適西域至交州終於象林遁為贊曰于氏超世綜體玄旨嘉遁山澤明馴虎凶孫綽方於阮嗣宗俱以高尚不群也蘭之門于法開于道邃開之門于法威凡三世負盛譽開每與支遁爭即色空義蓋龍虎之勍敵也廬間何默申明開難高平郗超宣述林解並傳於出也孫綽為威贊曰易曰白馬賁卦文也詩員蘋藻班如在場芬若渟潦于威明發介然遐討有潔其名無愧懷抱開嘗使威出都途經山陰算支遁講般若其辰所至處示其攻難威至郡果不出其計乃往復數番遁引退因厲聲曰君何足復受人寄載來耶後詔徵講放光經邃從蘭過江沒於交趾南激之地通典云彼國人立足拇相交也郗超圖像支遁贊曰英英上人識通理清朗質王瑩德音蘭馨孫綽比於阮威咸字仲容家貧七月七日皆曬好衣咸於庭曬犢鼻或問之曰焉能免俗也以其高風一致也剡山竺法崇不詳何許人少入道唯專法華一經後著義疏四卷行之曾遊湘州麓山今潭州也山神化為大人詣崇請戒乃捨山為寺居之少時治湘士後還剡之葛峴山茅庵泉飲而已潛門人竺法義忽患心疾至念觀音夢被人破腸其疾乃愈義年十二遇潛異之勸出家遊刃衆典九善法華卒東晉太元五年傅亮云吾先君與義公遊處每聞觀音神異莫不大小肅然孝武徵出京就講孝武晉簡文帝子名昌明立二十四年崩古者出家從師命氏取師之姓道安受業佛圖澄澄姓帛安以師莫過佛遂通以釋氏為姓中夏沙門呼釋氏自安始也語曰學不師安義不中難習鑿齒與謝安書曰比見釋道安固是非常勝士師徒數百齋講不倦無變化伎術可以惑常人之耳目無重威篤罰可以整群小之參差而師徒肅肅自相尊敬洋洋濟濟由來未見其人內外群書皆略遍觀陰陽計數亦皆通會佛經妙義固所遊刃翻覆籌算無可比肩恨足下不同日而見也慧遠初為儒年過乎弱冠遇道安於太行恆山喜曰以為真吾師也常欲總攝綱維以大法為己任以夜續晝貧旅多闕曇翼每給以燈燭之費安聞之曰道士誠知人矣嘗他日安歎曰使道流東土其在遠乎遠後盛德既彰聲華洽聞外國咸稱漢有大乘道士每東向廬山稽首焚香遐誠展敬羅什入關遠致書通好什答書其卒章曰經云末後東方有護法菩薩勗哉仁者善弘其事殷仲堪之荊州至山與遠臨北澗談易移景不倦盧循初據江州以父嘏同為書生歡然篤舊有諫者曰循為國冠與之厚得不疑乎遠曰我佛法中情無取捨豈不為識者所察洎宋武討循左右曰遠公素篤循交裕曰遠公世表之人心無彼此乃齎書遺錢米遠講喪服記宗雷並執卷宗炳雷次宗雷後著義疏首稱雷氏宗炳嘲之曰昔與足下共於釋和尚間面受此義今便題卷首稱雷氏乎慧持形長八尺常躡屣衲衣半脛將入蜀兄止之曰人生愛聚汝獨樂離如何持曰若滯情愛聚本不應出家今既割欲求道正以西方為期耳同學慧永於西林嶺上別立一室欲禪輒往居焉常有一虎在屋賓至則使去於一日會何無忌於虎溪遠從徒百餘莊而肅永獨衲衣草屨荷鍚提鉢松下飄然而來時以清散之風多於遠也其門德行有道祖僧遷道流富有才思遠每謂祖等曰夫易悟盡如汝輩則吾不復憂後生矣孔子曰聞義不能徙是吾憂也其後遷流夭世遠曰此子並才義英茂清悟日新使此長往一何痛哉有慧要者患山中無刻漏乃於水上立十二葉芙蓉因波轉以定十二時晷景無差耳又嘗作木鵡令飛數百步有張山人者廣政中於蜀主殿前立渾儀樓注以水銀令木人執二時牌子隨水銀轉對殿報時晷刻不差張山人名思訓本遂州人後入京係司天監有僧徹者善篇牘嘗至山南攀松而嘯盧山南也於是和風遠集衆鳥悲鳴超然有勝氣退而咨於遠曰律禁管絃歌舞一吟一嘯可得為乎遠曰以亂意言之皆為違法徹聞唯而止其姑道儀見於高尼傳也尼傳四卷議者以為佛圖澄之門豫樟杞梓也即安公是道安之門昆藍琮璧也琮璧美王出於昆山藍田遠公是也羅什之門瑚璉簠簋也生肇等也殷瑚夏璉周簠簋也慧遠之門犀象齒革也道祖等象之是犀之革也慧光之門孔翠羽毛也光姓楊定州人師佛陀出家俊異朗悟所習諸經便為人説師為出家更多頴俊時俗呼為聖沙彌尤攻律部造疏注經甚多門學如林入室九人道暉為首儒生馮袞也玄奘之門沈檀蘭蕙窺基字洪道造百本疏去聖逾遠道德降矣藝行美矣晉宋之代多修禪觀得道者多隋唐已降慧學者多藝解美矣得道者少將非泉涸之魚失江湖之所在多其昫沫耶逐聲教而依蕩隨慧解以澆漓宋人魏人南北兩都宋劉氏都江南魏元氏都洛邑宋風尚華魏風猶淳淳則寡不據道華則多遊於藝晉宋高僧藝解光時弘闡法教故曰華也元魏高僧以禪觀行業據道故曰渟然在人不在他也夫何以知觀乎北則枝葉生於德教南則枝葉生辭行昔臧氏宰漆雕氏以大蔡繁簡知臧氏之優劣臧氏魯大夫漆雕開魯賢人宰家宰也臧氏世貯大蔡之龜文仲賢三年一十武仲二年一卜已下一年一卜簡少也繁多也知其優勝劣弱也今奚獨不若於憑乎其象奚何也臧氏以蔡龜之象而知優劣何不以淳華而知其師訓也文章之家屈宋楊馬遞相祖迷屈平宋玉楊子雲馬長鄉皆祖述文章之士雖欲速鞭難其齊足故道德言行古今殊世厥若坡陀矣不齊貌浸微矣漸次貌夫琢奇璞為美器良工之能也構貞材為廣廈哲匠之力也授專門以成德仁師之訓也故鳥可以擇木魚可以擇泉臣可以擇君弟子可以擇師夫不能為臣而求能為君不能為子而求能為父不能為弟子而求能為師者難矣忖己度事可矣故為人在恕己也然父子天屬也其有不象者父子之道天性也若禹鮌不象者也君臣國體也故有象不象者澆之元凱為象也四凶為不象也師資義會也安得有不象者乎如舜生均文王生武王父子象不象也舜大聖生商均不肖為父子不象也文王聖生武王亦聖為父子之象也庭堅為虞臣飛廉為紂臣歡兜為堯臣龍逢為桀臣君臣象不象也庭堅皋陶也與虞舜為象飛廉與紂為象也歡兜與堯龍逢與桀為君臣不象者也仲尼之門顏閔尚於仁義鬼谷之門蘇張尚於譎詐克象也蘇秦張儀並師鬼谷子學縱橫闔之術也故仲尼之門三尺童子猶恥言其霸昔釋公道行乎關右廬山化被於江左法汏亮直於晉世法汏與道安同行道安往襄陽汏至荊州桓溫迎之身長八尺風恣可觀與道恆法師論議而破之興瓦官寺王珣謝安常禮焉道生果斷於宋年謂定言一切衆生皆得成佛於宋代夫何象也歷觀前往孰能不由道德之室而至於大名乎楊雄云師者人之摸範也不摸不範不可以為師也禮云善歌者使人繼其聲善教者使人繼其志也故不能繼釋氏聖人而能繼釋氏之君子何莫由師之道焉夫澄至安安至遠遠至曇順順至僧慧凡五世價重帝王風動四方事標史册書曰四方風動唯乃之休其或立德也謂禪觀之行者立功也翻譯流傳立言也講説著述為天下之人也僧會支遁為天下之人而一會一遁其後篾聞也然有至乎纍世者或青出於藍或氷出於水但為一方之賢未果為天下之賢者也故為弟子者患師不得於安遠為師者亦患弟子不至於安遠夫鼓鍾于宮聲聞于外懸象在天光流于下琴瑟在御知音難閟氷雪載駕遺躅寧隱此上喻好事匿于內光華彰干外必有迹也如彼德行秉躬語默信時既蘊德行不言人自信若桃李之自蹊也雖高岸已谷松柏已朽而徽華弗蔽洋洋乎盈耳哉洋洋美譽也曹馬之年魏晉之代也經論權輿源流混淆教法初來若混淆之濁水流泛未廣宣唱者但包括大義玩味玄旨至於剖析名相罔有攸據罔無攸所也教文多闕豈非聲教所覃未備者歟安公初見譯諸部小論蹈詠稱慶以為幸覩三藏全矣而未知但滄溟畎澮耳畎澮田畔溝渠喻所覩者也滄溟喻未覩者也雖上士假微詮以悟旨而中則實未多也北涼浮陀跋摩譯阿毗曇毗婆沙此云覺鎧西國人蒙遜子茂處請譯於姑臧凡一百卷學者挹其波瀾浩若無涯涘矣後秦佛陀耶舍善大毗婆沙時號赤髭也此云覺明罽賔國人婆羅門族年十三隨師日誦三萬言誦大小乘經數百萬性度簡慠不為諸僧所遇羅什於沙勒甚相隆厚自龜茲至長安譯十住經大毗婆沙等姚爽疑其所誦令誦於羌籍藥方可五萬言二日誦就覆之不誤一字卑摩羅叉善十誦時號青眼也此云無垢眼罽賔國人苦節律藏與羅什相遇什禮為師譯十誦律為六十卷卒壽春石澗寺時號青眼律師也魏曇始足白於時呼白足阿練若也始行不履地練若即僧也無爭寂靜義耶舍在沙勒為羅什師後至姑臧聞什為秦污戒曰羅什如好綿纊何可使入棘林中乎姚興嘗謂什曰大師明超悟天下莫二一旦後世何可使法種無嗣遂以妓女十人逼令受之自爾已來不住僧坊別立廨舍每至講説常先譬喻如臭泥中生蓮花但採蓮花勿取臭泥什啓秦主曰夫欲宣通無上法教宜令文義理趣圓通貧道雖復讀誦其文未善其理唯有耶舍深達經教今在姑臧願詔徵之一言三詳然後著筆使微言不墜取信千載興乃聘耶舍耶舍笑曰明旨既降便應載馳檀越待士既厚脫如羅什見處則未敢聞命興歎其機慎重詔教喻乃至悲夫晉殺竇犢仲尼不濟于河孔子自衛將之晉至河聞趙簡子殺竇鳴犢及舜華乃臨河而歎曰美哉水洋洋乎丘之不濟此命也夫子貢問何謂也竇犢舜華簡子未得志須之晉趙之賢大夫也簡子今殺之刳胎焚林則麒麟不至覆巢破卵則鳳凰不翔云云遂回車不渡也秦蠱羅什耶舍辭於入國豈非害一賢而群賢不塈塈至也玩一德而衆德將離乎當弘始初童壽譯三論中百中觀十二門也尚空門者輻湊後譯成實善法相者雲委其時以為究暢名數靡有過於此論什首命僧睿講傳謂之曰此爭論中有七處破阿毗曇宗而在言小隱若能不問而解可謂英才睿啓發幽微果不咨什什歎曰吾傳譯經論得與子相值無所恨矣睿魏郡長樂人依僧賢法師為弟子謙虛內敏佐羅什譯經善攝威儀弘贊經法常回此業願生安養坐不背西臨終洗浴燒香向西合掌嚴然而卒或謂什門四聖生肇融睿上首精難則觀肇第一或謂十哲道恆道標加焉道生僧肇道融僧睿曇影慧嚴慧觀本傳無名憑者有南齊道憑非什門下有僧䂮者甚俊恐是字誤而恆標降于八人猶負翼亮之才道恆京兆人九歲出家為隱士張忠嗟曰此小兒有出人之相在俗有輔政之功在道有光顯之德事後母甚孝博綜經書佐羅什譯經道標亦雅有才力皆有佐助之功也可居王佐姚興務其經綸以金紫巖廊之位強之二賢雖逼霸威而終不為其臣也是知賢達背向各有所得務軒榮者以籍莾食杼為飛走譬之鳥獸不可與同群味虛玄者以黼衣食豢為桎梏猶入廟之犧牲而伊尹呂望求為人臣伊尹湯相呂望太公也武王臣卞隨務光俱為讓主堯禪位而不受者也豈不各反其好惡異其榮悴哉如恆標者尚能以形骸為逆旅而豈顧其名器是以接風雲之遇割君親之愛泛五湖而不為難范蠡辭越王勾踐乘扁舟泛五湖王以金鑄招之而不返蹈滄海而不為遙魯連云寧蹈滄海死不事無道主彼區區之秦何所致哉使唐虞之際與元愷相齒八元八愷堯之賢臣相齒齊年也殷周之始與伊尹齊足猶慮失之矧乎此時爵祿曷云重矣此時謂偏霸偽秦昔支林慧遠致譽望者多嬰此難為王臣所逼也而振去若輕埃揮絶若腐纏腐纏朽索也不足難也故巢由可為皇臣非帝力所能起也夷叔可為帝臣非王力所能起之也綺李可為王臣非霸力所能起之也靜民則法曰皇謂炎昊之主也德象天地曰帝謂堯舜也仁義所往曰王夏殷周也秦漢皆曰霸也夫居俗外而為俗內所起不亦難哉宋文帝嘗述生公頓悟義群僧構難帝以麈尾扣機曰若使逝者可興豈為諸公所屈竺道生巨鹿人幼而頴悟哲若神鑽仰群經斟酌雜論止青園寺初見泥洹經乃説頓悟成佛義籠罩舊説時以為邪説被遷擯於廬山及後分經至果稱闡提悉有佛性乃升座論義數番麈尾紛然而墜隱几乃卒言忍死以待經也故宋文重舉之顏延之著離識論帝令慧嚴辨同異往復終日帝笑曰公等今日無愧支許之談也支遁才章茂逸得僧會之風僧肇筆削奇邁又得支林之風安遠生睿之徒各擅其美自後緇列寡有紹其音徽者齊梁之後世尚紆麗詞虧體要致使求其雅言立意曾不及於漢魏之間針論若楊子雲之續虞針等而況於聖人經籍乎故懸象嶽瀆不以妍華為天地之文章以其能綱紀覆載為文章懸象經天也嶽瀆締地也人文安不然乎嘗讀殷之盤銘曰苟日新日日新又日新孔丘誄曰旻天不憖遺耆老莫相子位焉嗚呼哀哉孔丘卒魯哀公誄之曰旻天不弔不憖遺一老俾屏余一人以在位煢煢余在疚嗚呼哀哉尼父無自律文在左傳三十與今小異斯文也天之將喪久矣不有盛德大業其孰能興之者焉仲尼以天縱多能故哀誄之肇著般若無知論僧肇京兆人家貧傭書為業因得歷觀經史善莊老後見古維摩經云方知所歸矣羅什至從之翻譯著不遷等四論義熙十年卒於長安年三十一劉遺民見而歎曰不意方袍復有平叔融講新法華經開為九轍號九轍法師什曰佛法之興融其人也道融汲郡林慮人師愛其明先令外學令往林中借論語竟不齎歸於彼已誦師更以本覆之不遺一字至立年才解冠絶聞什至往咨稟什見而奇之卒於彭城年七十四矣什譯中論始二卷融更剖扸預貫始終時師子國有一婆羅門乘駝負書而來請求捔試優劣優則行之秦人覩其口眼便辟將改吾觀有回敬之心也什告融曰此外道聰慧殊人捔言必勝豈可使無上大道在吾徒為彼而屈如吾所觀在君一人而已融自顧才力可濟濟成也但患外道書籍未盡披讀乃密寫其目一覽而誦既刻日爰整其徒對𫾻于王庭彼外道恃其博知倍意攻融融出其所知討其所不知彼遽保其強誦而融列其所誦并諸夏群書編目尤廣其所誦梵志蹇而肆肆放也蹇吃情放也羅什濟詞而嘲之彼殞越而亡也濟益也云逃也昔符師征晉大事將去謝安知玄而舉之爰致大勳天下服其遠鑒而什之知融何莫安之儔歟故質斯興廢同在一舉耳質形對也以什舉融可對安舉玄融性不狎喧常登樓披玩僧睿初為僧賢弟子賢友僧朗講放光經亟遭睿譏難朗謂賢曰睿比格難吾纍思不能通可謂賢賢弟子也睿魏郡人秦主問姚嵩曰睿公何如曰鄴衛之松柏興召見大賞悅敕給俸吏力車輿後謂嵩曰此乃四海之標領何獨鄴衛之松柏乎睿平生素不背西願生西方也曇影初從什什謂姚主曰昨見影公亦是此國風流標望之僧也宋僧導京兆人十歲出家後著成實論疏起壽春光山寺止壽春孝武詔于京鑾輿降蹕導以孝建之初三綱更始悲不自勝元嘉三十年太子劭弒文帝自立三月為武陵王駿與諸王殺之即帝位改元建武號孝武皇帝帝亦哽噎敕開講帝及公卿會焉導曰昔王宮託生雙林見滅自爾已來歲逾于載淳源永謝澆風不追給苑丘墟鹿園蕪穢九十五種外道之類或云九十六以趣下為升高三界群生以火宅為淨土法華經云三界無安猶如火宅豈知上聖流涕大士悽惶者哉因則涕泗四衆為之改容導卒壽春石澗寺年九十六也時石澗寺僧因亦當世名匠或問之與導孰愈因曰吾與導同師什公方孔門則導入室吾升堂矣道猷述頓悟義孝武曰生公孤情絶照猷公直轡獨上可謂克明師匠無忝微旨道猷吳人生公弟子師云後見勝鬘經披卷歎曰先師昔義與此經暗合因注之五卷後孝武詔講頓悟義競辨之徒聞奏互起猶皆破之帝乃撫几稱快晉慧遠慧持兄弟也宋法愛法瑗遠持也愛為芮國師俸三千戶瑗文帝使述生公頓悟義何尚之聞乃歎曰常謂生公歿後微言永絶今日復聞象外之談可謂天之未喪斯文也僧遠隱上定林寺齊太祖鑾駕詣遠遠門狹不容輿蓋太祖欲見遠遠稱老足不垂床太祖遣問興臥轉蹕而去文慧太子竟陵王蕭子良也崇為師範何默周顒吳苞張融稟戒受道焉昔沙門稱貧道於帝王南齊法獻玄暢俱為僧正武帝與語皆名不坐後僧鍾稱貧道帝嫌之問王儉曰先輩沙門於帝王何所稱正殿坐不儉曰漢魏佛法未興不記傳自偽國稱貧道亦預坐及晉初亦然中世有庾氷桓玄等皆欲使沙門盡敬朝議紛紜事皆休寢宋之中朝亦頗令致禮而尋見不行自邇迄今多預坐稱貧道帝曰獻暢二僧道業如此尚自稱名況復餘者揖拜太甚稱名亦無嫌自後稱名獻暢始也梁寶亮性率直每對武帝稱貧道上雖有間然而挹其神志亮青州人初至京袁璨異之曰珠生合浦魏人取以照乘璧在邯鄲秦人請以華國天下之寶當與天下共之非復上人貴州所宜專也僧旻七歲出家居虎丘或問曰沙彌何姓家在何處對曰貧道姓釋家于此山張融謝眺少相厚善陸倕嘗與賓從造旻旻稱疾不見倕欣然曰法師不趨於世此誠弟子所望也蕭昂出守吳興吳興郡漢置也古防風氏之國至隋廢郡改為湖州即烏程縣也將謁旻旻曰吾山藪病人無事見貴二千石昔戴顒居北嶺宋江夏王入山顒高臥牖下不與相見吾雖德薄請附戴公之事矣及蕭至後戶而遁夫擯世者祿干之不及尚利者干祿之不及既得祿狎侮為志於其賢雖始降禮若欣遇而無恆其心卒能以權勢而卑之既有祿相及則親狎而侮慢雖有賢者而能下禮相接然見遇之道其心不恆則恃其權勢而以踞傲終之也則今貴門皆然也然能病其終卑而兆其始遇則高見之昭昭不貽己戚矣顧其始而知其終則免其自貽伊戚也智藏事師以孝敬聞師疾絶食藏亦絶食師進飲藏乃飲但性傷乎許直訐舉人私也而以譽行為干櫓故不至於危殆也嘗捨財大懺謝幾卿指挂衣竹戲之曰猶留此物尚有意耶藏曰身猶未滅意何由可盡道安之門人法遇領徒四百時有一僧飲酒廢夕燒香遇罰而不遣安聞之以筒緘杖寄遇遇曰此由飲酒者也我訓不勤遠貽憂賜乃集衆命維那行杖至三因泣下自咎魏道辨門人亡名負才傲世辨撻而徙黃龍其初無恨想晨夕向辨遙禮唐智正之門人智見師所著述必侍立而書纍載初不貽坐或久而仆正責曰翹足七日匪勞今爾心輕何不然也釋迦因地七日翹一足讚底沙如來北遠之門智微每講析幽微皆云大法師意如此因則聲淚俱發廬山慧遠姓賈雁門人謂之南遠澤州硤石寺慧遠姓李燉煌人著涅槃經疏者謂之北遠也禮云凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學然良家子在家家有訓從師師有教故能克意盡所敬而行敬盡所信而行信是以大聖皆命族姓子而勉之不貌卑賤律禁出家非繩樞甕牖者之能也貧家以繩繫樞以甕作牖也哀今弟子罕有不聞言於師範者彼以禮疏而來此以恩薄而往弟子既於師疏師遂顧之恩薄故不住而去也然牽牛蹊田而奪之牛春秋有牽牛以蹊田為過也而奪之牛罪之太甚矣今喻師之恩薄已非而便捨之不事若奪牛之甚也本輕而末重也師之恩薄本輕而不敬為末重如尊雖義不至卑則欲據其事歟父縱不父子不可不子也禮曰父母愛之喜而不忘父母惡之懼而無怨為人子者不患無所立而患不孝敬恭父命何常之有夫能移此於其師者豈使過及其身乎移事父不忘不怨之道而事於師則固無其過矣故有假師而為名侮師之涼德涼薄也假借也以其師之德薄殊無敬順之儀但假借師名而已將升堂則筋骨捷解俾侍坐則手足窳憜窳苽在穴也臥而不起懶人慵憜如苽在穴臥而不起也斯或尾大而難掉左傳尾大不掉今或弟子勝師故相輕傲也故訓罰之不至或螟蛉之有似物類之相召螟蛉者蜂取蟲而呪之似我似我不日而蟲化為蜂也今弟子乃他人所生取以教之令作其資其威尚不謹其容而德豈能服其心歟官有威刑事公尚不懼其容今師以德如何能伏其心也今澆季之風師求弟子匪弟子求師師以此始弟子以此終嗟乎何日不由之矣夫魯國先師以冉有僕樊遲御子貢糴顏回爨冉求字子有樊須字子遲端木賜字子貢顏回字子淵昔夫子在陳則賜糴同爨也其何至於此哉彼德厚可慕而弟子實慕德故也梁惠布三果至人也妙窮三論時號得意布也見樂生淨土者告云方土乃淨非吾願也如何在蓮華中十劫受樂未若三塗救苦者也生西方下品中生在花中六劫下品下生在蓮華中十二劫開花方得見佛不如三塗救苦衆生此乃悲增菩薩也凡法集先衆往而默彼譁者憚若銜枚德之至也升堂先往後生懼之而默靜也卒後手屈三指地動七日史奏得道人星滅矣高僧傳慧布誓生三塗救苦衆生昔魏玄高有願生三惡道齊僧景亦如之唯聖人與聖人而能至於此也陳衡嶽慧思衡嶽南嶽也在湖南今嶽州也證法華三昧能知前生事頂有肉髻知達人心毒不能害怨不能動初智顗悅其風而造焉思曰昔靈山同聽法華宿緣所追今復來矣遂示普賢道場四安樂行顗行道經三七夕誦至藥王品心緣苦行至是真精進句見與慧思同在靈山聽佛説法思云此之靈相非爾不感非我莫識此法華三昧前方便也思以三觀義傳顗顗以四教義裨之三觀四教之宗旨自衡嶽天台始也梁策草堂約為智者慧約法師也陳隋以顗為智者即今江陵玉泉寺關將軍起寺者也惟有道之賢聽虛名非美視虛器非重心若浮雲迹猶過羽唯器與名不可以假人而有道之高士視浮名亦不以為貴而帝天下者師其聖友其賢固其然也以梁陳隋貴有天下不可不尊聖而友賢乎或問嶽位告云吾鐵輪王位中人耳四加行位菩薩為四州王鐵輪王則合是暖位也或問天台位告云吾不領徒衆當淨六根一云八地已上六根清淨二云初地已上三云資加亦清淨今顗與思恐俱是地前資加也為他損己只是五品內人耳嘉祥初聞天台頗輕於耳高僧慧皎住嘉祥寺亦既目覿乃伏膺為徒又以三輪剖斷經例制勝之論而特聞於天下者也弟子智愷專門之業雖不盡於師而於死則有稱焉南土四朝克尚玄理宋齊梁陳資於龍樹提婆為不拔之論真諦雖譯對法唯識等部真諦三藏陳朝至會王室多虞天步孔艱孔甚艱難也後主變亂也承業學徒所究未弘有法遇鑽研講記殆乎過半惜哉短命不極其志將死之日勒焚遺草聞者為之涕零自後其徒沒沒焉遇法師所討唯識未盡其旨而至唐慈恩著唯識疏十卷洎真諦南回綜習無聞故色心之學終少聞於盡善章疏之家必先意於空理自真諦去後少傳法相多弘空性也國初玄奘貞觀年譯唯識授門下基窺某姓尉遲字洪道鄂公敬德之猶子也造百本疏慈恩和尚也兼之瑜伽也並大乘論譯俱舍授門下光未詳兼之婆沙也並小乘論可謂法相光華名數淵弘精搜真俗通乎大道彼空宗之學悄若乎不紓其志也奘三藏自貞觀年往西國學經論法相至貞觀回大弘法相空性之徒覩之若風恬而波偃太宗高宗製聖教序今見冠經首也華藻耀乎天文真風翔乎海隅洎玄宗注般若蓋二聖鴻基之積潤也玄宗注金剛經見行于世但世以譯經則易譯論則難而傳者亦如之傳經者止於尋文刻旨敘意連環故為易也傳論者循環性相洞達幽微故為難也實由經但斷疑生信旨遠而文近論則殫窮性相訓暢精微為義必典為文尚華錯綜音律鏗鏘彬蔚彬蔚文彩興盛貌也賓主相由鉤賾為美自非上智不能見往復之意故學之者鮮不功倍為山淺近之者聞而輕侮蓋非其境也為山九仞起於纍土也辨參神化以教行中夏始不譯論求其師資輔會之道難矣至今學經之徒其侶若林究論之士若披沙見寶也夫法學之侶知經律而不知論者但直讚述其文而已至於攀援大義則不謂之洞達者也故今蜀中凡善傳經者皆兼習論然後傳演方為美也其羅什譯經則齷齪譯論則舒緩玄奘反之故什世經學則優優勝也奘世論學則倍矣昔慧休者一鞋三十年遇泥則跣曰泥軟易蹈吾不欲損信施故也每告衆曰吾所聽經律皆三二十遍猶恨少功欲兼異部未遑多涉今之學者罕有備通文句薄知則預師範致有窮括莫知由緒此法滅在人矣所以終夜長想有慨于懷爾
