body:
  text: 合霸王第五明帝主相承西域漢地沙門遭遇時君興廢等事劫初蒸民胥于粒食蒸衆也胥相也地肥既盡則有自然粳米香稻既盡分土作蓻藝治也人既侵奪乃分土田而各治之為防疆里立大三末多王三末多此乃聚落王慮有強者侵奪遂立一人為王供其輸貢令作民主庶類欽承恩流率土重離繼體世祚天竺君父繼紹作天竺之主也至于淨飯凡八萬四千二百六十餘王阿含經云過去有王名懿摩有四庶子一昭目二聯目三調伏象四尼樓聰並聰明神武有大威德第一夫人有子名生頑薄醜陋衆人所賤夫人慮四子奪其位遂譖王長黜之王即敕四子各速出國時諸力士一切人民願隨之去至雪山間住直樹林數年之內歸德若市遂為強國父思見之召而弗往父乃三歎我子有能以此命族為釋氏阿含經云釋林為姓故有釋姓釋即樹也自懿師摩王之後有王名大善生凡七世姓瞿曇氏也昔有國王父母早喪讓國焉弟捨位求道見一婆羅門姓瞿曇氏因從學道婆羅門言當解王衣如吾所服受瞿曇姓謂之小瞿曇菩薩也自鬱摩王之後有王名尼樓聰凡五世釋迦氏也尼樓王生烏頭羅王烏頭羅王為迦維羅衛國主生瞿頭羅王瞿頭羅王生尸休羅王尸休羅王生四子一淨飯王二白飯王三斛飯王四甘露飯王淨飯王即佛父也大士既百劫修相好菩薩三大企耶劫修行至金剛喻定後百劫修相好千劫學威儀萬劫學化行也而後相厥生莫如剎帝利婆羅門而剎帝利位重也梵云剎帝利此云土田主則王種也婆羅門德尊梵語正云婆羅賀摩拏此云淨御是梵天苗裔唯五天有諸國所無為王者師故云德尊也但劫濁澆微德不勝位故我不生婆羅門也雖微國無剎帝利微無也而世胄綿遠莫過於釋迦自三末多王至淨飯王八萬四千二百六十餘王故餘二姓卑寒生則不塞於人謗故大聖不生也塞掩也二姓謂一鞞舍此云坐估俗多寶故以為名二戍達羅亦云首陀謂田農宦學者也五天分野周九萬餘里三陲大海北背雪山有八大國十六大城七十餘小國時無輪王統御從于霸國之令若有輪王小國咸服屬今既無輪王只以強者為霸者也其猶諸夏春秋之時王道衰諸侯受制於桓文周自幽王見殺之後平王東遷洛邑諸侯得以專征如晉文公齊桓公等禮樂征伐非一人之由也古者制禮作樂征伐之事皆須自於天子爾來專濫非從一人而出也是摩竭提為大國此云不至為此國將勇兵謀諸鄰敵之兵皆不能至周五千里城少居人邑多編戶沃壤滋稼穡有香稻粒味殊彼俗謂之供大人米土地墊濕邑國居風淳俗質氣序溫和也居海隅之中瓶沙王為君長即頻婆娑羅此云顏色端正即阿闍世王父也冠群后之列王舍城為法集勝會表萬派而朝宗也王舍城梵云矩奢揭羅補羅城此云上茅城出最上茅也摩竭提國之中昔因遭火出居此遂城而舍之後無憂王遷居波吒釐此唯婆羅門千家而住也靈鷲山為衆聖之奧府表群嶽之相下也俱蘇摩城既是山城近於王舍雖有五山此山獨勝高而且顯故表出過二乘多捿鷲鳥故名鷲峯阿闍世思皇登庸皇大也登升也庸用也大升用謂為君也以弒父敗名雖有功德不足誦也與提婆達多作謀弒父囚殺頻婆娑羅王又伏劍逐母韋提希等至阿育王大業中昌威被海隅勢侔鐵輪而不即其真也侔齊也即成也勢雖齊於鐵輪而非鐵輪也頻婆娑羅王曾孫也初法象經中造地獄法象依學也峻垣重坎爍鐵流爛搏人以投雖古有刳斫烹焚不甚此酷昔商紂刳剔孕婦斫朝涉之脛置炮烙之刑焚炙忠良剖賢人之心若以比方未足為甚慕勇濟惡克邁凶德南山下有一人凶惡堪為獄卒召之父母未允遂殺之而來也遇得道者以神力化之遽革乃過初國中犯法罪人無輕重總入塗炭後有行至獄次即擒以誅戮時有沙門巡里乞食獄吏擒入沙門惶怖請乞禮懺七日俄見一人縛入斬截手足磔裂形骸見已深增悲悼成無常觀證無學果雖入鑊湯若在清池有大蓮花而為之座王聞騁觀深讚靈祐後殺獄主遂廢其獄也大德毱多又以因果啓迪啓開也迪道也第五祖優波毱多以因果而開導之也重省增懼追思補復爰乃發八王之函甒樹八萬之靈剎毱多自廢獄之後日加善誘廣説獻土之因如來懸記興建之功乃集鬼神勠力同心以八國共分收舍利命鬼神至期日日有隱蔽其狀如手宜下舍利日正中時羅漢伸手蔽日營建遂成矣其王以施土之福功高位尊至於阿縱大天斥逐賢聖致令僧分二部自大天入宮之後日受恩寵於説戒夜與僧相爭無憂王黨之乃分大衆上座二部也佛法初破雖元惡大憝本不在已而為王者特無先鑒不得不均罪于厥躬也自此法乖一味也元首也憝怨也蓋以王者不能定罪正非斯其咎也申毒之北毒漢書音篤即印度也或云賢亘唐言月也月有一千名群生淪回不息長夜聖賢化之導物如月照夜以是立彼土名也有健馱羅國即北印度也去摩伽陀五百里無霜雪人好習藝敬外道無著天親生處其王名迦膩色迦佛滅後四百年霸而有禮博而能信師謨脅羅漢付法藏云波奢比丘曾生不臥脅不著席時人號脅尊者詮鍊諸部品格同異撰大毗婆沙二百卷雖有國有君無時無僧居信而行信是謂不佞口才曰佞為國之君居忠信而行敬信是謂不諂佞也王初不信罪福因獵見二牧童立窣堵波問之云佛記當有王於此收吾舍利大王宿殖已符遂信心深敬佛法也緇素用之大業昭服西國之人僧俗皆學此論也近世戒日王斯亞矣戒曰王即唐初時磨竭陀國王也亞次也周秦世真源遐擁靈津綿阻主與道違朝不登賢伯陽尼父薎遭遇也周秦之代孔老雖大賢皆不見用商鞅李斯肆其酷也皆暴酷之吏也俱不得其死而釋氏慎厥艱故不至也佛教未至者知其暴秦之艱難也然感化有時不可強也且漢承秦弊馬上以取天下藉英雄之力乃成帝業漢高祖仗三尺劍而取天下也故使論功之際皆拔劍偶語高祖患之漢五年會垓之後將封功而諸將競拔劍偶語高祖以雍齒曾射高祖有讎乃先封之諸將知有望乃定矣是以叔孫通徵魯諸生修朝會之禮瞻皇帝輦輿百官莫不震恐式遏當時之弊以尊萬乘威儀此乃尊天子而抑諸侯也故太皇反拜高祖父也家令受賜自稱霸業貽厥孫謀皇王之風崇師降禮未有聞也此前漢叔孫通等徵漢禮而未見尊師重道降禮自臣之事也夫黃帝問道於廣成軒轅問道於廣成子也唐堯順風於具茨堯王禮具茨先生並出南華真經豈非至尊之事歟洎漢室中興帝莊丕顯後漢第二主明帝名莊丕顯明也賓于大鴻臚司於大宗伯自西國摩騰等所來或安鴻臚寺或宗伯主之也故支謙安清支謙月氏國優婆塞字恭明漢未遊洛授業於支亮亮授於支讖世稱天下博知不出三支安清字世高安息國王子讓位出家漢桓元嘉元年至此也德重緇倫而未為王侯所師友也雖楚王修仁聖之祠孝桓興華蓋之祭皆漢諸王亦但神佛而已矣未求仁祠華蓋之人也但嚴其器也魏因漢禮徵用奇尚但以勤王鼎峙之憂何仁祠之於我克暇耶魏曹操字孟德為漢相以漢室微弱挾天子令諸侯而謀分不暇崇顯吾教也然雖不能弘贊其風而亦終不蔽其道也亦有康僧顗曇諦等三藏至而翻譯也三國初吳人未甚信天竺沙門康僧會始造於吳締搆行道孫權字仲謀都金陵以為誣矯異俗攝會讓曰攝迫也讓責也逼沙門而責之也佛有何靈爾獨改形會曰佛身雖滅遺骨舍利應現無方外國先王建八萬四千塔表遺化也權謂紿已紿音逮欺言也俾期舍利嚴憲緩罰至三七日會徒將死舍利乃降鎗然盤中上燭虹霓吳之君臣相顧乃悅曰至哉奇瑞也始立建初寺呼其地為佛陀里也是歲赤烏四年去永平凡一百七十餘年矣永平十年甲子至吳赤烏四年辛酉得一百七十八年矣吳洛一千吳人知法將無晚歟孫皓狂虐不道國將病矣初廢毀淫祠延及寺宇群臣議曰佛之威力不並餘神僧會感靈太皇創寺今若輕廢恐貽後悔皓意未謂之然使張昱至寺詰會會才辨奇拔昱不能加乃復于皓皓大集公卿洎庶寮徵會以車馬既至皓強詞昧理取會不及已皓問會曰佛教所明善惡報應何者是乎會曰夫明主孝慈訓世則赤烏翔老人星現仁德及物則醴泉湧嘉苗出善既有徵惡亦可驗為惡於隱鬼得而誅之為惡於顯人得而誅之王曰若然周孔已明會云佛教廣也而會酬抗盡典謨之體推引叶忠良之議皓然知其不可屈乃革容而敬焉故治國者惟聖賢與君子如皓之器識末哉安得不為亡國之主乎向非會以道義誘掖蓋肆惡不知紀極蕭牆之釁朱殷紫闥豈獲厚辱於晉乎皓字宗元和之子權之孫也初封烏程侯張布等立之後威虐無度為征南將軍杜預等收之皓面縛降晉入洛封歸命侯即大康元年會以赤烏始而來至天紀末皓降不臘而終赤烏四年辛酉到吳至天紀四年庚子皓降得三十九年也至冬會卒於吳始與國隆終與國殲殲滅也邦人之慕皓曷愈乎慕會也曷何也愈勝也土德既微鼎遷于晉魏以土德而應曆數也惠皇失馭天下崩裂惠皇武帝子名衷字正度立而無智朝政不治至永康年後所在分立為一十六國前趙起於離石劉元海新興胸奴冒頓之後漢高祖以宗女妻之冒頓約為兄弟遂姓劉焉元海猿臂善射成都王顙表之為寧朔將軍尤國城二旬衆已五萬遂僭即帝位命子聰寇洛陽劉曜後遷長安為石勒所殺共四主二十六年後趙興於葛陂石勒上黨羯人也起襄國擒王浚降劉琨遂即帝位六主四十四年石勒石虎兵強且衆抗暴為德其斬刈如草木焉沙門遇害者甚衆佛圖澄吊之曰彼人之何罪而性命不保算因勒將郭黑略顯其神異資其戎計必獲申於勒也他日略戰捷遇勒賜顏色果以澄事啓之勒喜而召問澄知勒不達玄理對言至道雖遠亦可近驗乃以鉢盛水燒香祝之須臾生青蓮華勒重其神聖稽首下風虛心納諫仁惻塗炭念慮不思石勒初與王陽支雄為群盜多行殺戮又石虎字季龍即勒之從子武勇抗所士女少有遺類胡夏之人應被誅夷者十九而生矣真可謂探人命於虎口者也是知修短在聖而不在司命司命能司之何能修短之以聖人作法而延救之非司命之所能也澄聽鈴聲兼觀油掌寄聰明於耳目而實虛照在心所言無不符驗矣圖澄每知虎之將敗假以油塗掌而現光又郭景略因以視之假以鈴聲及念於般若波羅蜜也而告之然深察在心假外事令生信所告必符矣石勒死虎襲偽號將謹慢俗聖敬日躋謹嚴也虎既繼位欲嚴謹於慢侮之俗因自加勤敬於圖澄也下書曰和尚國之大寶榮爵不加高祿不受爵祿匪尚何以旌德從此已往宜衣以綾錦乘以雕輦朝會之日和尚升殿常侍已下悉舉輿太子諸公扶翼而上主者唱大和尚衆坐皆起以彰其尊又敕司空李農旦夕親問太子諸王五日一朝表朕敬焉晉師出淮淝淮水出桐柏山淝水在廬江時晉都金陵石虎都洛陽也虎竊怒曰吾心奉佛更致外寇佛無神矣澄知之夜過詣虎曰王過去為大商主罽賓寺中常供養大會中有六十羅漢吾此微身亦預斯會時有得道者謂余曰此主人命盡當更雞身後王晉地今主為王豈非福耶疆場軍寇疆場邊地也國之常事耳何為怨謗三寶夜興毒念乎虎驚赧而謝嘗一日與虎坐忽而作作起也曰變幽州災遽命酒遙灑之虎遣驗其日火從四門起黑雲從西南來遇驟雨滅之雨頗有酒氣也澄將終謂虎曰出入生死道之常也修短分定非所能延天道重行全德重無怠道德不可以缺怠而獲也苟業操無虧雖亡若存違而獲延非其所願念意未盡者以國家心存佛理奉法無差興起寺廟崇顯壯麗稱斯懷也宜享休祉而布政猛烈淫刑酷濫顯違聖典幽背法戒不自懲革終無福祐懲戒也革改也雖建寺廟嚴奉佛法若刑法酷濫終無益也若降心易慮惠此下人則國祚延長道俗慶賴畢命就盡歿無遺恨君子以澄言實社之忠也普門之慈也有國者何莫志之君子者當時君子也或實言以褒德詩云人之云亡邦國殄瘁詩大雅瞻仰之章也殄滅也瘁病也言君不善朝廷賢人奔亡則天下邦國將盡病矣而澄亡彼群胡尸於冉閔矣世説云圖澄亡石虎開棺無尸唯袈裟在冉閔石虎養孫謀勇絶倫殺石鑑而自立旌旗鍾鼓綿亘百里唯事殺戮為慕容吝擒而殺之左右七里草木悉枯夫有奇質必有奇智有奇智則必有奇行有奇行必有奇言言則乃經古者鱗膚牛首虎鼻鳥喙伏犧龍鱗大準隆鼻神農牛首女蝸蛇身黃帝龍顏帝嚳駢齒堯眉八彩舜目重瞳皋陶鳥喙武王目羊周公背僂也皆稟不測之靈氣蘊不窮之聖德而澄左乳傍有穴圍四五寸徹於腹內時有光從中出以纊塞之纊綿也夜或抽纊則洞照一室齊日至水滸滸水涯也引腸而洗之此實至奇之表也並出古高僧傳永嘉之亂晉室東遷晉自惠帝即位朝網紊亂骨肉相殘趙王倫永康初亂至永嘉江都等作亂前趙後趙後蜀競起晉元帝鎮楊州遂過金陵號東晉也竺法潛晉高僧姓王名潛字法深蘊當年之譽王敦之弟也先事忠州劉元真崇德務學譽滿西朝劉元真早有才能之譽深為孫綽所重元明二帝丞相王茂弘太尉庾元規即王導庾亮也皆友而敬焉建武太寧中潛恆著屐至殿內時謂方外之士以德重故也後隱剡山請益者以方等老莊內外霑洽以內外經書而教導哀帝徵就御筵開講晉哀帝成帝子名丕字千齡穆帝崩無子而立之司空何次道宗以為師後啓還剡山既卒孝武詔曰潛法師理悟虛遠風鑒清貴棄宰相之榮襲染衣之素山居物外篤勤匪懈方賴宣道以濟蒼生奄然遷化用痛于懷可賻錢十萬贈死曰賻孝武名曜字昌明則海西王第三子也桓溫輔政帝幻而聰悟十歲即位穆帝世晉穆皇帝名𭾠字彭祖康帝子立年二歲褚太后臨朝支道林緇林之奇茂者也素風泠然清波繁華築室林野隱居求志道德文章為世所仰天子三事庶尹三事三公也庶尹衆鄉也賢士大夫巖藪知名無不高其英邁欽承道論謝安王濛劉惔殷浩孫綽桓彥表王文度若斯之徒國華物紀並東晉公鄉貴族之士也咸以八關齋法山行澤宿假日盤集滌濯冠帶供薦香花雍雍穆穆周旋顧慕雍雍穆穆和樂之貌契賞清奇為一世之盛矣王羲之謂人曰一往之氣亦何足信既見方悔前言殆乎耳殆墮也或本作玷並通夫所以陳有生者昭其類也詩曰惟其友之是以似之詩小雅常常者華之卒章也意以其君子有此高尚之風所得之友皆相似之與詩少別不以文害意也是知梟鳳不相群梟不孝鳥也食母而飛冬令捕而磔之於路字從木上鳥鳳瑞鳥也雞頭蛇頸𮨤頷龜背魚尾五色高六尺其雌曰皇豹豕不相侶豹獸如虎而小豕豬也舉善以求黨蓋率古之風也率循也仲尼曰不知其人觀其所友不知其君觀其所使賢賢乎哉實孔聖矣夫七子從之晉侯霸也七子謂顛頶魏武子司空季子狐偃趙衰狐毛賈他七人從晉重耳出奔終歸晉四翁來護漢儲定也漢高祖以戚夫人將立太子未定上下惶惶張良令呂后請於商山輔之入朝高皇一見其位乃定矣四皓一東園公二夏黃公三綺里季四角里先生角音祿張祿去魏秦之興也范睢為須賈所譖受魏齊之恥乃改姓名稱張祿先生秦用之為相封侯而大興秦國也惡來相紂殷之亡也史記云飛廉生惡來事紂多力又善譖毀諸侯武王伐紂誅殺惡來也其言至驗人罕存懷故古黨舉黨誅誠不失天下之善惡也古刑其黨善者盡賞之其黨有惡緣坐而誅之今之小人多竊君子友生為譽近日矯詐之徒自無德行依附高流苟求聲譽狐媚於世也而閭里不討其端倪相與納其誣譎而高識者難獨謂之不然故朋友焉於古則直於今則濫矣子云友直友諒友多聞益矣友便辟友善柔友便佞損矣林公被留京師三載思歸東山帝不時允固以表辭其誠哀焉偽秦涉公者高僧涉公本西域預言之事多驗建元十五年至長安十六年卒十七年大旱也不食五穀日行五百里能呪龍下鉢中令降雨涉公沒歲大旱符堅謂朱彤曰朱彤祕書監也涉公若在豈使朕燋心於雲漢哉初秦太史奏有德星現於外國分野當有聖人入輔中國得之者王堅乃分命符丕丕堅之庶子也伐襄陽取道安呂光討龜茲求羅什具足云鳩摩羅什此云童真朱序為秦陷晉南中郎將朱序為丕所陷致道安并習鑿齒堅喜曰朕用師十萬得一人之半也一人謂道安半謂習鑿齒國有疑謀并古器服篆隸寶玉所不識者俾咨詢于安堅嘗欲遊東苑命安同輦權翼諫曰權翼秦左僕射臣聞天子法駕侍中陪乘道安毀形賤士寧可參逼乘輿堅忿然作色曰安公道冥至境德為時尊朕舉天下之重不足以易之非公之榮乃朕之榮也使翼扶安登輦然臣諫顯忠也主拒愛賢也權則區區之尺度權翼之諫乃臣子之宜然不能尊賢重德亦器量之未廣也符則汪汪之陂湖安公實為一代之賢符主深所器重雖有強諫之言亦終不納信為深識之見也君臣向背若不相合若然也似也而於國則合矣故君子和而不同匪茲何取焉君子之道不爭然所見各不同所謂殊途而同歸也彼偽符猶愈於真桀桀雖真主而無道秦雖偽霸而有德誠可謂得霸之道也道安常山扶柳人姓衛家世英儒早失覆蔭為外兄所養七歲讀書再覽能誦十二出家貌陋下為師之所重執勞作役曾無怨色數歲之後方啓求經與辨意經一卷可五千言齎經入田暮還已誦復與成具光明經一卷咸萬言如初亦誦師執經覆之不差一宇矣秦克燕與涼前燕即慕容暐據鄴都為堅所破前涼張天錫據涼州為堅所滅也降其君為臣渤海流沙恢為國壤渤海盡東流沙盡西足食足兵威振海內常患不得纘禹舊服登會稽而望滄海朝萬國以號令天下禹於塗山會萬國諸侯執玉帛而朝貢塗山在越州會稽也纍問安伐晉之計安亟曰晉德雖微天命未改難可圖也君子亦以為私護援本朝而實得禮也故一言而兼致焉符以獨夫之見書云獨夫紂也爰舉百萬之衆符融治前軍晉之詐之末鼓未成列秦師大崩潰符堅學長安之兵騎八十七萬前後千里旗鼓相望東西萬里水陸並進符融為將晉謝玄等以水軍七萬拒之王道子以鼓吹求助於鍾山神堅至壽春登城而望見八公山上草木皆人狀引軍陳於淝水晉師不得渡遣使謂融曰君懸軍深入逼水為陳此乃持久之計豈欲戰乎若小退師令將士周旋僕與群公緩轡而觀之不亦善乎融揮軍却陳軍遂奔退制之不可融馳騎掠陳馬倒為軍所殺自後燕復於燕堅敗後慕容沖起兵攻長安慕容垂歸鄴城而稱後燕也涼復于涼李皓本張軌將後稱西涼於燉煌也呂光稱後涼於姑臧秦據于秦矣姚長遣將圍堅於五將山執而縊之于新平佛寺自立為後秦先是釋公亡釋公即道安堅臨慟哀過曰慟曰吾其未濟也安公捨我而去矣於其言寧謬哉安初謂王子年曰世途若此盍行乎盍何不也年曰公可前往須吾償後債耳年後得害於姚萇王嘉字子年洛陽人形貌鄙陋似若不足好滑稽不食五穀有問善惡應答狀如戲調事過多驗答道安云小債未了不得俱去及姚萇得長安與符登相持甚久萇問之朕當得否答曰略得萇曰當言得何略之有因斬之萇死後子興方殺登興字子略即嘉所謂略得之意也法汰如于荊謁桓溫溫恃威名重不速於賓接汰患其躊躇忽告謁者曰吾有疾遽退他曰汰至溫不俟履屨而前之也法汰東莧人少與道安同學才辨雖不及安而姿貌過之也安既俘于秦門人各馳散慧遠初將屆羅浮山近南海至潯陽江州也卜廬山而棲息既獲朽壤抽泉故不求去慧永並道安門人邀止西林廬山之西林寺也後刺史桓伊東晉臣也別立東林寺先是陶侃鎮廣州陶侃字士衡初好學延接賔侶客至家貧母截髮賣之以供待後為八洲都督得育王像即阿育王所造之像也送武昌寒溪寺武昌鄂州也遠寺成遙請像乃凌虛而來當時搢紳儒林傲世考盤其若宗炳雷次宗劉遺民周續之張季碩之輩南陽宗炳張菜民張季碩彭城劉遺民預章雷次宗雁門周續之新蔡畢頴之僧惠持惠永共為蓮社也凡百大名君子咸與胥附胥相也遠少與惠持偕為諸生精六經學禮樂名教特為朝野法度王恂與范寧書王恂為桓溫主簿范寧注穀梁傳曰遠公持公孰愈孰誰也愈勝也范公復云誠為賢兄弟也持與遠實親俗兄弟也王重曰但令如兄弟誠未易有況復賢耶姚興初譯智論訖智論或稱智度論龍樹菩薩造篤所聘請遠製序其見重殊絶如此桓玄征殷仲堪桓玄字敬道大司馬溫之子為江州刺史元與二年篡晉安帝劉裕舉兵桓玄乃征仲堪也要遠出虎溪遠稱疾玄自入山左右曰昔殷仲堪禮遠願公勿敬之曰何有此理仲堪本死人耳既見素反前約素先也本言不禮及見即禮出山謂左右曰實乃生所未見後玄欲沙汰教僚屬曰廬山道德所居不在搜簡之例簡閲也初成帝沖幼庾氷輔政晉成帝諱衍明帝長子皇太后庾氏攝朝稱制祖約蘇峻及庾氏專政也以為沙門應敬王者何充王謐等駁議同異不定後桓玄在姑熟姑熟當塗縣也舊日宋主改為太平州欲令盡敬且以問告遠答書并製沙門不敬王者論五篇以塞橫議書并論並在弘明集安帝迫桓玄篡遜于南郡安帝諱德宗孝武子以會稽王道子為太傅攝政兗州刺史王恭與桓玄反遷帝于潯陽玄乃篡位二年劉裕誅之玄死大駕克復舊京何無忌前勸迎候無忌為侍中遠稱疾不行恩旨勞問遠以書謝詔答歎恨不果見也持至井絡井絡之人望風趨慕惠持入蜀住依政縣後巖院也偽蜀譙縱之子道福尤凶悖將兵有所討還至郫中鄒縣蓋法定寺寺僧徒遙見人馬流血盡奔走懼戰士也持在戶前盥洗氣色晏如福既至特彈指漉水竟不輟福灑汗而出謂將校曰大人固與衆異耳君子曰晉失中原介于江國衣冠避五胡之亂五胡前趙劉元海後趙石勒後魏拓跋氏前秦符氏後秦姚氏也莫不南遷邦家以北伐為謀且慕膽勇致使英賢緇素宅心事外鸞吟鶴舉視爼豆紱冕而若遺也宅居也事物也高尚之流覩世陵夷居心物外放鸞鶴之情匿林泉之側於禮樂而不顧也夫澄安林遠製作對𫾻皆詞氣沖深有倫有義倫理也雖宣象外之風率多經濟之略故始言首事必信重於天下矣呂光入龜茲獲羅什膝其頭令倒乘駝付無慍色光乃特器異之不敢狎侮符堅令呂光將兵伐龜茲求羅什既克獲之不甚重遂以龜茲王女強逼之又令乘惡馬馳駝什無怒容及歸勸令移營地果大雨水漲由此光特加禮重矣暨返斾于涼聞秦敗遂僭據其地改車書呂光伐龜茲回以駱駝二萬餘頭駿馬萬匹珍寶千餘回至姑臧聞符堅已戰敗自稱涼州刺史後僭位稱後涼凡十四年姚興命將討涼求羅什涼亡致之于關中四方學侶大集會秦謀胤其後以室強之姚興慕其聰俊逼之宮妓以求其種淨行者恥聞其事夫宋龜靈而納介荊人辨而召刖宋元君夢人披髮告之日豫謂清江使者伯漁者預且得我元君召問之云得龜乃刳之以卜七十二鑽之無遺也又卞和於荊山得石辨之有玉獻楚王王不識雙刖其足三獻方別斯皆以靈智而受刳刖若羅什以聰明而污戒也介殼也豈非智有所可力有所困乎故繼益以損物莫為之不惑也魏孝文詔求什孝文諱宏獻文帝長子五歲受父禪遷都洛陽改姓元氏在位二十九年仁孝雅好黃老尤精釋義後既得而祿之雖吾教以仆陷大譎不正也然春秋之義言功十世亦可宥也春秋有功宥十世之罪初童壽在外國遇聖者告之曰若慎無適東土將有大不利焉什乃不顧而來豈非良臣死國計良執死高義仁者死成仁何顧之有也將弘大教不可以小節而堅守法門于今受其賜教之盛而什之力也故什死焚之心舌不爛焉僧導十歲從師受觀音經問曰此經有幾卷師欲試之乃言止有一卷耳導曰初云爾時無盡意故知爾前已應有事師奇之居貧無資以樵蘇夕學洎業成姚興欽其德入寺造敬同輦還宮宋武悅其賢為之於壽春立東山寺也宋武劉裕收後秦與僧導歸金陵也晉曇始孝武末東晉也帝臨位深奉佛法符堅兵至謝玄破也適遼東高麗開導始也後還三輔三輔咸陽縣昔秦皇於此置殿觀三輔人宗仰之宋武滅姚泓留子義真鎮長安赫連屈句赫連勃勃也追敗之道俗少長咸被坈戮始接刃不傷屈句自擊以佩劍無能害乃恐懼謝罪洎魏世祖虜赫連昌赫連勃勃之子為後魏所滅得始每加殊敬既滅法玄風勦絶赭衣其殲赭赤衣也蓋乾陀色始乃閉形幽阻非虐命所及遁迹山谷也蓋鴻飛冥空高視天際非罻羅之所得也罻網也後知大法將亨於月正元日天子履端謂正月之旦也履端於始舉正於中歸餘於終造曆者以步履之首謂月節舉正得中氣即為其月二百五十四日所餘一十一日二十五分積三十二日為一閏也廷實旅百實滿也旅衆也謂元日進奉之物充廷也荷錫於國門將圖其變也魏主聞而怒命有司速乃辟肌不容刃手劍之其傷如線俾投虎檻虎避伏乃汝也辟刑也俾使也其末如之何召即殿詳考興廢因問國祚矩永之事始乃扃鐍邪關芟夷梗途燾悽然悟矣後魏太武諱燾初不信釋教坈沙門毀佛像等因遇曇始化之後悔過南征宋殺戮無辜立二十九年太山僧朗凡聖不名人也晉魏燕秦六天子降詔問所供聘皆極世瓌奇寶貨焉雖珠璣無脛至人無心而德之所召故無遠不屆至人本無心求於珠玉珠玉亦無脛足而行但道德昭感而無遠皆至也由是德因名顯名以德固名德相副實則永世故今金輿谷靈趾不昧矣齊州太山神通寺南燕慕容德為僧朗禪師之所立也以三縣民給之長廊延袤有餘間三度廢寺毀之不得犯者朗輒見身以錫杖揮之垂死求哀如初有一井女人臨之即枯燒香懺求還復如故立四百年至今佛像鮮明如新衆會不踐于今儼然西秦北涼俱微國也西秦乞伏國仁據河西北涼沮渠蒙遜據姑臧觀乎聖賢曇無讖法進道朗所譯製撰其國非小焉故楚書曰楚國無以為寶唯善以為寶否者安得不由五運遐棄厥荒奄樹社自搆一方之鴻業矣梁慧約始過志學已有老風剡人謠曰少達妙理婁居士既入道玄德嘉聞升為國師詔以舊宅為本生寺所居里為智者里也北齊法上高歡受東魏禪都鄴稱北齊為後周所滅肇落兩髦嶷然成器刻意尚行頗究玄微時人以為聖沙彌由形色非美諺云里沙彌若來高座逢災文宣請為戒師掩面布髮令蹈乃受降君之敬罄矣天保中國置十統以上為大統也降音古𮎨反謂降君父之尊行師資之敬也文宣諱洋字子進高歡第三子時有爾朱榮之亂共憂寒餒帝始生數月忽欣然曰得活耶及登位神武冠絶至末年毒虐誅戮不可言紀崩年三十六隋靈藏高祖龍潛之友也隋高祖姓楊諱堅以周大統七年生馮翊般若寺紫氣充庭襲爵隋國公周武為太子聘帝長女宣帝崩劉昉等以帝輔政帝為丞相帝崩受周禪在位十二年潛龍曰與藏為深友既御極彌篤舊素敕其宮閽入則未吾禁也出亦如之而坐則同榻行則同輦曰弟子為俗人天子律師為道人天子今謂帝王之言過矣君言則書何可戲焉君之左右所舉必書左史記言右史記動夫愛人不失其義則其愛遠矣歲苦旱雩而不雨國人騷非有年帝以聽於神無若聽於聖人也乃請曇延於大興殿登御座南面傳戒帝命朝宰席北面跪受不崇朝而雨焉衣與食皆出自帝宮傳自帝手尋升為平等沙門於所犯者兩造具備然後泣而懲之哀敬刑書弘大禹之悼罰曇延姓王氏蒲州桑泉人幼而慧沙彌時有薜居士因書四字示之方圓動靜令體之延應聲曰方如方等城圓如智惠曰動則比識浪靜類涅槃室薜驚駭後著涅槃經疏十五卷於舍利塔前祈請放光夜燭也帝嘗欲試沙門器度廣搜嘯于殿廷敕禁甲虎賁奮劍逐之唯敬脫步武若暇逶迤而退帝美其弘遠命升殿錫法物道服旌其異也高僧敬脫常擔母學業善大書筆如臂管長三尺方丈書一字更不修整隋文命上殿賜大竹扇面闊三尺即令執用并賜松枸高屐令著從宮中出帝自送之曰誠僧傑也觀乎仁壽開皇天下大定亦以善之至也而智不圖遠家愛不臧臧善也家愛謂煬帝承父之大業而不修令德荒惑女色以至亡敗矣遂使卜世不永故吾教以福慧為兩濟闕則何言哉隋三帝共三十八年矣而禪于唐古者有德而爵有功而祿而沙門有至卿大夫爵祿者也古者生名冠字死諡而沙門有至侯伯之諡者子生二十冠而字字以表德也歿而立溢周人以諱事神名終將諱之故易之以諡古者無賜紫衣師號者有賜諡號者如定蘭賜諡覺性悲夫秦人竄跋陀於廬山跋陀此云覺賢一日誦習敵餘人一月自中印土至秦與羅什論議甚有神異為僧䂮等謗逐之往廬山譯經一百餘卷七十一而卒魏后辟玄高於平城高生而神異後魏拓跋燾僭據平城高與太子晃善晃被讒父疑高又為崔皓寇謙等譖帝帝怒縶而殺之光明至寺弟子方知遂請尸欲葬之高復起備言吉凶而卒出梁傳苟非其時雖聖賢尚致危身之酷豈止泣麟傷鳳而已哉故漢文優賢而賈誼猶謫漢文仁聖而賈誼賢才猶謫長沙而卒魏武禮士而孔融就誅孔融字文舉為魏武誅之融二子八九歲方奕碁不起左右曰父見誅何不起耶二子曰豈有覆巢之下復有完其卵乎尋俱收而死也豈非通塞之命懸於時運哉余嘗適莾蒼之野莾蒼郊野也遭鮮風騰馥為之四顧得紫芝數本於衰叢之末而野燒所及莖蓋毀缺乃擷而玩之擷胡結反但顧拙於所庸日暮置石上而歸他日登朱門覩瓊籠之中巾以文繡與余之先見者奚異也但遇不遇也惜乎人之於人何莫若是哉至化第六明大覺以悲智之心行至極之化大聖恭己萬靈作輔利見為心匡救為功光宅天下者化天龍翼奉釋梵宗師統三界以居尊總四生而並化或作大夫或作人王應以宰官小王等現化洎百工鬻香長者廣大國有鬻香長者名優鉢羅善別知一切香亦知和合一切香法燒塗末等又知出處有香名象藏因龍鬪生若燒一丸起大香雲彌覆王都於七日中雨細香雨著身樓閣衣服悉作金色摩羅耶山有栴檀名牛頭香若以塗身設入火坈火不能燒雪山有香名阿盧那衆生嗅者離諸染欲濟海船師南方有城樓閣中有船師名婆施羅在其海上與百千商人方便開示佛功德法度脫衆生苦行外道都薩羅城善得山有外道名遍行為人演説一切世間巧術伎藝又能調伏九十六種外道令其捨離所有諸見戲沙童子南方自在童子於名聞國河渚之中與十千童子聚沙為戲此童子於一切衆生名一切業名一切諦名皆悉了知其有益於生民者而無不為也或悶悶焉示之以朴悶悶昏愚貌或察察焉示之以智察察明達貌或行行焉示之以勇行行剛強貌或衎衎焉示之以和衎衎和樂貌而不得求之一致也不可捨一以求之也故或吸或闢或顯或晦或窪或隆吸聚也闢開也顯明也晦暗也窪低深也隆高顯也將得之又失之將依之又違之其德淵乎其迹渝乎其表覺乎其影訛乎其音揚乎其響塞乎誠莫可徵其微也是以真道焉可以修身權道焉可以御化真道滿教也不專利已權道半教也不能兼濟御攝也真道不可以暫廢故混而不滓在果不增居因不減隨常流而不溺處群萃而不異故也權道不可以久立故捨而合道也設權暫用故不可久立須歸常道也而真道終終焉上終字周圓也下終字三祇之果乃是終竟之處六度萬行之真道能周圓三祇之果也權道始始焉上始字初發也下始字五戒十善小聖之行等也佛開此權宜之教以為初發趣入之始也如調達行三逆而終得授記三逆亦有報也梵云提婆達多此云天受佛之堂弟斛飯王之子從天神乞得故常與佛為冤以石打佛腳損出佛身血破和合僧殺比丘尼是三逆罪雖入地獄靈山會上亦得授記三逆之報豈徒然哉聖記顯復歸乎本也常不輕禮四衆誠則失儀但劫濁難化而聖善用時寄迹申禮法華經常不輕菩薩恆禮四衆而得成佛應權逐時者以時多輕慢故盛行禮敬而化之也西域優陀延王與賓頭盧少相厚善賔頭盧姓頗羅墮住摩利山不入涅槃王每至賓頭盧不為之起左右請王用治法王曰事既矣既已也前度不起之事已了須吾後往異日王至賓頭盧念欲不起恐王害己墮於地獄念欲為起慮損王福失於國位俄復裁之失國之重不甚惡道起愈不起宜從愈也乃前逆王七步王駭其無恆賓頭盧曰吾前慮王失位也今將為我害故不獲其慮也王曰吾失國幾何對曰後七日當亡國七年矣北齊僧稠見文宣無將送文宣高洋都河東在位十年崩帝密納邪譖兼之以讖忌黑衣時有譖文宣云見王不起有輕君慢主之志又有讖云黑衣當王稠著緇衣疑應也覬異日往以大不敬除之比大駕幸山中稠出山二十里孤立道側帝曰嘗他日不吾爾今則然稠曰恐身血不淨穢污僧房耳帝內戁請以身負稠還所止稠固不受命焉不受負還之命也易曰君子之道或出或處或默或語言隨應變時也所謂邦有道則智邦無道則愚用之則行捨之則藏也夫富有天下者貴有人民者視行藝猶雞犬牛馬之類耳其始以能知時雞也能吠守犬也能致遠牛也任重致遠能代勞馬也而悅之終不以其能而不殺之而不食之而不皮毛用之故彼慎恃其賞而懼及其害尚寡乎吉也況道德者此等禽畜雖獲賞愛猶及誅害若奇禽異獸為萬井不急之用井鄉井也九家為井其或遭一士之所悅其能久乎而至德之世上古之時也鳥巢可窺麋鹿可羇者何以殺機微也後世高其巢遠其人禽則高巢獸則遠人懼殺戮故也莫得馴狎者豈不以機之甚乎如吳季札聘晉入境嘆曰暴矣從者問其故曰吾見鳥巢高或以知暴也仲尼云傾巢覆卵鳳皇不至窮藪竭澤麒麟不至嫌其害也惡傷其類也故賢者不輔勢善下已不阿黨而高踞故也天授其福人思無競死生由命富貴在天別報所感不妄動矣夫處於權豪權勢豪強之士也鮮有不忕已而務多尚於人者鮮少也忕習也務慕也尚勝也高貴權豪之士少有不習念己權豪之勢既習念之而必切求勝尚於人顧彼門寒援寡雖負智藝𮆘之何有權豪之者於蓬門蓽戶之士縱使才藝凌雲亦不顧之想於己不由姑息則必𮊟繳以罪而毒之姑息憐憫也既不憐憫即必別事羅織而加罪戾以害之也故書曰世祿之家鮮克由禮尚書畢命之文世有祿位之家少能用禮也奈何以禮而欲理其介耶而吏或有志有氣者以殘刻為德豈知溫渥之惠向使遭虎兕眥睚亦當以力觸之何望於怒耶眥睚怒貌觸對抵也豈懼其怒也昔管蕃殺帛遠遠字法祖本姓萬河內人少出家才思俊徹日誦萬言張輔愛之欲命歸俗不允後與道士管蕃論義蕃屈譖之於輔輔殺之群胡聞之怒而入秦州殺輔與蕃也庾恭戕法慧法慧關中人方宜有戒行晉康帝建元中止襄陽不受別請每乞食輒齎繩床自隨一時遇雨以油帔自覆雨止不見之僧法照曰汝過去曾傷一雞足其殃將至後為征西庾雉恭殺之也肆怒勇罰一何甚哉諒亦由彼不自流遁又不危遜諒信也遁逃也賢者避世既不能避世之惡即合便危行遜言包周身之防而自取其禍也凝滯業理故至是也但凝滯不通指業報而斷之故也或以道富則不有己故被褐節粒捐形骸如委蛻固不難其死安能矯示耶其間或有道德孤高洞達空有物我俱喪於死故無所懼安能矯飾求生者也彼蓋不得死之義也既非匡救教門又非求道濟物虛趣一死亦奚以為哉夫有勇而輕死有喪我而輕死於其勇者不愚則仁勇而死者或因愚故而不懼死或以仁故而勇於死愚若暴虎憑河暴虎徒搏也馮河徒涉也仁則得義登於明堂以捍國難而死則登於明堂喪我者聖仁也非故觸死死至不懼也悟達生死何必懼惟業可懼也昔魏周之際何嘗有匪躬折檻勇死於義者漢書朱雲字子遊魯人成帝時張禹為帝師甚尊重雲上書云願賜上方斬馬劍斷侫臣一人頭以厲其餘上曰誰也安昌侯張禹帝怒小臣居下訕上廷辱師傳令御史將下殿雲攀殿檻折辛忌叩諫乃止自後魏後周何嘗有此人也雖靜靄道積之徒空巖殺身蓋亦自經於溝瀆之流也靄諫周武沙汰不從入山刺血書石上以腸挂樹出心捧之而卒論語云豈若匹夫匹婦之諒也自經於溝瀆也平齊之後慧遠憤惋吒然霹靂之下詞又不婉辮鬚逆鱗幾不免害遠公諫周武幾誤旨而出後遠竄山林而講涅槃經至隋文興方出故賢者能權聖者知機雖不貴生亦不可輕死也稠謂高洋曰檀越昔為羅剎但臨水自見帝從之覩群羅剎遂不食肉罷縶鳥獸禁鮫屠薰辛入市晉齊説高洋征契丹先露頭祖身千里唯食肉飲水壯氣彌厲為君之後祖露形體傳粉塗黛駱駝牛馬不施鞍勒男女錯雜徵集淫姪親看無禮支解婦女以鞞為瑟琶自破人腹登舍之梁疾走如地殺戮不可勝紀以此觀之若稱羅剎不謬也初帝在晉陽敕人乘駝向寺取經函使問所在洋曰任駝出城及出奄如夢至一山山半有佛寺群沙彌遙曰高洋馲駝來便引見一老僧僧曰洋作天子如何日聖明曰爾來何為曰取經函僧曰洋在寺懶讀經今北行東頭是也後帝至谷口木井寺時有捨身癡人先不解語忽謂帝曰我去爾後來是夜癡人死帝亦尋崩於晉陽有太山道人帝問之曰吾得幾年為天子答得三十年帝曰十年十月十日得非三十也及期果崩帝愚智不測委政揚遵彥而大興寺宇竟日坐禪禮佛行繞其疾如風鄙謂如高洋自符黑讖矣先是讖稱黑衣作天子疑禱禪師今北山和尚意以高洋字聲與羔羊同即是黑也先是魏正光已後先是胡太后臨朝清河王懌勒兵決事於殿中改正光元年人入市者各稅一錢統內多虞王役光病所在編戶相從入道猥濫彌積略計寺廟三萬餘僧尼二百萬至周武克齊齊承魏後寺出四千五衆減三百萬衛元嵩或以佛法惡賤假剛酷召禍之主託以訕謗將使滅之滅而復興與天下惟新之義也元嵩蜀新繁縣人出家於峨嵋山黑水也上策二十道令澄汰無行富僧置一延平大寺安四海病弱之徒其理甚當唐大宗入冥見之在獄自云於此如第三禪樂也故唐臨傳云其人不在三界經云示衆有三毒又見邪見相法華經也豈非斯人之徒歟但至人行權事濟啓權若終閟而不啓則狡者效權害實矣如元嵩則未盡權之術也宋柸渡海上謫仙也隱其姓名時人以乘柸而渡乃即事呼之也亦曰度練或有處呼為度練古者呼僧曰道士阿練阿尚是也更有此三名嘗寓宿於逆旅昧旦早朝也竊金像而行主人奔騎追之彼徐而不逮逮及也奔馬進不及至孟津浮柸濟河孟津黃河也達于京師衣服弊惡飲食喜怒俱不節也荷一蘆篅篅竹器如小籠皆盧竹為之篅中置一木柸嘗欲往瓜步瓜步江淮地名昔孫鍾種瓜於此也揚子江上也津人不為操舟乃自纍足於柸中眄睞吟詠直濟北岸嘗一日於廣陵村舍金陵也遇八關齋會置篅於庭中其家屬將徙之其重莫能舉嘗有窺者見四小兒居焉初偽死於廣陵北巖下菡萏繞身生於石上葬後有見在彭城徐州也開棺視之惟靴履獨在僧著短靿靴謂之富羅朱虛期宋人也使自高麗還失濟於洲上得度之鉢既至度曰我不見此鉢已四千年矣度見鉢識之也梁寶志飲啖非法髮長數寸執一錫挂剪刀及鏡或二三端帛齊武謂佯狂惑衆南齊武帝姓蕭名𦣱字宣遠道成之子在位十一年崩遺詔靈上勿以牲祭唯餅飯而已不許出家入道及起塔寺以宅為精舍等也繫於建康而志分形遊於市上嘗就人求膾既飽而去主人視盆中魚活如故志公嘗對梁武食膾梁武譏嫌之志公遂遽吐於水咸見魚如故唯尾損至今江陵有膾殘魚也武帝酷刑志假其神力令見高帝於地下受極苦高帝蕭道成也由是廢錐刀之害梁初其迹孔盛有陳征虜悉家事志志為現真形光相如菩薩像焉有以觀音為志今或建之也即今十一面觀音也夫十住大士猶能為作十號之佛地前初人劫為十住也況菩薩歟故或以志為觀音非必觀音為志也聖賢權化皆爾未必唯是觀音志每造光宅雲輒更於宿曰吾欲解師子吼雲為剖析而彈指日善哉微妙矣臨終燃一燭付後閣舍人帝曰彼將以後事囑我也敕厚葬即梁武天監十四年卒於開善寺也有史宗者蓬萊人麻襦邵碩張奴四人皆物外之止皆其類焉麻襦與佛圖澄相見酬贈之詞頗為祕奧時張奴人少見食而常肌悅冬夏唯一單衣外國道人僧佉吒神異人也寓宿長千寺在楊州與僧悟同室夜取寺剎捧之入雲然後乃下敕悟勿漏剎寺塔柱僧佉侃不使悟漏泄於人後路上見張奴僧佉見也欣然笑曰吾東見蔡豚南訙馬生北遇王年皆隱迹之士也今欲就柸度乃與子相見張奴題槐樹歌曰濛濛大象內法界空曠物象浩蕩也照曜實顯彰本性靈明恆自照燭何事昏迷子縱惑自招殃本覺之性不能自識五欲顛墜迷惑招殃此乃傷悼凡愚不悟之意也樂處少人往諸佛之境長垂接引凡俗愚蒙不肯趣入苦道若翻囊淪溺三塗一失人身再不可得猶如水囊不有松柏志何用擬風霜不有堅志何對衆境生死風霜到來作何準擬間豫紫雲表長歌出昊蒼昊蒼天也此張奴自敘之意也即間吟樂道遊泳於天地之間也澄虛無色水上善若水澄虛無波萬境不動識浪元平矣應見有緣鄉此方緣盡他方化歲曜毗漢后毗輔也東方朔乃歲星之精下佐漢武帝后君也辰麗傅殷王傳説乃傳説星下佐殷王武丁伊余非二仙言我非此方朔傳説二仙也晦迹之九方九方八方及上也亦見流俗子觸眼致酸傷此二句是傷意也略謠觀有念寧曰盡襟章因有所屬意略為此歌寧可盡我襟抱之量也吒酬和有寄致書其文未覩張奴與極度言莫有解者劉公嘉話所謂廋詞也蓋彼神遊於有知之外而內者不及耳三界皆所知之境疑此人是三界外者今處三界之內故不及其言論也夫飾愚為智易也即聾從昧難也左傳文也如彼柸度寶志貌異心符蓋君子和而不同也而中照未嘗愚而內融真境豈得曰愚愚者謂之愚愚不達故謂之愚遺迹不衒智智者謂之智晦迹內照識者知其智也惟人心無恆待境而遷凡物理守常則耳目不駭若非顯異則不能回其心識駭其耳目故於滔滔之際必假託奇行方以助教當澆俗滔漫之際則宜設奇行以權化而助教風其猶風雨雷霆之變革于萬物之情耳革改也春雷震而蟄戶開東風飄而輕氷泮革卦上六云君子豹變其文蔚也經稱三密其不在此乎三密言行心也然大儒小儒以詩為盜大儒君子儒小儒小人儒也儒者夙夜強學以待問懷忠信以待舉力行以取自立有如此者也今之小儒記片文隻字苟竊名譽故謂之盜也愚緇愚俗以法為盜故有竊妖容浮怪之言故有矯詐之士世稱聖人遂亦竊效妖容怪服而蠱惑於世深為濫溢者也始稱智聖終則鄙辱若山果金剛禪之類多矣但至信者真詐俱進嘉苗敗於糧莠嘉苗禾粟也糧種梁也莠稗草也雖糧為莠所雜猶亦稱於嘉粟也不信者愚聖俱退和玉混於燕珉不信之人好惡盡退故王石俱棄燕珉石似玉也耨夫琢匠適足為之悲矣耨夫耕者琢匠玉人糧莠燕珉故為悲之權貴之門罕有不以甕盎窮奇為有道者盎盆屬貴門以一類庸僧見其如盆質朴殊不知內蘊窮奇狡詐之行便以為有道之者也尚其心腑混沌鄙容陋行只以其衣服塵弊言語朴拙便尚之為道者始親之次譽之彼愚得幸於豪貴而昧於刑憲姦回是庸無愚惡而不為也既彰矣彼自不以瞍為咎反謂天下為緇者皆莫可也膄無目也自無別識顧用姦邪之徒及至乖彰反責清衆豈不迷哉炙轂子喻之蠱惑也用渝齊潔以愚參肖將此凡庸之類渝濫者齊於清潔之徒愚濁參雜肖嗣也曾不知僧有迹窅天府神虛纍外出入死生動寂無方其至德克至於此者僧有與天地合德擺落塵滓隨往不滯其至極之德能及此也僧有器重名揚教宗人範可望不可邇可以德望不可情狎難進而易退性同雲鶴世莫得親也其高世而至於此者僧有慈良處意爰物與樂曰慈無所干犯曰良仁恕克己周慈布惠曰仁忖度合度曰恕讓則自及謙身約已曰讓慶則均人勝事周隆曰慶其潤物有如此者至若革囊天仙瓦礫珠璣革皮也若見外現質朴謂之革囊瓦礫而不知內蘊天仙珠璣之行小珠曰璣樂猶不笑義猶不取樂而笑者情猶動義而取者欲尚具非同公叔文子之類豈以己所不知而臆裁之也世俗之徒已自不知僧行而以胸臆妄度之也故三苗逆命夔龍有德舜時三苗之國左洞廷右彭蠡不順帝命禹征之一月不服益請退而修德七旬而自來此乃相輔之德也夔龍舜輔相也羲和沈湎天宗無廢羲氏和氏世掌天地之官至太康過差不度沈湎于酒故命誅之而誓云殲厥渠魁脅從罔治意以三苗羲和喻姦回也夔龍天宗喻清衆也夫求人於始義則淑慝可知也觀其初始有義無義則知其善惡也淑善也慝惡也考情於素行則狂哲可知也素先也狂愚也哲智也故僑扎之為僧必非調達善星也僑子産也扎延陵季子也苦使良善之士為僧必不行惡行調達善星惡比丘莊跖之為僧必非鶖子菽氏也莊跖凶賊也鶖子舍利弗也菽氏目乾連也奚為始得僧於莊跖而後責不賢乎始不知僧有僑扎而前謂無德乎夫有士君子之器必有士君子之僧有臺輿之性必有臺輿之僧臺輿賤人故以仁求僧可必也以僧求仁難乎必也以仁行向僧中求之必可有仁行者若凡是僧便責其仁行即恐難也且使安遠妄道定惠遠彼必不為妄真自有餘也使思顗暴思大禪師也天臺智者禪師也彼必不為暴仁自有餘矣使佛圖澄慧始妖圖澄如上惠始元魏沙門甚有神異五十餘年未嘗寢臥縱行泥塗足不污世謂白足也彼必不為妖神力自有餘矣使僧旻智藏佞僧旻住虎丘山梁蕭昂禮謁不與相見後門而遁智藏梁武帝撤宮闈之制恣沙門遊踐有司奏御座非沙門宜登智藏悖然鋸坐勵色抗聲曰貧道昔為吳中顧郎尚不慚御榻云云彼必不為侫直自有餘矣是以忠孝之門不可使為亂德行之門不可使為濫宋文帝飯僧同衆御于地筵頒食遲衆疑將旰不食帝曰始可中耳生公曰白日麗天天言始中何得非中遂取鉢便食舉衆從之帝大悅萬乘之君佛法之主執去留之柄有殺活之權若固守小道而拒之縱無具廢之禍得不乖於敬順之道乎如生公之見深為當矣斯蓋大人與天地同其德日月同其明故言中則中矣況帝王之力可畏乎故避焚不俟乎師姆姆女師也大夫之妻五十無子者入宮為女師起坐得之方行已嫁則不待也宋伯姬遭火待姆不來而燒死此為執滯也拯溺豈嫌於捽首孟子如人父溺水子捉頭髮以救之亦不為過蓋皆取其權急之宜故也蝮嚙豈顧乎斷臂蝮蛇類也支體豈不愛惜若遇蛇嚙懼死故須斷也護法之理通於神明為護法故豈顧小節而已昔遠公臨終門人進漿俾且慎俾使也且謹慎慮有乖違律方檢律未得而終無難故依法行彼克峻于己使人則之無踰間一俯一仰有為也間法也己自嚴峻秉持使後人依法則之而行也北齊天保中僧曇顯莫知所來飲啖同俗時放言宏遠上統知其異法上為僧統故號上統密與交厚時遇黃冠陸修靜自梁奔齊修靜先在梁毀讟佛教梁武欲誅之故奔齊又求試也敕沙門與靜徒十人對詔較量優劣靜徒妖術所祝沙門衣鉢或至飛轉者祝梁木或至橫竪者顧沙門不能對而大言曰沙門所見一我當見二帝命上統統求曇顯顯醉居會末衆告曰某醉焉上曰彼稱祭酒正可醉人能對遽令掖舉升座既而笑舉一足曰吾已見一鄉可二乎靜徒默恥顯又命取稠禪師衣鉢俾彼祝之終不可動帝使舉之舉衣鉢也自一人至五耦十人也俱不起置梁木上祝之亦無驗靜徒戰忸戰忸驚慚也廢術而言曰佛自稱內內小也謂我為外外大也顯應聲曰天子在內百官在外小大安悖哉齊人由是德乎我也牛雖瘠猶僨於豚上瘠瘦也僨僵也豚豕也言牛雖瘦若倒猶可壓於豬上也言雖大劣猶壓於小此春秋文喻晉魯也何斯不然歟國初徐世績討河北饋餫不給王師且羸貸糧於寺而僧曰常住不可慧休聞而告之曰若此舉無功則國之虞矣國虞而寺存未之能也召其徒沮衆告師召僧衆散告兵師而給散也發廩賑食神堯初欲罷釋教唯河北不被詔以英公表聞故也宋乾德四年克蜀後川軍作亂王師討全師雄軍食不給彭州天台院發衆僧倉廩以濟之至開寶六年主上敕倍還仍別加恩獎也近世遂州道謙體貌都偉善講涅槃時或以腥羶侑味道俗甚不相與謙曰濟力為講願勿嫌也當盛暑殞肌膏流浸芬馥酷烈酷甚也沈檀之不若邦里特申哀敬故權道也至至也上至字及也下至字極也能及於至極之道也仲尼云可與立未可與權論語文但可與立事未可與權道反於常道先反而後合也棠棣之華偏其反而棠棣移也亦曰郁李又云車下李樹高三尺已來二月開花淺紅花稠衆花先合後開如常道也此花先開後合喻權道也初似相反而後合道也豈不爾思室是遠而此是權道所喻之詩豈不爾思賢人為賢人之室遠此詩未足下云末之思也夫何遠之有自是不思思即及也誠不以難乎故心惟貞一機由俯仰貞正也行心存於正一機權之道則或俯或仰不定也事實至公用若至私而仁智觀其益雖違而達也觀無益當順而守也不必定執之也夫厲與西施嚬西施美女也厲醜女也嚬戚也所嚬是一而厲知其不及則若勿嚬於知之艱矣西施貌美嚬戚而轉艷東鄰醜女本醜效西施嚬戚而轉醜也此意喻修靜等求試而轉乖也
