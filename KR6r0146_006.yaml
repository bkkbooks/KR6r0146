body:
  text: 喪服問第九服從恩制喪以禮成問喪父母與師五服宜從何等二三子侍乎前門生也賓退翼而進斂肘以進曰三乘之行或得聞焉三代之禮未之學也夏殷周文質不同而百行之紀莫大乎孝孝莫大乎送死有死已復送葬返置干几筵復其靈魄盡愛之有禱祠心焉生有節焉夫徵諸終終則其始可知也禮云始卒主人啼兄弟哭小斂即位于內祖脫髦栝髮以麻士之喪二日而殯皆三日不食食粥朝一溢米暮一溢米溢一升二十四分之一也既葬主人蔬食水飲不食菜果敢問何謂沙門喪在五服焉五服斬縗齊縗大功小功緦麻是也余釋几久之愀然而告之曰先王之禮魯君子之所知也於孔氏多能也吾未之其究也已夫天竺非方俗所同釋子既宗天竺之教與中國方俗不同質極而微矣西國之俗簡質而微略也南海寄歸傳云天竺聰明俊利神州不及天竺禮儀法則天竺不及神州古者羲農之淳中國則變蓋質極而文文極而質四海則不然夏殷法地故質周法於天故文也四海不變今緇衣在華華則有儀其可同於異域歟先王制四夷之樂不制四夷之禮今釋子既在中國不可同於異域故稽五服之數象升降之節擬議其教立以為文至若語其憲章有所損益合乎天下之心者以俟君子矣今依五服而象之斬衰三年齊衰周年大功九月小功五月緦麻三月或上或下以行之如要合天下之宜以得其中俟將來君子裁制也故喪父母者如士喪或則中而得禮也於五孝中依士喪禮得其中也士喪者杖菅屨禮云士之喪二日殯而杖哭殯則杖哭柩則輯杖食粥三日不食食粥飲水倚廬寢苫枕凷禮云父母之喪居倚廬不塗寢苫枕凷非憂事不言也雖沙門苦節降居貶衣食有過乎喪禮者而居喪合士行無傷聖人之教也沙門之行本自苦節若更因喪倍貶服食合於士行不違禮律故云喪與其易也寧戚若鄙以俗內拘急是不曠德何莫裁使體不兼杖真俗合舉簡而有戚也若不欲俗禮拘忌慮虧真道縗而不杖則真俗無妨其儀雖略其哀禮不無也夫陳簠簋設几筵非必以鬼求之父母蓋申其哀敬敬其若存也簠簋祭器也几筵靈座也置者未必以鬼求於父母蓋以繼心之所存於哀敬有歸向之所表情也縗絰代乎黻冕縗絰喪服黻冕朝衣也沙門既不縗如何絰身既不縗服則頭不宜安絰𥿭縗繐裳褻乎喪儀儒則不為況釋氏高者也禮云麻者不紳執玉不麻麻不加於采以吉凶異也僧既離俗不同其製或有所不避者加乎冶容之嫌也冶容不正貌不避俗譏則有妖冶之容嫌非正也非𪗋斬無以麻葛冒於首父母之喪及親教戒師等可以冒首尼則猶可然夫禮不敵於公門公門不賓之雖𪗋斬麻葛無用於首焉曲禮云苞屨扱枉厭冠不入公門皆以凶服故雖有父母師長喪皆不用也尊者前如公門亦不冒麻於首當齊戒無號劈避衆嫌也但可焚修作福而資薦之劈拊心也無恃以喪辭衆善恃以衆善降私喪苟有義也其有布薩講懺齊戒等善不以喪事之故中廢以衆善而殺喪禮無妨時有灑地布席而後乃踊失頽然之哀𪗋斬之喪天地崩摧痛割衷情豈待布席灑地然後劈踊者哉雖五服尊卑同而損卑以年德不謂不知禮也先王制五服之禮雖同若卑者亡在五服之數於有年有德降之亦可也夫至道合乎至哀不哭不踊非象內之議也哭踊之制本徇俗情象外忘心顧戀非有莊子云人之生氣之聚也則為生散則為死若死生為徒吾又何患故萬物一也是以妻死而鼓盆也昔者法雲居憂殆至毀滅母亡毀瘠過禮纍曰不食殆不勝喪僧旻謂之曰聖人制禮賢者俯就不賢企及毀不滅性尚出儒書況佛有微旨近奉色養遠發菩提況恩愛賊不可寬放乃割哀情微進粥食靈裕覲母聞喪而還靈裕隋高僧也姓邢南郡松滋人居相州久忽聞母在鄴都病往看之至路聞已死曰我本覲母今喪何覲也遂還君子以為垂慧訓則雲過裕不及也夫禮過者俯而就之不至者跂而及之雲乃名尊德實纏情踰俗裕則位崇師表憲法無取議者與其不及寧過過則易抑不及難引也哀過則可抑之不及則難以引導後人也然諸夏之邦以禮儀觀德居其邦變其俗君子所不為也雖世務立節賢者達之如子臧原壤之流也曹公子欣時字子臧宣公之庶子也曹伯卒諸侯見王將立之子臧辭前志有之聖達節次守節下失節為君非吾節也雖不能達敢失守乎遂避奔宋原壤魯人物外之士也世務亂禮賢者立之如曾參子臯之流也參字子輿高柴字子皋泣血三年未嘗見齒並孔兵弟子魯人今天下多思亂禮于何不立之耶昔竹林之賢洎胡母輔之徒彼失禮者以為達竹林阮籍喪母裴楷往弔之阮籍散髮箕踞不哭醉而直視裴楷既哭畢便去或問裴凡弔主人哭客乃為禮阮既不哭公何為弔裴曰阮方外之人故不禮制我輩俗人故以軌儀自居時人以為兩得其中也胡母輔齊人也裕若亦以為達者則不師不弟當如彼不父不子矣豈生則不捐愛以求覲死則篤求其達乎生則撫養之恩未斷固存省覲死則已同於草木但可冥資故後來者不揣德行不侔裕而多為裕矣侔齊也侔猶不可況不侔者哉是以匠物者雖玄機冥達而為物常守古人云在人能人在天能天蓋稱有道者不以逆物為懷也昔目連泣餉目連母長爪梵志族青提也以慳貪不信沈惡趣目連得道持食而往濟之牟尼扶櫬淨飯王崩佛扶櫬而葬又佛姨母大愛道比丘尼與五百尼一日中同涅槃時得正道優婆塞舉五百末四天王舉佛乳母大愛道床佛自在前擎香爐燒香供養語諸比丘汝等助我供養乳母身爾時諸羅潢比丘各各以神足力到摩利支山取牛頭香助佛作藉也示人感慕之迹夫能居其迹而不有其迹可謂至矣喪有四制有恩有理有節有權變而從宜可也經云孝名為戒夫何義耶蓋孝者以敬慈為本敬則嚴親慈則愛人嚴親則不侮於萬物愛人則不傷於生類防患息違莫大於此矣其或不由於孝而能持戒者無之矣戒以慈為本以敬為輔也何則不孝則無親無親則不敬於上不敬而能慈於下者未之有也律云肩荷父母便溲其上經於綿劫猶未能報一日生成既大聖俾生報之以力何死則無戚焉故違裕或賢慕裕則鄙後徒高節不及靈裕而欲效之者非但可從常勿使保名教者以子孫入道乖乎孝悌責響之論此而滋矣二三子曰喪所親謹聞命矣已論父母之喪竟喪師如之何曰禮云事親有隱而無犯子為父隱直在其中左右就養無方左右謂扶持之方常也服勤至死致喪三年父喪斬縗三年母喪齊縗三年若父在者周朞而已避父尊也斬縗為不緶之也齊縗則緶之如常也事君有犯而無隱臣以諫諍為忠左右就養有方服勤至死方喪三年存君臣之義比方父也事師無犯無隱左右就養無方服勤至死心喪三年師喪本無服戒容在心又曰兄弟哭諸廟父之友哭諸廟門之外師哭諸寢朋友哭諸寢門之外所知哭諸野於釋氏則異乎禮也與儒禮不同夫師者德藝之本也匪德何立匪師何教雖上自王公達于商耰耰農人長沮桀溺見子路耰而不輟是也皆嚴師而釋氏加乎戒之所由生也仕農工商之子尚立其師況釋氏削染傳戒者乎故有戒則名沙門無戒則非沙門從戒而生乃曰真生戒自師授戒者曰毗尼藏防非止惡梵云毗奈耶同也故視師猶父也師本無服今同於父外國云和尚此曰力生言有力能生弟子戒法也外國云阿闍梨此云軌範言能教軌其範義也斯類有五焉謂剃髮十戒依止羯磨教授羯磨謂受戒時作白也其間或以落簪佩禁自我而始也或以法身慧學自我而成也然世以君父師其恩一貫父生之師教之君食之故有致方心喪三焉父致喪君方喪師心喪三也而釋氏以戒法故隆之矣戒為入道之本師為出世之因非但哭于寢也執乎心喪也當麻葛菲屨方父斬也喪師之服同父斬縗之孝二十五月也但不必杖而後起哭若不返謂一盡聲也唯而不對此皆喪父之禮於喪師則不必然於餘則如禮焉此外並與喪父禮同今委巷之子委曲也鄉巷卑族之子也號穹蒼訴酷罰蓋不忌知父之嫌今僧有喪師號哭云蒼天等皆非禮於父有嫌疑宜去之可也塗車芻靈神明之器既不以鬼道期師斯奚用焉盟器之屬皆無益魏道登卒高祖孝文詔曰朕師登法師奄至殂背痛怛摧動不能已已比治慎喪未容即赴便準師義哭諸門外禮師喪哭寢門外隋曇延歿帝哀慟罷朝滕王已下被髮徒跣從喪行哭後世莫能輕重之也柱史抗絶軌於流沙或尸解於槐里其徒無所聞也老子見周德陵遲乃乘青牛出函谷關西往流沙又莊周云老子卒於扶風槐里秦佚弔之三號而出自是其徒喪服之制未聞其說也魯司寇卒門人疑所服子貢曰昔夫子喪顏淵子路若喪子而無服請喪夫子若喪父而無服二三子皆絰而出也不為哀弔服而加麻心喪三年檀弓文也殆至漢魏喪師彌篤有以至於方父之喪者今之禮薄寡有絻焉絻喪服也昔遠公制喪七日以凡情難割俾展哀也過則束於禮矣僧本象外之教以凡情未遣乃制七日之禮以展情也若過則拘束儒教也齊隱士劉虬卒弟子雖稟內教若喪父無服劉虬居荊州後拂衣不仕辟穀麻衣草室屏絶世典精研佛理述頓悟義當時莫有能屈者注法華經講涅槃大品等經建武初徵為國子博士卒于江州白雲徘徊有異香滿室空中磬聲年六十弟子等如喪父而無服庾詵云文為世範行為士則因諡文範先生隋天台誡無哭泣著喪服彼各隨時之義也夫劉虬羔雁不顧卿執羔大夫執雁虬初為當陽令改為南城拂衣自免年四十二時論比之漢疏邴辭榮不顧祿位也形質已遺居今之死非曰始死若使為喪猶矯乎羔雁故損仁義以示簡朴有終焉而弟子從乎孔門之議也天台五十餘州咸稟歸戒若循乎縞素則半國之人皆喪服矣故可抑而從天竺之風也仲尼云喪與其易也寧戚喪禮宜得中若和易則寧可哀戚也斯則振時之意厚矣今秦洛之風喪則喪矣十師而亡哀降殺何哉親教師可同斬縗本頭戒師可大功教授師可小功羯磨師已下剃髮師十戒師八戒師五戒師依止師授法師並緦麻可也匪喪則已喪則其無別乎故戒師可乎大功也九月服教授小功也五月也餘則緦麻可矣三月朋友者禮云群居入則絰出則否朋友皆在他邦則但師心喪三年朋友朞故朋友墓有宿草則不哭焉在異域無喪制凡云異域外國皆天竺也不封不樹封冢土也棄之中野施鳥獸於寒林或崇蘊燃之焚之以薪或淵流沈之所窆者少喪期無數窆埋之也或棄或焚或沈亦無五服期限之事若中華之前古同上古之時也其有欲遵此而罷哭泣去喪制為不違律者吾無與乎爾身居東土而欲禮遵西國不可也夫揣食嗚足袒肩跣趾圍繞却退皆殊俗之風也南海寄歸傳云西國以手揣飯而食禮拜嗚足以舌舐之也袒肩露右膊也跣趾赤腳也圍繞退坐此皆西士之風今皆不行喪禮如何便欲遵之中國則不為何臨喪則欲承之歟夫哀哭喪服且非性戒但是遮戒制約雖五篇則禁而律有隨方之義孰謂居喪必違聖意焉昔雙林摽劈佛剖棺而興慰而不責蓋憫其號慕篤其哀敬佛俱尸入滅弟子號劈佛母摩耶自忉利天來如來從金棺起與母相見而不責弟子等悲號蓋欲厚其哀慕之心也夫敬則行其志慕則思其教教立而志宣於摽劈之理實為有得涅槃為究竟之教於何不然若以去親擯俗習無生之法當忘情絶愛固不宜者則何太早殊未行行便欲忘情一何謬也計見卵而求時夜見彈而求梟𮌉歟時夜雞也有司辰之功今見卵便欲求雞理非也梟如鳩緑色肉為䏑最美須以彈方獲今見彈便索梟䏑非也忘情於境方契於道今情既未忘如何便欲擯俗也夫始行之徒未階聖位志業沈麼蓋區中一細人耳遽則能割愛乎夫不愛於其親則移愛於他人不愛其親而愛他人謂之悖德而於權勢潤屋之門蘧蘧然蘧蘧草草貌有所親附也其忘情者但忘於名教禮義今見吾門有擯名教謂之聲聞取著全便忘棄則又見貴門財物動容汲汲者也而忿欲勝負衣服飲食逐逐焉何所忘也既情不盡忘愛不盡絶豈於喪禮而欲去耶或曰若使沙門隨方為喪亦得隨方致敬王者歟既同俗禮何方便同拜揖曰不然泛答也何則却徵也夫拜為外飾孝自內心抑為外飾損髠祖之儀抑其內心失愛敬之性與其兩抑不若兩縱縱其不拜成王臣之信獎縱其為喪成人倫之孝悌故依違異也詳夫外國哀亦甚矣故波斯匿王喪母惶惶戚戚舍衛國波斯匿王喪母身灰塵坌等大聖示滅而四衆血現如波羅奢花舍利弗灰身無色界天淚下如春細雨無色界化定果色而下慰問也豈不由生我德我其情篤切匪刑匪勸志發于衷故有昊天蓼莪之痛哀哀父母生我劬勞欲報深恩昊天罔極蓼長大也莪蘿蒿也周幽王時人民久役不得養父母如見義不識也升堂負序之哀序東西牆也孝子升堂而背負序不期哭而聲自號不盰衡而貌自苦安能以飾高而強抑恥俗而求變耶昔齊州三藏義淨也自西域還每事演遐舉之功遙情賞金方之訓以為披黲布而乖常式留長髮而異舊儀斯亦重結塵勞更嬰桎梏襪黲長長髮未必合道者也又云去釋父之聖教重周孔之俗禮特以靈裕為知道者也竊以天下沙門皆非裕也為裕則邯鄲之步不成邯鄲趙郡美女能行得無真俗兼喪焉古人曰聖達節次守節下失節曹子臧語也夫非達非守則非失如何是以居喪者退居勵行起於寒泉凱風之思修香火齊戒之福幽顯普賴奚則乖於道歟今有瑣夫居喪如無喪衣食安安然笑語晏晏然何其勃也臨喪不哀吾何以觀之哉有土之辟亦可問之生成何罪焉梁草堂約二親將亡並及臨訣孺慕嬰號慕同孺子號比嬰兒不交人世其德彌遠其望彌重不食五穀猶至於是食美衣輕者其則能加於約乎譏異說第十譴責所非曰譏舉事乖正曰異建德之賢蔽志若偷建立也蔽藏也立德之士所蘊含弘長掩之而如不足也作僞之家哿言如流哿可也作僞之士所舉便佞故巧言流美也執虛為有飾邪撓正舉其所同訾其所不同憑陵紛紜如日之升為雲之翳如水之澄為風作濤難乎其極也巧說亂正也經云昔有二弟子各護師之一足各非所不護者賢愚經說昔有令二弟子各護一足護左者不在被護右者擊之護右者不在被護左者擊之師足不逾月二俱爛矣喻今大小乘各相非也忿則相擊之其忿不已其足亡矣今異說之夫各忮貨譽忮妬害也於聖師則無所顧矣哀哉焉嘗試論之曰夫貌異於心性成乎習下俚巴歌和者必衆昔楚人巴歌俚人和者衆作白雪之篇和者寡矣燕石魚目鑒者必寡燕石似玉魚目類珠故使逐塊之流邪妄同群朋其邪說如狗逐由各保其主吠堯為桀今以言不及義則為異說折之有當是曰譏者伐本塞淵或冀乎得今之所陳冀在伐其本塞其原者也但爝火光微資燭龍以輔照蒲牢響邇仰雷霆而佐震爝火螢火也蒲牢海獸也鯨魚擊之則聲震川谷今於鐘上鑄之以魚形杵擊之取其聲也今北山和尚謙云雖欲伐本塞源止其邪說所恨己才智同於爝火等微爰仗群賢聲援以助之用光像運矣斯實鄙抱之所蓄也嘗有戚施喔咿者戚施面柔也喔咿強顏也私余曰彼黨斯盛謂異說之徒將不得於君奈何恐為時所忌民之多僻無自立辟侫人多黨矣余曰獸顧濡尾則不濟也狐將渡河若懼濕尾則不濟得義而傷亦何忌耶夫漁父剸蛟獵夫搏虎皆其志也懼則不為也所謂論至德者不和於俗成人功者不謀於衆矣異說曰封戒學者實則小智隘情不夷封滯也隘窄也夷平也言持戒者局小乘也觸物忌過亡身猶糞土厚意於草木昔有持戒比丘行遇賊劫其衣鉢仍以草繫之日中比丘不能斷草而去慮破戒也大士觀之如險惡徑不若資吾大道落吾節放吾心不踵武不俯眉不飢腸不病蔬逍遙乎飲饌之間坦蕩乎貨植之上何莫為吾適也孰能捐膏粱純纊之美厚與夫後世魂靈作殘刻卑隸者歟今世不餐鮮美服華麗死後終作卑賤之鬼何哉譏者曰夫何然哉不愧于人不畏于天允意勃善罪莫甚矣戒者威儀也威者有威可畏儀者有儀可則威儀者德之表也詩曰淑慎爾止不愆于儀又曰抑抑威儀惟德之隅皆重威儀之道也故若即修途用之作符印修長也往長途以戒能涉也符印若今之公憑也若涉大水用之作浮囊律云如人欲過大海藉浮囊以得渡喻如持戒破一小戒亦不能濟也若制佚馬用之作銜策若穡千畝用之作平地羊車唯五犯一波羅夷二僧伽婆尸沙三波逸提四提舍尼五突吉羅唯防身口二業也牛駕通三聚身口意三聚也虧之首末沈于龍鬼破戒者多沈龍鬼全之始卒超在人天其照如日月其好如瓔珞是以草繫護鵝草繫如上護鵝者昔有比丘入王宮見鵝吞一珠王後尋珠不獲疑比丘取問之比丘懼殺鵝不言王將殺比丘比丘亦不言鵝即吐珠王知非問何以不言比丘曰言恐殺鵝也有死無二驅龍墮雁精誠一貫如有比丘於龍住處現通驅之終不失持戒者往彈指三下龍即便去也智論云有比丘持戒食時至念食感雁王知之令雁投地欲供其食比丘知已不食也且吾與君俱緇也在首無冠在身唯褐四海一已無適無莫適厚莫薄何但選僧田之臘飫焚爐之供僧自二十歲年蒲方受大戒經夏及冬謂之夏臘也儀範不攝皂素何別今僧但以年臘高者居上座而受供養而全不知修攝威儀也夫聖人之行莫尚乎齊戒聖人之心莫尚乎慈儉非齊戒則謗聖人之行非慈儉則違聖人之心謗行違心則八難不由步而往八難一地獄二餓鬼三畜生四北州五無想天六生盲聾啞七世智辨聰八佛前法後此皆障聖道之所五苦不待召而至此世他世與夫後世幽魂作深仇巨釁者也由今身誹謗令後世魂識沈墜而積怨恨也若以大道虛懷小行傷德則於菩薩戒經復何有矣小乘戒若不能持又安能持菩薩戒小乘之戒本自大乘流出由是為猶冒於虎質稱鼠濫其馬形為僧不能持戒而更舉大叱小實類犬鼠之形濫虎馬之質也雖欲假詞逃責而實文其罪也異說曰禪為心學心冥神化不行而逝將駐返速其動如波湧其靜如淵默當任之於自得縱之於無為何必端居槁形以有待無夫得之百年人也不得之亦百年人也況宗途僭峙戶牖蕪昧縱達其理未免生滅而況迹超毗盧豈不僭峙乎色心混沌豈不蕪穢乎托之於實其誰悟焉未若興居偃仰聊逸自體鍾梵講誦頗娛其意禪乎吾無所為也意重講唱不樂禪味者也譏者曰泛乎其誣悠乎其殆泛浮也悠遠也一聽異說浮淺之誣謗似是悠遠思慮深玄之理趣全乖殆危也理疏則危既升而顛誠祇以悔也夫五道之所不羈三乘由茲抗綏羈絆馬者綏升車繩達空理者五趣不能拘其身三乘安能攝其位超然而出也靜囂埃於通莊啓靈關之奧樞莊大路也樞門機也而莫先乎禪學者矣故修德間邪之士未嘗不尸居㲉食以至於無為間防也㲉鳥雛也忘心之士其居則如尸無作其食則如㲉不競淡然而已其有不由此道則辭想如麻計事如流形為心驅苦與年窮恍惚睢盱睢盱舉目也刺促趑趄小走貌何燕居之有也今之稱禪者不能寂靜身心逐境遷轉旦夕驅驅豈曰燕居者哉但禪通內外位殊小大禪者厭下地心引上地心折伏煩惱令不生起作六行事觀通內教外道大乘小乘所作也非止是一言一句而已各隨修證有深淺矣有近分根本理事大小乘論深淺不同也如象馬兔三獸渡河蓋先聖之興詠耳小乘喻免中乘喻馬大乘喻象深淺別也昔晉宋之間西來三藏多以禪法教授雍雍肅肅默而習之不以耀世如竺道猷定力深遠高巖誦經群虎前聽一虎獨眠猷以如意扣其頭使聽求那跋摩纍日不起弟子往候見白師子緣柱而立滿空彌漫生青蓮華故冒雨不霑履泥不污魏有跋陀傳心悟於慧光光少定力終以三藏文字為國大統先姓楊定州人跂陀見而奇之留出家聰慧無雙時號為聖沙彌南齊任僧官後為僧統甚有文章行世也唯僧稠得跋陀之道錫杖解虎袈裟護難稠禪師在王屋山見二虎鬪以錫杖解之各去也高齊陸修靜等奏與僧比試作法祝僧衆衣鉢等旋空飛揚大統令曇顯對之彼又祝大木升空遂取稠禪師衲衣置上於是呪之作法皆不能動帝大悅初稠入定九日不起跋陀曰葱嶺已來禪學之最汝其人耳東魏末菩提達磨陳四行法統備真奧四行法者一報怨行或遇愛憎甘心受之是我宿作都無怨對二隨緣行謂於一切境無喜無怒也三無所求行謂無所貪求也四稱法行即性淨圓明之理也傳法與可第一祖慧可也可遇賊斷其臂以法御心初無痛惱每歎楞伽經曰此經四世之後變成名相深可悲矣僧璨道信弘忍慧能為四世也此後多以名相傳心也自可至六祖分為南北各引強推弱競其功德然欲辨其污隆者正可審其言行自忍有神秀為北宗慧能為南宗也凡石匪玉不潤淵匪龍不威彼有道者心虛弘遠故鍾鼓之音怒擊則武憂擊則悲喜擊則樂其志變者聲亦隨之未有得道之賢志智而言愚者也余昔觀淨衆禪門崇而不僣博而不佞而未嘗率異驚俗真曰大智間間之士也蜀淨衆寺金和尚號無相禪師本新羅王第三太子於本國月生郡南寺出家開元十六年至京後入蜀至資中謁詵公學禪定入蜀止淨衆付法門人神會又有南印慧廣又有安僧梁僧等皆宗禪法也遂禮足為師請事斯旨而學者安以未見班倕任楹甍之撓班倕巧匠也楹柱也甍棟也不遭和緩恣肺腸之患和緩並古之名醫秦人也苟在自我精搜而已若但以外事為自纍之津類北轅而適諸楚也轅車之縛軛者楚在南地今學者不能精搜洞照但求言句翻成自纍如往北而入南也終不能至矣異說曰禪者莫極乎吾師其禪曰首楞嚴三昧也自佛傳大迦葉至菩提達磨逮吾師心與心相付餘宗則不吾若也鉢羅蜜諦三藏齎到佛頂經十卷於廣州與房融共譯上進天后此乃稱為圓頓之旨皆禪之宗匠也譏者曰吉人寡辭功伐不賞況匪功妄伐人其吉乎付法傳止有二十四人其師子後舍那婆斯等四人並餘家之曲說也載於寶林傳又第二十九名達麼多羅非菩提達磨也其傳法賢聖間以聲聞如迦葉等雖則回心尚為小智迦葉阿難等靈山雖獲授記尚為小聖爾豈能傳佛心印乎昔商那和修告優波毱多曰佛之三昧辟支不知辟支三昧聲聞不知諸大聲聞三昧餘聲聞衆不知阿難三昧我今不知我今三昧汝亦不知如是三昧皆隨吾滅又有七萬七千本生經一萬阿毗曇八萬清淨毗尼亦隨我滅故傳法者但傳其言承法者體言見心即是得法雖曰觀智而但傳言句也其猶斫輪之藝傳藝而不傳其妙齊桓公讀書堂上輪扁斫輪堂下釋推鑿而上問桓公曰敢問公之所讀者何言耶公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟粕矣桓公曰寡人讀書輪人安得議乎有說則已無說則死輪扁曰臣也以臣之事觀之斫輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數子存焉其間臣不能喻臣之子臣之子亦不能受之於臣是以行年七十而老斫輪古之人與其傳者死矣然則君之所讀者古人之糟粕也師襄之琴得琴而不得其數仲尼在衛學琴於師襄子十日不進師襄子曰可以益矣孔子曰習其由矣未得其數也有間曰習其數可以益矣孔子曰丘未得志也有間曰習其志可以益矣孔子曰丘未得其為人也有間曰所修穆然思焉忽有所怡然高望而遠志焉曰丘得其為人也黯然而默頎然而長眼如望羊如王四國即文王誰為此也師襄子避席拜曰師蓋云文王操也故有久習無成又有發心便證或有微流獨得英才不悟所貴在乎冥會不必在於相授然今諸門皆禪而惡乎知佛禪獨乃一家耶如先德長者所傳各有宗師者也異說曰達磨既當傳法使二弟子至漢地被秦人擯於廬山即跋陀也因與遠公出禪要經達磨聞之慷慨乃自出西土濟海于梁梁人不甚信北望有大乘氣遂適于魏也此所敘並寶林傳與高僧傳乖異也譏者曰詞失於當援曲翳直豈謂智乎但祖師之門天下歸仁焉禪德自高寧俟傳法然後始為宗教者歟而有考校歲序以師子比丘已當齊世達磨居第二十九翻在晉時何失言於年秩也達磨弟子被擯在晉時秦弘始至宋末八十年也又南齊得二十四年相去百年已上豈得二十九祖在二十四祖前百二十年耶嘗有傳魯般浮圖魯般春秋後語時人浮圖自晉宋方有也右軍般若俗傳晉右軍王羲之有親書多心經殊不知多心經是唐朝玄奘三藏貞觀年譯也彼向知般在春秋王居晉穆則不有是言也異說曰達磨六過被菩提流支光統密毒其食五過吐出至第六過不吐而卒又謂其徒曰吾宗至第六世命若懸絲是知崇山至峻朽壤崩之喬木至堅蝎蟲蠧之故使吾祖不遐有害終恤我後也菩提流支此云覺希北印度人遍通三藏妙入總持志在弘演廣流視聽以魏宣武帝永平元年己丑歲至洛陽譯經論三十九部一百二十七卷筆授草本滿一間舍兼攻雜術嘗坐井口澡灌置空或呪井令涌酌而為用光統律師乃一代之英傑況主僧柄豈能爾耶寶林傳者乖誤極多後之學者宜更審之也譏者曰邪夫干正正卒成邪妄士談真真返為妄傷哉內訕釋黨以名利相殘而有至於是者也彼意以德高物忌深用自顯意以達磨德高為流支等妬忌也而不知自傷亦以極矣昔魏周滅法詔假顧先生三破論等顧歡先生也誣釋氏之惡方此而實不為甚也詩曰人之無良相怨一方其斯之謂乎夫良將戮於讒口實快敵者之心也若白起死於杜郵之類也高德鑠於謗夫實資外黨之侮也以資外宗之謗其聽謗者不掩耳此亦獎謗之流也古之有道者淡然無極衆美從之故猛虎不據鷙鳥不攫鷙擊也攫搏也不揚威而示勇也而況人乎若六過遇毒知而食之何求自斃也不知而食孰謂有道也豈曰聖人也夫陵陽務成未聞罹於鴆俠陵陽務成皆古有道者尚不為毒害豈空門則有此耶故善為道者不使人愛已愛尚使人絶而況使人害己乎彼流支光統皆德化敷弘人天極望獎賢輔善共揚風教如光之門德行十人慧光門下名揚不一今此佞人曷敢訕毀仲尼云是故惡夫佞者俾投豺虎孰云窮責且聽訟吾猶人也審已為仁不能果惡人之為仁何能果乎仁者本以果敢決斷為義今惡人興訕謗之文非於良善已不能審決是非而信之如此則仁豈有果敢之用乎故君子內恕己以量人君子之道忠恕而已忖己度人為之忠恕古者虞芮爭田尚慚西伯虞芮二國爭田而訟年年不決乃相謂曰西伯仁也盍往質焉入其境見耕者讓畔行者讓路朝臣讓位曰吾儕小人不可以入君子朝遂讓為間田也孔子曰文王可謂至德也不教而從之鉏麑殘賊猶敬晉臣鉏麑俠士也奉晉侯命刺趙盾盾將朝尚早服而假寐麑見曰民之主也賊民之主不忠失君之命不信遂觸槐而死而禪祖死於謀夫未為德也設使誑言達磨死於流支豈為有德者哉又云可大師不死於城安令枯木之下而續死於和禪師所鴆斯貶可祖尤矣僧可一名慧可姬姓虎牢人有禪學以達磨為師遭賊斫臂以法御心不覺痛苦乞食如故化公及和禪師俱時之名德有云和以藥鴆可謗之深也好勝者必勍其敵豈則祖師好勝者耶勍強也好勝之士與敵爭強弱故有憎愛相讎之事祖師泯其念而灰其心者與物無競豈有憎愛致斯害耶信傳者之謬也昔紀渻子養鬪雞能使忘心氣狀木雞群雞見之蔑有鬪志疇庸有道者而忝於雞乎紀渻子為王養鬪雞十日而問之曰雞已矣曰未也方虛矯而持氣十日又問曰未也猶影響十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者己無變望之如木雞矣其德全矣異雞無敢應者反走爾在於雞之有道群雞尚望之而走況在祖師其有敢害之者乎故飄瓦以擊人不怨也虛舟之觸人不怒也彼何然哉以無心故也而可祖豈有心哉可既無心則不應害也昔齊鮑牽之刖也仲尼曰鮑莊子之智不如葵葵猶能衛其足也齊慶克通于聲孟子蒙衣而入宮鮑牽見之以告國武子武子召慶克而謂之慶克與夫人怒齊靈公伐鄭鮑牽守國夫人訴之云將不納君而立公子角君遂刖之仲尼云鮑莊子之智不如葵豈今被害為有智也佛圖澄之於石勒也如石投於水也嘗一日勒索澄欲害之澄不使而得之蓋聖人不欲陷人於罪中也若使得害必沈地獄也雖提婆刳腸提婆菩薩造百論破外道後弟子不在被外道破其腹菩薩以衣鉢授外道教之速走我弟子未得法忍者當害爾後果追之不及師子斷頸第二十四祖師子比丘為罽賓國王斷其頭而臂落也皆以外難未夷中心若厲或順化之不足逆化之或生化之不足死化之咸致命而無怨不歸咎於有德豈以非理妄加有德也觀第六祖得信衣若履虎畏噬懷璧懼殘虞叔云周諺曰匹夫無罪懷璧其罪吾焉用此以賈害也周慞道路脅息草澤今慮傳者謬也寶林傳云五祖付信衣密與慧能行者走避路野息至南海遇印宗法師方為剃髮也夫得道者喪我也喪我者兼喪於萬物也何衣之所在而保於己耶道本由心豈在乎衣夫裘者道濟歟固不競也不濟歟固無所用也人若見道何假裘平若未得道獲衣何用尋金木以討逐將何事歟異說曰罪福所原唯心而已矣心滅無為道居無事不禮讚不講誦真無為也不祈戒不護罪真離相也有說有行心有所知聲聞法也講說讀誦禪師呼為聲聞法皆有為也由是除像設去經法方稱曰頓門如有所說自我襟臆臨文裁斷何俟章句疏論耶則今之臨機問答言句也譏者曰甚哉頓也雖構似聖人之言未幾聖人之道也幾近也言句雖似聖人之言所行之道未近聖人之道也夫所知與於同者同若迷也與若異者反謂迷於若也若汝也今與汝同者則是與汝同迷也若與汝異者則謂迷於汝之道也耆耋哀之蒙孺信之安可已乎耆耋老也蒙孺幼也宿老者哀之愚少者信用之故重於世夫無為者虛融寂泊無善不為離礙曰虛洞照名融超煩稱寂淡然為泊苟以禮誦繕刻為礙彼見有為非於無為也若以禮讚圖刻佛像礙於無為則是有為今見有此相則是有為也非無為也離相者照達色心無相可得無得而得去著稱離於所觀相若無取著則是成就離相之道也若以不受戒捨持護而為離相彼固取相何離相也若須是除受戒絶護持方名離相者則却是執著除去之相也聲聞法者承佛聲教厭苦欣滅孤慧獨頴孤慧單空智斷煩惱障證空理也無善兼他唯修自利非講誦者有聲謂聲聞法也蓋晚慕者不達聲聞之義頓門者不假二乘之漸直轡無生之路行普均之化興廣大之業是謂頓也此乃頓悟大乘不由中小之徑非杌然絶照詆訶萬善為頓門也豈可默然無修不營一菩謂之頓門則與北州無想天等何別也夫聖人之教機緣不一應變萬差或言流而理直或首權而終實故契經者應根逗教有頓有漸有權有實有半有滿豈可不習而知況詁訓音韻梵漢魚魯須稟承有匠學不憑師孤陋寡聞尋閲有功豈於文字未識便不思而說不慮而對妄涉虛玄流俗則謂之為奧或則以才力獎之致使其徒自媚因以供膳招誘遂使遞相獎善若以彼有定力所知能說佛經者何莫試以異典觀其吐納曲直自彰若言彼以定力加資不學自知則可試將儒典問之則知可否且夫稱儒而不傳習者亦賢儒之所病也傳不習乎曾子所病或曰興善動行彌益其妄如晞陽斥影加樵罷鼎誠乃務茲之道豈是息滅之道歟若言只以置善利作為行門不必教典者則又不然且教者示入善之徑路不習安知今欲行善而除弃教典其猶維日而欲去影歇鼎沸而更加薪是知不可也曰彼蓋不知執事淨命以聲止聲今以有經典引歸令識無相猶如執事經典以乾稚之聲鳴之以靜衆聲也良醫之家以毒止毒也故經者亦名醍醐亦名毒藥如附子狼毒等本是毒藥今良醫令服之又能除毒也異說云唐代宗朝唐肅宗之子名豫改元寶應有大禪客糠粃禮樂跆藉勢貴跆踏也藉鋪也猶言踐踏之也蓬茨金門蟻垤帝居故對至尊其色傲如其詞訐如訐直而無禮也心勇氣奮苟無生死可謂真有道乎譏者曰此乃稱勇不稱道也凡不義之勇謀道以損之既不能損則其道可知也好勇不好學其蔽也賊又勇而無禮則亂嘗有俚人之子稱其父有荕力有口顙凌祖考以為德鄉豪畏之鄰伍避之其衒彌多其過彌彰也夫稱有道者色溫而言澤氣柔而心遠雖欲悛人之惡悛改也亦優柔而諷誘之故於知我者示乎知不知我者示乎不知邦有道則行邦無道則卷而懷之又用之則行捨之則藏不悅人之不己知不慍人之不己知人不知而不慍昔大聖遊諸國伏護財醉象調達令阿闍世王放護財醉象欲害如來如來於五指端化五師子而醉象跪伏制曠野鬼神又曠野鬼常噉人小兒一日得一小兒唱南無佛鬼則不能食佛化火山四面周匝圍之鬼盡其力不能得出遂心皈向佛誓不食人也未嘗庭辱波斯面折闍王國王每至佛會佛皆先云善來大王如是軟言問訅雖德尊神化而不傷於國君之禮仲尼適於衛衛靈公與語見飛雁過仰視之色不在孔子孔子行但避衛君之不篤於我非流言以逞志也有國如秦始皇有心如秦始皇其強如秦始皇而虎視於天下一朝為唐睢按劒復鄢郢之地鄢郢誤也是鄢陵也則頴川鄢陵縣也秦始皇滅魏後許以千里地易鄢陵君五十里地鄢陵君令唐睢使始皇始皇曰寡人以十倍之地易之而逆寡人何也睢對曰非敢此也鄢陵君先王而守之雖千里不易也始皇勃然怒曰子聞天子怒乎伏尸百萬流血千里睢曰大王聞布衣怒乎伏尸二人流血五步天下縞素今日是也按劍而起始皇變色而謝之先生何至於此寡人諭矣相如睨柱歸邯鄲之璧莫能奈其勇也趙國有卞和璧秦欲以十五城易之趙遣藺相如進璧秦昭王得璧而不割地相如詐云有瑕取而指之因倚柱不還請割地而齊五日方受璧王若急臣臣則頭璧俱碎王懼碎璧而不敢加害璧竟歸趙梁武撤宮闈之制恣沙門遊踐有司以御座非沙門宜登智藏悖然踞座厲色抗聲曰貧道昔為吳中顧郎尚不慚御榻況復乃祖定光金輪之釋子也乃我也我乃定光如來之子孫也檀越若殺貧道不慮無受生之處若付尚方獄不妨行道流俗以為能跨略天子高岸釋門君子則不然也梁朝皇綱既弛弛紊也庶事墮哉唯餘一御榻受制可也梁武嘗欲御僧官敕主者遍令許者署名其時無敢抗者逮疏聞藏藏以筆橫轢之曰佛法大海非俗人所知帝覽之不以介意書曰御衆以寬臨下以簡此唐虞之化也夫寬而以簡守之則人安寬而不簡則法之亂矣當梁世寬而不簡不亂何待彼智藏雖幸其無法豈不畏後世簡書乎簡策之書異說云吾師加趺心在乎定奄若蟬蛻後人哀思高塔厚葬不亦盛乎吾即吾禪門尊宿也學人誇其坐化高塔厚葬之事譏者曰君子諭於義小人諭於利諭曉也惟所詳也若德行所致或則哀榮若曲以羶美因其瓦合矯其後計則重繫其魂沈乎賈譽之罪也若實以了達去住無礙則可也若素非真實苟取後譽矯誑凡俗則重增沒者之罪夫事不飾則不尊過則浮競有德而不彰失於光顯末代無德而矯飾則涉於浮競也故師顧言奢而求諸義師顧言薄亦求諸義匪顧是信唯義是信雖有顧命之言求合度而行之古者曹侯命薄葬大夫曰國有常禮奢以僭上儉乃逼下豐儉得中是合常禮然有命暴尸者雖欲利於飛走而實無何戮其尸也高僧慧實囑露尸以施禽鳥者其小惠未遍何如善願以廣濟乎又露之穢惡也陳尸曰戮居令德者宜去此意雖遠公將終之見或未吾善也南遠臨終命施百鳥夫死者精神往矣質何能知藏識既往便同無情立與坐臥孰為優劣哉故金河右脅佛在金沙河右脅而臥入於涅槃雞峯纍䏶尊者迦葉奉持如來袈裟於雞足山至彌勒出奉袈裟已作十八變却往雞足加趺入滅化火焚身也慧永求屨始起高僧慧永於牀前索屨而卒靈睿執卷就化高僧靈睿手執卷而卒各任時而待盡匪慕異而詭俗矣鄧隱峯倒立而卒昔高僧曇鑒往生之人也平坐而卒弟子猶申而殮之今則反乎是也定者啓玄解之門出生死之域寒暑之所不入焚溺之所不及若在定而有死何殊濯春沂而焚於烈火被甲胄而傷於毒箭乎凡在死者必居散位故前佛後佛有聖弟子入滅盡定百年千年億萬斯年不出定不死也西域朅盤陀國斫句迦國烏殺國諸漏盡者形儀都偉都大也巔崖孤岫瞑目委髮雷震山摧而獵者往往見有焉西域記及唐三藏行記序之昔趙襄子晉君無恤也趙簡子之子畋焚山林有一人飛行火中山石不為礙斯入定之徒也入定則不應飛行疑運通之士也晉神僧呵羅竭既歿弟子積木如陵焚之纍日不為灰遷就石室後數十年觀者異其如生彼則入第四禪暨于無色界定故能使口鼻無息矣自第四禪至無色界地法無風大種故卅入息風不行塔廟制度世失其道久矣西域以塔為方墳梵云塔婆或云偷婆此云墳塔略也或方或尖或圓也居凡庶封之若此方之堂者四方也若夏屋者四垂大屋自輪王至大聖方以層級表德辨名也輪王一級聲聞四級緣覺十二級菩薩與如來十三級自古至梁陳罕有不懸棺而窆反壤封樹至若設碑繂繂下棺索也古者立石柱於墳上有孔貫索索以下棺謂之窆後或有刻君父種族於上當隧道口謂之神道碑也天子曰陵諸侯士大夫曰墳庶人曰墓志不出典禮今僧立塔記蓋擬其事也啓埏道非國望不為也於墳前作隧路也此皆國望之士又有哀誅哀𠕋碑志非大士不可也古者僧無賜紫衣師號自憲宗元和十一年方有賜紫然先有賜諡號者也周隋之後競尚僭擬其有高華輪奐蔽乎前聖者也近見有禪伯未終自令刻青石建大塔繞以浮雲合以花座四王守御八龍肩杖竟以王難歸俗不得居之也或自力於生前或遺言於歿後不愴冤魂之酷但馳嗇斂之費誤莫大焉昔曾子之病革矣猶命去大夫之簀示不欲僭也革急也簀床上策也革音殛晏平仲謂管氏謂非面言評論之也既死矣豈在我哉焚之沈之瘞之埋之露之西國葬法有四一水漂二火焚三土埋四施陀林五分律云尸應埋之也衣薪而棄諸溝壑古之葬也厚衣以薪葬之中野不封不樹聖人易之以棺槨蓋取諸大過也考工記陶令造瓦棺夏后聖用堲火燒熟曰堲殷人以梓木之棺替木又以木槨替土堲也袞文納諸石椁唯所遇焉而屋愚之子莊子唯在屋不出而愚也不知道林之墳不高而戴逵歎焉邵伯之樹不大而詩人詠焉卲伯奭每於甘棠之下治獄去後周人懷其德不忍伐其樹故詩云蔽第甘棠勿剪勿伐卲伯所苃唯務僭侈遂令榛莽之間壘壘若丘坻曾無展敬者狐兔虺蜴宅其趾烏梟鴿雀孚其上樵童牧兒登而嘯歌行路者不知為誰吾在廬山講罷景餘每尋林谷見則訊其德行無一可與歸者由是業之著隱而逾亮德之寡炳而逾昧誠可悲也毗奈耶雜事三十三說本勝比丘生前多瞋歿後置塔劫卑德羅漢誤禮之優波離告之乃令五百人毀之也仲尼曰君子之道暗然而日彰小人之道灼然而日亡詩曰潛雖伏矣亦孔之昭近世握管記者鮮聞道德藝行卓邁為高僧多其聚徒結納延譽為高僧因今人非疑古人是也李致即中於福感寺請指骨舍利獲之遂著碑書十僧稱為高僧上石之甚也皆瑣細庸鄙之流實誤前德也或世寡賢良或搜核不精也夫財食足以聚徒諂侫足以結納矯飾足以延譽哉此其欲傳於後裔者適足以誘濫也夫有居鄉為鄉豪重在邑為邑尹重居州為州尊重十室之門十室請舍十聚之家十聚請饋而或未足言也當稱彼重者何人焉何故焉仲尼云鄉人皆好之必察焉鄉人皆惡之必察焉其或小人便侫也求矛也則振達矣君子廉毅也德義也則淪胥矣小人道長則君子道消也而後生美其濫進修芬芳之譽匪計日月求合於權利忘辱殆己狡謀奇慮必取其合既合矣稱某歸依某以為黨以為援以為捷徑之路倍百直誚彼簡朴不能進取者也所謂詭情賊智也梁寶唱撰名僧傳慧皎刪而改之曰高僧以為名者實之賓也若實行潛光高而不名寡德適時名而不高名而不高非所紀也而皎公可謂釋氏之良史也異說云將死之人寂無所見是謂至道不由險畏若覩佛來以相為魔心之取矣其何免哉譏者曰是夫也此乃匹夫之見爾未曰司契者也夫死者形離神越樂消苦會適長昏之域蹈無畔之鄉不矚聖儀悲焉莫救莫無也故西域臨終之人錚然金奏不俟於春容矣西國臨終必令擊鐘云苦趣滅也今此土亦然也春容徐徐聲也異彼澄想去亂而魂有所歸矣又以幡繫像手令其執之示往生之相也其有夙修三福遐其後報金容華目瓊臺授手笙鏞間和法誦窮年實法王之大賚皆淨土之相也蠲有苦於天下也讟為魔者蓋魔由己耳然法無所取實定用之忘照根本定心照境之時不著能所取相是也非死者之昧心何捃彼而與此同辰而語哉非可將證理之真心而欲同將死之昏識也
