body:
  text: 異學第十五異學外學也習異宗之解助本教之旨歸者也器弘者以虛受為美心遠者以贍聞為優禮云玉不琢不成器人不學不知道子云日知其所亡月無亡其能也溫故知新可以為師矣優勝也故我大聖暨古先哲王嘉讚博能高稱上智使圓顱方趾賢愚於焉別矣人而不學其猶正牆面而立虎豹之鞟猶犬羊之鞟也薩婆多師西天小乘宗也此云廣解師博通敏智導利法化者也十二時中許一時學外故於其宗悉能區別內外典籍善解論義曇無德部此云法鏡部即化他部分出也俗藝呪術為防己害兼以間邪開學不犯也其宗立五藏一律二經三論四呪五菩薩藏也華嚴經讚菩薩偈云雅思淵才文中王歌舞談說衆所欣第十四卷智論顯結集羅漢德云讀誦三藏知內外經書外道十八種大書亦盡讀知即毗伽羅吠陀論等緬覿前風聖人皆不限所知捐其小善近崇文德遠成種智熏習以成其種性昔有羅漢不識赤鹽之義外黨諸俗深以為誚舍衛城法預婆羅門常請僧食問其義能答者自與美食不能者令下人與粗惡食由是比丘皆不往其家因至佛所佛不遠有羅漢比丘法預乃問之何名赤鹽鹽有幾種比丘言我知汝是法預輕慢比丘今復惱我鹽止是鹽聞比丘語已心懷罔然來至佛所佛云此比丘未從師學故不能曉答鹽也有比丘名弗絺盧佛令往問鹽義比丘云鹽有二義一種味如大海水同一鹹味二性味者有黑鹽赤鹽辛頭鹽拔遮鹽毗攬鹽迦遮鹽私多鹽毗迦鹽略語二種若生若煮是名鹽義法預聞之歡喜而退蓋出朽宅則生死凡夫藐哉何及藐遠也聖人出於朽故火宅在生死凡夫不能及也語外事則解脫聖智或不如凡夫也但以一行一智斷惑證聖於所知未遍或不及凡夫故採棟桴於杞梓繳羽儀於鴻鵠畋文彩於虎豹則於物幾矣幾近也棟桴與杞梓近羽儀與鴻鵠近文彩與虎豹近以類求之可也繳弋射箭也索遍知於羅漢則否矣四加行位尚如暗中放箭或中或否況小聖哉昔王城野人不謂大聖智周萬物問以鄙賤芻牧之事大聖俯其事而申之牧族奇其聞踴躍而信因皆階乎道也放牛難陀以佛生王宮出家成道必不曉放牧之事豈曰遍知遂往問佛佛謂說放牛經一卷皆四時所放安養之事其族歡喜出家皆獲道果也故釋氏子內審諸己於進修之門可學而不學可知而不知結以不學無知之罪也西域所學總有五明一聲明謂詮顯文字二醫方明謂醫術卜算三工巧明謂一切伎藝四因明謂宗因喻三揩定邪正五內明謂識達因果究暢真宗也其攝拖苾馱此曰聲明則五明之一也以其廣記諸法聲教故也而彼俗典總曰毗何羯喇拏舊曰毗伽羅論也大數有五如此方之五經焉一曰悉曇章以成就吉祥為義被于創學之流也本以四十九字相承成一十八章總有一萬餘字合三百餘頌頌凡四句句以八字合三十二字傳是大自在天說此文在西天相傳今不可盡知也二蘇呾囉即素呾覽此云契經即解聲教之經也則是一切聲明之根本正經也略詮要議有一千頌是上古鴻儒波爾仙所撰其人為大自在天所護面有三目三馱覩有一千頌專顯字功如上經矣亦如上經是聲明之根本四三棄囉是荒梗義意比田隴之夫創開畎畝其有三章章各一千頌有三篇也廣顯聲韻合成字體若此方之乎側四聲為學之先也五苾栗底蘇呾囉即是蘇呾囉釋也上之四件是正經此下並解釋之者上古造釋衆矣於中妙者有十八千頌演其經本演上四經也是闍耶昳底大學士所造其人當此國之初矣武德貞觀間也凡造西土不習此者於其所學徒然哉其有苾栗底蘇呾囉議釋二十四千頌是學士鉢顛杜攞所造斯乃重顯前經解前正經也又有呵利伐㨖論二十五千頌廣敘人事聲明諸家興廢若今書史即以其人為論目也凡此諸書在異域法俗通學始為有知矣異域西國也彼方論師前則龍猛提婆馬鳴猛即龍樹也南印度梵志造智論十萬偈提婆者南印度人才超倫輩一國有大自在天金鑄高二丈以頗黎為目提婆鑿之夢神索眼以手出眼還之遂闕一目師龍猛出家為外道所殺馬鳴者師脅尊者本外道也為月氏王說法馬垂淚悲鳴又云生時諸馬盡鳴故名也中則無著天親北印度人佛滅九百年間出世僧賢清辨僧賢亦云衆賢清辨造掌珍論以芥子擊修羅窟待彌勒出問義也近則陳那護法法稱戒賢師子月安慧慧護德光戒賢唐三藏往西國猶見之也靡不具茲內外之典也馬鳴大士撰蘇遠拏太子歌詞太子好施捨男女等事并本行詩序佛成道等事并佛所行讚今在藏內也龍樹以詩代書寄南天竺國婆多婆漢那彼方之人咸皆誦詠若此方文選等也以為華而典也其有摩呾哩制咤承佛先記廣興讚詠初造四百頌次造一百五十頌無著世親西土修詞者莫不鑽仰祖習為美焉論語云鑽之彌堅仰之彌高也祖習師承也祖宗也習學也其身毒以婆羅門為上不齒餘三姓婆羅門本梵天苗裔德尊也剎帝利但貴爾故皆不及也故有四圍陀書可十萬偈一云阿由此云方命謂醫方等二云殊夜謂祭祀書也三婆麼謂禮儀十相音樂戰法諸事等也四阿達婆謂呪術等皆梵天所說也咸悉口相傳授不書皮貝七歲就師口誦學之學成為國之師也彼國相承云有學聰明法一謂覆審生智謂推求道理審覆義味也二顯字母從字生字從聲生聲也安神旬月之內思若湧泉計無此法則無以誦群言如激箭也昔者佛陀耶舍求那跋摩則其人也初耶舍至于秦將事翻譯秦人試之授以差籍藥方及諸書於三日誦畢求那所誦凡百餘萬言諸來三藏罕有不至此者華夏自燧人氏仰觀斗極以定方名伏犧民之純鈍但識其母不識其父只知蔽前不知蔽後飢則求食飽則棄餘太昊伏而化之故曰伏犧仰觀天文俯察地理以辨方物也庖犧用之而畫八卦造書契至若三墳五典八索九丘皆古之遺書三墳三皇之書五典五帝之書八索八卦之書九丘九州之志如楚倚氏之所讀者也楚靈王時左史倚相能讀三墳五典八索九丘也洎仲尼刪詩定禮樂贊易道修春秋振崩壞之俗周自幽厲之後東遷洛邑諸侯專征禮樂崩壞魯哀公十一年夫子自衛反魯十四年獲麟遂修春秋刪詩定禮正崩瓌之俗故有六經焉春秋禮記周易尚書毛詩樂章故孔子曰溫柔敦厚詩教也不學詩無以言疏通知遠書教也正王言之道廣博易良樂教也和民之情潔淨精微易教也窮理盡性恭儉莊敬禮教也安上治民屬辭比事春秋教也正褒貶之道事類相近也左氏國語左丘明以春秋事義未盡置國語以互見也馬遷史記司馬遷得罪囚蠶室因修史記以至漢武時凡一百三十卷漢魏以後皆有書志班固前漢書一百二十卷司馬彪後漢書八十卷陳壽三國志等諸國書籍極多兼乎百氏備于金馬石渠之目皆漢藏書之府又近有經籍志吳氏西齊母氏東齊皆見其目至若文章之始歌虞頌殷逮周德下衰詩人盛矣詩人之後騷宋變於風雅騷屈原宋宋玉也皆六國時人也賈馬楊班漸變乎騷賈誼司馬相如楊雄班固也逮安變乎賈馬漢獻帝時晉宋已降咸韶不接咸韶堯舜之樂齊梁之間花繪相擬沈約劉協任昉謝安等此方六書象形指事會意形聲轉注假借也定文字之所出故窮大篆則於文字之不惑也彼方六釋一持業二依主分出依士三相違四帶數分同依士五鄰近六有財也辨名題之因致故窮世語典語則於名題有得矣一切真俗世諦名題皆以六釋攝之無不辨認宗旨者也而康僧會支道林澄什安遠什門四聖生肇融睿梁僧祐周道安隋彥琮國初淨宣林概慧淨道宣法林明概靡不洞間本教該涉經史研綜詞翰咸事著述極夫匡紹者也皆貞觀譯經之高僧禮曰博聞強識而讓敦善行而不怠謂之君子僧也支遁注莊子逍遙篇希玄之賓高其致也慧淨撰英華集詩集麗藻之士美其鑒也由是表正人天折衝師律文場法苑何世曠能嘗有客聽遠公實相義往復移時彌增疑昧遠引莊子義為連類惑者乃悟自後安公時聽遠不廢俗典宋元嘉年文帝也巳日三月三也車駕臨曲水命慧觀與朝士賦詩觀即座先獻周建德年陳周弘正來聘詢謀談士曇延首應之周武帝時也大駕親臨釋奠延當席抑揚陳人敷袵稽首拜聽展衣襟作禮而聽也因構詩四十首簡延延用其韻酬和如宿誦焉彼乃圖延形像歸于陳周都長安陳都金陵晨夕向北致禮以為曇延菩薩也夫世以容詞德行難以求備之仁也難語其闕真可謂堂堂乎難與並為仁矣如子張之容子責詞顏回德行各有偏也靈裕初出家師令誦經執卷矢曰我於三藏洎儒教必望通曉無或以渝其志渝變也由是學光時彥世號裕菩薩也梁武暮年詔捨道法弘明集云梁武初崇道至天監二年捨道歸佛具有文也兼鄙儒教彼或慮人深溺不返聖人令習外典但使知之慮成耽惑溺於邪徑或正失其極將亡之數也若失其正則迷於理夫有益於生民大聖未嘗祛之儒道之教皆益於人是以吾教不必除之故經曰不壞俗諦而建立真諦彼二教仁智所行亦人天之報也如清虛寡欲仁孝忠信皆人天之行者也但報在人天為道之門階何必捨而鄙之也聖人不私己豈以己不欲而施天下乎不可以己不欲而令天下皆黜之今重名教彼猶無親疏重禮樂彼猶無君臣重律曆彼猶昧寒暑重刑法彼猶亂彛典彝常也典法也重廉讓彼猶規僭競重道德彼猶尚浮僞況加之使人後二教混沌若鳥獸人若不習二教與鳥獸何別也而欲訓之以無生乎儒道尚昧何由示之真理夫欲絢美玄黃先潔其素欲涉道德先履仁義故大聖遺法二千年而中華之人以先有孔老虛無仁智而後識精真之教回向崇奉者門門如日教之矣孝經曰非家至而日見之四夷之人非二教所覃于今猶不能齊戒而況能神遊八解之理乎八解脫觀名如內有觀外無色等也故釋教籍二教以為前驅也前導也而老教云自然者蓋真如相似之名也言萬物自然者謂自然之道與萬物為一萬物者有為事法也自然者無為真理也萬物事法與無為真理不即不離也非萬物不由因緣不言萬物不從因緣而生也稱之曰自然也今說者未達異執之徒也乃毀內教因緣之義妄發揮自然之理斯乃與西域外道同見如自然外道云誰尖棘刺畫離獸誰掘河海與川源暴風卒起還自定萬法須知皆自然豈謂迦葉之二化歟清淨法行經云老子是迦葉所化也而洙泗之門以仁為至行非道德則必先於仁矣故雖由也可使治千乘之賦諸侯之賦可使子路治之赤也可使束帶立於朝公西華可使為通使之官立朝與賓客言也楚子文無三巳之色楚令尹姓鬪名穀字烏兔三仕為令尹不喜三巳去職亦不慍舊令尹之政必告新令尹陳文子棄十乘之馬求其仁稱陳須無也時崔杼弒君文子棄四十匹馬而奔惡之也仲尼之所不與孔子皆曰不知其仁明仁道難也彼仁也者通乎百行協于一德專一之德未有不由仁而廣大者在五天稱菩薩在九州稱仁人蓋人能慈慧慈慧能仁菩薩行仁之極行君子漸得其門者矣若使梁武不由二教安得為君子儒而至於大方乎方道也若言梁武局執豈得稱君子儒而至於大道乎今為論者必張孫吳之勢孫武吳起並六國時良將各著兵書善戰陳今論義者與敵鏗鏘如孫吳之戰勢也學戒者必敦顏柳之節顏叔子孤居有少女夜風雨屋倒投之宿叔子拒之不已出屋令其入舍也柳下惠姓展名離食邑柳下諡惠寒夜婦不及國門柳下惠以衣覆之至明而去不犯男子不仁之行也栖禪者必慕巢由之高許由巢父皆堯時高士堯將禪位惡之而洗耳隱居不仕也維持者必思齊魯之變綱紀維持之者必須改更匡引如齊一變至於魯魯一變至於道也故持外教以誘掖窺內法以激志亦惡有害焉惡安也初以外教誘引後將內教訓導亦安有害也夫登木者競其高鑿泉者競其深不有前懦誰為後勇但梁氏雖至信不審觀前往存亡式恆其事式用也驟欲遷物從道以窮物之性不虞東野畢之御而終於佚矣顏回見東野畢車知其必敗以其馬未調良故也既御果輸敗而馬傷也嘗讀斷酒肉之文慈愈於佛輕身貸法事過帝王三度捨身入寺與衆為奴臣下備錢百萬贖之衆僧默許方歸雖屈身為座亦未過此何必然也且敕綾錦窠不得有鳥獸之形而嫌裁剪起殺傷之意恐傷仁恕之道斯雖得養虎之術而亦誨人殺心矣周宣王之牧正梁鴦善養虎以不與之生物為其因殺而怒也不以全物與之為碎之而怒饑飽以時達其怒心不逆其意也不使之喜喜復必怒雖欲絶之殺心而翻生其殺念者也羅綺本無殺相今強興殺想此乃從無設有亦是教人殺心之義也宗廟郊祀以麵為犧牲不為則不為何誣祖考耶而或有負之以麵作肉則成誣誑不為又負祖考也子由緇而乘不鑒妍蚩式顯誇傲題于縹墉素扆之上特不知是誘敵致寇也今有自披緇至顯榮不辨善惡空恣傲倪而又兼以捐棄上教之事題粉壁素屏之上可謂自招於槃詰昔周道安二教論隋彥琮通極論恣縱心目出沒玄奧假立賓主先設奇難後始通之將探賾異黨枳棘邪徑為法繚垣先假立異宗詰難本教然後答之預備異宗所見也而後世李仲卿等得之穿窬為盜隱其所通演其所難以製十異九迷等論誑彼所不知者皆唐朝邪見之徒誑以淺學者不見安琮之論也濟其毀詞豈非二士圖馴而反噬皆由二子著論防微反遭竊器以相攻也將安而貨危也但此論未已邪難未止夫先王以衡斗去盜而人以之于盜焉置劍者比為殺賊今賊反得以用之以兵戈止殺而人以之于殺焉故所防逾多所資逾遠噫難乎哉然守本教者朴則有餘兼異學者競則有餘非君子罔以謹其極矣若守本宗可自質朴因習異宗遂多爭競若兼異宗外學而能謙謹者司謂君子僧也故前哲云學之於身如餌如樂夫餌以醯醢鹽梅齊之使和濟其不及泄其所過而後享之五藏平矣濟益也泄減也此乃齊侯與梁丘據晏遄臺晏子對齊侯之詞也左傳第二十四文小異也樂以金石絲竹韻之使諧金鍾也石磬絲琴瑟竹簫等匏笙竽也土塤也革鼓也木柷敔也謂之八音也節其將遺剪其所淫五聲之後不容彈矣則有繁手淫聲宜剪節之也而後聽之五氣正矣五行之氣若專夫一味一音則於焉何取昔慧遠製沙門不敬論但欲自理而不毀儒道人到于今受其賜也周道安二教論忘功指過語發心鬪宇文氏窺之得卞莊子之刺虎也昔卞莊子見二虎爭食而鬪將斬之家人諫請伺其鬪大者必傷小者必死後刺之可一舉雙獲也果如其言今道安與外宗相毀皆極其瑕礫周武得以窺之而用其謀也然帝雍恃威雍周武名也帝武成三年即位至建德二年廢佛道二教至大成元年崩毀滅自癸巳至戊戌不信不甚於桓玄而桓則服周則拒桓玄將令僧拜及沙除遠公上書而止又作不拜論豈不以才識厚薄而可知也但時有不學者心智聾瞽恃其頑薄如豕如羊很戾朋從視於智藝狎而笑之以為著文字過比夫衡岱未云重也其有傭昧淺識之徒如豕如羊翻以習文字者為山嶽之過先聖以為群羊僧不甚然乎經律謂啞羊僧也復有狂狷之夫棄乎本教聊覽墳素遊衍內侮若豕負塗潔則忌之狂狷進趨不得中者也其有辭親慕道割愛為僧而不知勵己進修全棄教典專心外習吟詠風騷而於本教反生輕侮故我高德顧之忌如穢物所謂辜負先聖無利檀越沈墜三塗自貽伊咎也如宋慧琳慧休之流也二子皆江表詩僧於道德則無取者也琳詞學回拔為太祖所賞太祖劉裕每升獨榻顏延之嫉其才嘆咜不平之曰此三台之座豈可使刑餘居之乎琳怠慢自賢其師道淵者有學行文帝頗器重嘗詣傅亮宅琳先在座淵至不為禮淵色怒亮笞琳二十後著黑白論大較六度與五教並行信順與慈悲齊立其間自多傷毀何承天以為琳比丘捷生奇見也顏延之謂之居其門而伺其闕為法盜害何地可容後抵罪于交州鼓憤而卒然傅公之為罰君子哉不以己愛黨過而失刑實肅物之教也小人則不然與其臣而違君介其卑而侮尊且悅己之所利而忘於巨醜也慧休為文名冠上才嗜酒色無儀法蜀僧可朋亦然死於逆旅而尸棄郊野孝武以其污沙門行詔勒還俗補揚州文學從事患不得志終於句容令焉有僧明解者篇什琴書丹青以為絶藝視後學負笈謂之驢子顯慶年唐高宗時西明寺成詔靈潤令選有德者居之寮寀有薦解者潤公曰公等國器名臣出言不易宜求戒定慧學增長福田何容舉酒肉畫師以當洪寄解聞尤以為懟遇詔徵四科不問僧俗遂射策登第喜曰今得捨驢皮矣後筮仕無成寒餒沈疾將死覩異形十人執烈炬而迎之蓋不祥之兆也故小人之量有君子之藝未嘗不顛覆敗辱實天貽之不祥矣其猶狂象燧尾以束蘆繫象尾燒之令奔踐敵人謂之燧象也怒雞介羽季郈鄰居雞鬪季氏以金介其翼郈氏以金為距二家因以相攻致亂也祇益其害也故易曰負且乘致寇至易解卦六三爻辭也言居非其位履非其正乘二負四以容其身寇之來也自己所致矣言小人不當有盜思奪之也非獨才藝由之然而貌亦未嘗不然非其才而有其藝是以顛蹶非其才而有其貌亦致顛蹶故陽貨象孔子魯季氏家臣陽貨貌似孔子而害季氏以作亂出魯也故孔子曾至匡為匡誤圍錯認為陽虎以陽虎曾暴於匡故也項籍如帝舜項羽也舜目重瞳項羽目亦重瞳也皆文犢狀虎而終殘乃壽也今為釋不以道而但以儒學聞彼蓋斷髮一俗人耳其可令得終久乎近代雲頂山詩僧昭符毀佛輕人投江而死東川楚巒自縊而死平膺死客舍冷然凍餒赤地而卒龜符終歲瘡痍皆輕慢之士也昔晉道寶臨剃髮為詩曰方知萬里水初發濫觴源真翛然之道意也識者感其言而勵進是曰為文夫稻畦為衣陶土為器稻畦袈裟陶土瓦鉢也使人服而執之淡然無為然後以經律為繩墨以文章為潤色其能不思容服而神何福歟詩曰維鵜在梁不濡其翼彼其之子不稱其服鵜汙澤鳥也梁魚梁也今澤鳥而居梁而濡其翼者未之聞也此詩本刺曹共好用小人升之爵位但潔其衣服逍遙而已無治國之心如鵜汙在梁者也今釋子非僧行而處僧田亦爾也余嘗觀乎緇衣者讀書為文唯知有俗情而不知其他逮病喘喘然淚橫于目怨誤于昔其雖悔可追乎傷哉處布金之地受檀越之食著信施之衣惑溺墳素不事進修自倚薄才輕侮賢善篾視本教以為棄物此乃賤住比丘一旦風燭將臨可不忙乎然有抱琳琅之器炳龍象之姿高出塵世既寬且慧篤志好學開卷求於未聞務滋其美以崇其德至若觀夷叔讓國得其仁也里名勝母曾子不入得其孝也曾參至孝行次有勝母里參惡其名而不入也柳下惠援寡室得其貞也顏叔子辭鄰女得其慎也孫叔敖爵益高身益卑身為楚令尹而常謙卑也得其防惡也正考父三命循牆得其恭也正考父仲尼祖也宋君一命而俯再命而傴三命而僂循牆而走也孟之反不伐得其讓也孟之庂也魯與齊戰魯敗孟之反奔而殿將入國門國人功之策其馬曰非敢後也馬不進也不欲取其功故云得其讓也列禦寇不受鄭子陽之粟得其知難也列禦寇鄭人家貧有客言也於鄭子陽子陽遺之粟列子再拜而不受其妻望之拊心曰妾聞為有道者之妻子皆佚樂今有飢色君遺先生何不受曰君非自知以人言而遺我罪我也後子陽果及於難爰精目吐狐丘父之食得其嫉惡也爰精目乞食於狐丘父丘父下壷餐餔之精目食已曰子何為者曰我狐父之人丘也曰汝非盜也遂嘔出而死狐丘之人為盜也惡其不義也謝安喜慍不在色得其量也謝安字安石相東晉孝武帝符堅統百萬之衆攻晉安亦無懼及謝玄等破之安亦不喜可知量也王敬之徐武於焚屋得其審也武步也王元度字子敬晉右軍之子也其屋遇焚子敬衣冠從容而出也戴逵不鼓琴於王門得其耿介也耿介倜儻也戴逵戴顒兄弟二人皆善琴兩遊王氏門有請顒鼓琴顒輒鼓之請於逵逵謂使者曰逵所鼓琴非為王門之伶人也遂對使者碎其琴即二戴優劣可知也其能酌一善於身足以光於朽骨況兼之者乎君子疾沒世而名不稱焉學如不及猶恐失之也孔子謂魯哀公曰人有五儀有庸人有士人有君子人有賢人有聖人庸人者心不則慎終之規口不吐格訓之言格法也左傳云心不則德義之經曰頑口不道忠信之言曰嚚不擇賢以託其身不力行以定其志見小暗大而不知其所務從物如流而不知其所執此庸人也士人者心有所定計有所守雖不能盡道術之本必有率也率述也循也雖不遍百善之美必有處也是故智不務多必審其所知言不務多必審其所謂行不務多必審其所由智既知之言既道之行既由之則若性命形骸之不可易也富貴不足以益貧賤不足以損此士人也君子人者言必忠信而心不妄無詐妄之情也仁義在身而色無伐無自矜也思慮通明而辭不專篤行信道而自強不息油然若將可越而終不可及者此君子也油然不進之貌也越過也君子雖能為可貴可信用而不能使必貴己信己用己也是以恥不信不恥不見信恥不能不恥不見用也不誘於譽不怨誹率道而行也賢人者德不踰間間法也行中規繩言足法於天下而不傷於身道足化於百姓而不傷於本言滿天下無口過行滿天下無怨惡也富則天下無苑財長短經云苑財苑積也今有依怨天下無怨惡也謂以義得也施則天下不病貧病患也此賢人也聖人者德合天地變通無方窮萬事之始終協庶品之自然敷其大道而遂成情性明並日月化行若神下民不知其德覩者不識其鄰百姓日用而不知也此聖人也公曰善哉非子之賢則寡人不聞此言也今揆茲五儀之人為五儀之僧誠則皆不乖其本矣若使裁其尊卑勵其情操去此取彼易庸人為士君子易士君子為賢聖則天下之僧皆高僧也故斫石刻木範金之像石則石矣木則木矣金則金矣非變化則不能革其本態也而人有生而知之有學而知之但有知則不難乎遷遷庸為智遷凡為聖其所難在乎不知矣世或以槃特不學不謂無道平生唯誦半偈而得聖果偈云守口攝意身莫犯如是行者得度也善星多聞不謂立一德善星比丘本釋族聰明詐作薄俱羅鬼驚佛而生入地獄也彼乃不達槃特聖人也善星庸人也槃特不學而生知善星雖學而不知也若使槃特無生知則不聖善星有學知則遷善矣夫生而知之千載無一學而知之遍於天下若以千載之一而廢乎天下者非聖人之志也況學以資生知若金之有礪礪磨石也金性雖利更假磨之也舟之有楫楫棹類也尚書云若濟川用汝為舟楫也惟利與速物莫能加之昔仲尼云君子不可不學子路曰南山有竹不柔自直斬而用射達於犀革以此言之何學之為孔子曰括而羽之鏃而勵之其入豈不益深乎因鏃羽而彌深子路再拜曰故木以繩直土自水平王用人器未有不學而能自致奇功知道者也凡人之不學其猶牆面無所見也人而博學不出戶而知天下始吾聞之心存之躬嘗之於所不學實若蔽目於所遠知誠不由足故有生之域域涯也貴乎有學既學矣貴乎知既知矣則慕大覺之曠照成遍知之有日故日就月將猶患失之佛陀慷慨仲舒下幃恨光陰之不再也董仲舒下幃三年讀書不窺園圃佛陀如上注昔黃霸漢相也與夏侯勝同下獄霸欲從勝受經勝辭以罪當死霸曰朝聞道夕死可矣勝賢其言遂受之再更而講讀不怠也漢昭帝將議立武帝廟為世宗勝奏武帝奢侈殺戮不宜立廟遂坐謗毀先帝與黃霸同縶霸乃求從學會赦俱免也常啼求法於法勇般若經常啼菩薩也以骨骸致香花兼俟乎宮門凡七載異有所聞也於豫之眇志實學知之不足教知其困兢兢勤勤慚曠此生已下北山自敘嘗撰釋氏年志編年序事務成林藪年志三十卷又撰法華玄箋十卷二衆初學儀律新疏要決十卷識心澄觀俱舍等論鈔共百餘卷鄙野一家之言經郡邑寇亂而亡矣鄙以學無常師遂體三教參玄之旨趣裁而録之暮年神疲不盡所志而有告余者曰日月既逝老之至矣蓋釋文字乎蓋何不也釋放也余莞爾而笑莞爾笑貌曰彼不吾知也余今自欲實腹精於義何嘗計利而進度齒而廢乎齒年也夫去學而神虛焉則善有所補不則聽言譁噪無若誦言為優聽言塵俗之言也徒為喧噪誦言典雅之言聞之經濟優者勝也然法華誡其親近法華經不許親近世俗文筆外道文字華嚴責其多聞者蓋恐封乎所嗜封滯也密設其防謂不爾者彼善財童子歷抵一百一十城何為也
