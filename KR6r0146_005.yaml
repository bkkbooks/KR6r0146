body:
  text: 釋賓問第八假設賓主之問答以釋吾門之疑滯也向方士適石林之館向方士者假設若烏有先生亡是公之類膜跪造𣍿膜跪拜也穆天子傳云膜跪受之郭璞云若今胡人禮佛也述於主人曰吾之生也罹乎百憂嘗他日在異室有牢醴有琴瑟有詩書備宴好歌詠乎先王之風猶慊乎未樂今聿來高居松桂寂寥環堵虛白鄙吝之心祛矣慊恨也久居俗網每厭繁雜一來蕭寺幽虛暢然者也將幸味金仙之旨暢無生之篇佛經讚無生理飲啜法喜法華經云法喜禪悅食餐飲法味自然飽足沐浴甘露朗煩素於秋照擢華耀於春滋心顏雖懇非敢以覬如之何既沐玄風道心滋茂心貌雖有情懇請問未敢覬望如何主人曰余病廢久矣覩流世若瞑眩不悅乎厥躬説命云若藥弗瞑眩則厥疾弗瘳今我病世人廢棄已久覩流世之徒於我瞢然不相顧悅也退藏于山林居乃積蘇編茨蘇草也茨茅也衣乃弊褐麁純褐毛也純絲也論語云今也純儉食乃單盂隻豆巖流沈沈與鳧鹿為群夫何道之可觀事之可詢歟但金石之和隨拊擊之良能小大舒速或亦果應樂無善聲隨拊擊而則奏人無言對逐把問以相酬也賓降拜以謝主人許問主人避不敏避位謙也敏達也既復席賓曰漢夢未占音譯未通此方先有得聞至教者乎自漢明已前此方還有知西方有佛者無主人曰遼哉何吾之知也遼遠也向吾之知謙也但觸石之雲生於膚寸公羊傳云雲因觸石而生膚寸而合四指曰膚兩指曰寸射鮒之水負於艅艎艅艎吳王船名言射鮒小水能載大船也何期不然也昔大聖遊婆闍國其國在南海去方夏未之遠也南海去洛未過萬里微流之風何莫及斯故周穆王遇西極化人老聖稱古皇先生老子西升經云竺乾有古皇先生孔丘推西方有大聖者子云西方有大聖人不言而自理佛圖澄知臨淄石下有舊像右露盤揵陀呵見盤鴟山中有古寺基址安得不有見聞者乎此皆預有見聞者也逮漢武元狩初前漢第五主元狩年命霍去病北伐胸奴過居延擒休屠王屠音除獲金人以為大神列于甘泉宮陳香火以禮事之三年鑿昆明池漢武元狩三年減隴西上郡戍卒之半及弄法者謫之使穿昆明池西京雜記云池中刻石為魚至遇雷雨魚常鳴吼上有艛船數百戈矛照燭三輔故事云廣三百二十畝初穿得黑灰帝將以問東方朔也得黑灰問東方朔朔曰此非臣能知陛下可問西域胡道人暨張騫大夏還知有申毒國漢書張騫傳音篤即印度同山海經云身毒之民偎人而愛人郭璞注云則天竺浮圖所興之處也亦曰印度印度月名也彼月有千名茲乃一焉若此方蟾蜍桂影氷輸金盤等彼土取以為國名具臨照義也哀帝世景憲往大月氏受浮圖經月氏王使太子口授之也劉向云余遍尋群策往往見有佛經及鴻嘉之年漢成帝世撰列仙傳兩卷云吾搜檢藏書緬尋太史創造列仙圖黃帝已下六世迄于今得仙道者七百餘人向檢虛實定得一百四十六人其七十四人已見佛經矣以是而推周化為秦秦滅漢興至于永平實千年矣自此之前何不聞也答漢夢未占等也賓曰在昔菴園按地靈鷲騰光聖衆滿於虛空維摩居士以方丈室性菴園見佛釋迦説法華經於靈鷲山放光動地道場周于法界法華曾上三變土田周于法界也姬孔之典于何不載秦洛之人未嘗預會將無大聖頗歟傳者張歟佛既放光周遍法界何故京洛無有見聞之者為如大聖化有偏頗為如傳者開張虛誕乎主人曰魚潛不知乎水人陸不覩其風非可知而知居之而不知也非可見而見居之而不見也況方諸酌月非方諸則謂無月矣方諸者王充論衡云水鏡也十一月王子日夜半子時煉五方石鑄如盤盂向月得水也高誘云陰燧似大蛤熟摩拭以向月水下得數石也陽燧爍日非陽燧則謂無日乎有珠映日光以艾嵩承之則得火謂之陽燧又有以流黃等藥鑄鏡承日亦出火承月出水圓者號陽燧方者號方諸日月恆而方諸等忽闕則水火不獲如佛普現而無緣者或不覩聞也實由靈變在心而外應乎物惟心之不變者其何得耶三界唯心萬法唯識心變而覩物無虛起也禮云心不在焉視而不見聽而不聞食而不知其味故知昔信不在彼非宜聞見也昔此方人未信故或縱覩光門地動不以為意故不記也縱有抱信獨得者言之則人責之以詭妄焉衆所無緣不覩其或有緣之士獨得見聞則人必責之以怪妄豈能共信者也加乎歲序曠矣編簡漏矣而況年代綿歷書册亡墜豈能備知或周史知非中國之事故乃不書也凡為史官各記本國之事此非中國之事又君子慎疑故不書也孔聖嫌無受道之器故不語也嫌也孔子謙己無受道之器故不欲言豈以闕於史記則謂無歟夫折柱立極貫虹夾烏騰娥昏見繞樞騎尾昔女媧與共工氏爭天下頭觸不周山天柱折也又斷鼇足以立極又女媧感虹光貫日而生顓頊春秋時有雲如赤鳥夾日而飛三日又羿請不死之藥於西王母羿妻恆娥竊之以奔月中也出易略又電繞樞星而黃帝生又傳説死精神上為星同於列宿在尾宿上故云騎而覆載是一三光攸同彼西域不見不書則誠亦謂華言為不實歟若彼疑果非則此疑何是若彼信為實則此信何虛然華夏六典敦簡務要嬰於秦滅尚不備聞古之書籍本以簡要又遭暴秦焚爇往事豈得備聞乎如唐虞二世尚書但存數篇但存堯典等五篇商周盛化詩頌能餘幾什此重刑德猶有所闕況彼象外所逸而能備哉故堯師尹壽舜事務光周孔亦所不載孔丘言道見乎莊氏五經不言並出莊子老聃知禮存乎戴聖戴德字近君傳禮號大戴禮至信都太傅戴聖字次君傳禮號小戴禮以博士論石渠至九江太守向使此書煨燼則豈知二聖窮禮知道耶苦在暴秦焚盡則此豈能窮之乎賓曰蘭騰至國人追黑灰以訊之蘭云劫燒之餘灰也而實獲其事歟實是劫火灰耶主人曰言存人往焉識其心此言傳來雖存其人已無安能知彼所答之意心在於何仲尼云情欲信辨欲巧是辨也此之所答但是蘭之辨對也或亦貞而不諒也貞正也諒信也意雖正言未必執信也夫劫火所焚大地悉盡然既却復安有燼乎劫火之際大地炎輝燒至初禪然後却復豈有灰燼也是知劫火無灰也昔莊周以仲尼之智非至凶不為侮故遠取東陵寓辭見意盜跖居東陵也而蘭亦以釋氏之玄非駭耳不為變故託劫燒開闢其教人以驚聽為異故將開化以此亦權而動之蓋君子以德義為信也君子義然後信信近於義言可復也若使只言常火則曼倩豈將讓歟曼倩方朔字向若答以只言是常火則豈夫於方朔所讓乎故撫無以導實廢近以徵遠其欲化之故先權指於無而誘之廢近常火遠徵劫火使人渴聞其所新而欲誘之於善也夫渴聞則致疑致疑則必求詣理理詣則不遠而復詣實也其若虞機張省筈得于度也太甲文也幾弩牙也虞度也將發箭先度其機合發之必中若將開化導須使必歸也賓曰佛出於戎教被戎人華風為戎不亦陋哉主人曰無然之矣無然之矣君子所居尚不為陋何言聖人歟論語子欲之九夷或曰陋如之何孔子曰君子居之何陋之有君子尚爾聖人居之即化固不為陋夫皇天無親惟德是輔學無常師主善為師主親也有善則從意而從之天下之善一也安可以隄封為限哉但以利濟為心豈以封域為限故大禹姬文聖王也大禹出西羌生於石細今茂州路也周文生於邠皆戎羌由余日磾賢臣也由余戎使至秦秦築宮室由余譏之云若非鬼工則須人造也金日碑漢武時蕃人在漢宮甚賢也生不在中夏太康周幽荒君也太康夏王好田遊五子作歌以諫之十旬不返也周幽王寵褒姒以滅身也寒浞申侯悖臣也寒浞伯明氏之讒子弟也滅羿而立申侯滅周幽王也生不在四夷豈以邦域而論賢鄙哉而黃帝登崑崙老聖適流沙黃帝登崑崙山問道廣成子老子適流沙尋釋迦文也俱貴其所聞慕其所同而後往也同聲相應同道相求夫胡馬服皂皂隸養馬賤職胡樂張廷如琵琶羌笛等胡琮充府琮璧出異域未則云陋耶故希出俗之道當為背俗之儀圓頂方袍也處其儀而不欲勉其道者中才已上適恥也處無塵之地作背俗之儀不能進德修業而遑遑於財利之鄉上士顧之恥也而孔聖云不敢毀傷者蓋言為眚召害之誡也眚過也害災也孝經身體髮膚不敢毀傷蓋誡其過害也至若泰伯以斷髮為至德預讓以漆身為秉忠吳泰伯周太王之長子以幼弟季歷賢又生聖子文王昌知其必有天下遂避之適吳剪髮文身孔子以之為至德也史記趙襄子殺智伯預讓思為智伯報之襄子知令國人逐之預讓乃漆身以變形吞炭以改聲而入其國史記以為忠則斷髮變形未為不忠不孝也其能立德揚名何嘗以全髮膚之為孝也由是華夏古今知其厚益則而象之不以變形儀則英賢廢存冠服則家國興故友瑗不假簪紱季友衛遽瑗皆賢二子之賢豈因簪之致桓卯不以髠赭桓魋少正卯皆不仁豈因髠赭也何榮此辱彼哉昔趙武靈王始變胡服趙武靈王謂樓緩曰吾欲胡服曰善群臣不欲肥義侍王又告之曰吾欲胡服而恐後世將議寡人奈何義曰臣聞疑事無功疑行無名王既定負遺俗之慮治無顧天下之議矣愚者暗於成事智者見於未萌然則王何疑焉於是遂胡服也隋唐之後漸改衣冠所貴在治建為王度記事記言未見譏之者也為政貴在治民立其王度未見譏其胡服也夫仲尼非虞夏之臣而宗乎三代禮樂虞夏商也吳越非魯衛屬國而行乎姬文周公孔氏之教洎秦正新室所置百官刑政典法後世帝王多亦尋於時政因而無替正始皇新室王莽二雖無道所置百官法度或因而不改也若以二世王莽同居中夏故遞相沿襲非彼絶域者或則失於用天司牧之意也天生蒸民樹之司牧又云用天之道何限夷夏也夫一日月所照皆吾天下吾行天下之善孰則不為吾天下者乎昔楚王亡弓任楚得之仲尼云惜乎其不大也何不使人得之楚王失弓曰但不過楚人得之仲尼聞之曰惜乎何不曰人亡弓人得之但今言者皆盡稱西域為胡而實胡在蔥嶺之下三十餘國嶺西身毒國謂婆羅門國也然於其間非無雜類嵌目雕決如此方伊洛戎狄逼邇王畿故身毒極鄙胡稱今河南伊洛之間皆有戎居也然王浮化胡經云胡人凶獷故化之為佛令髠赭絶嗣夫何惑哉當春秋時赤狄白狄為列國寇讎獫狁孔熾蠻夷猾夏孔甚也猾亂也當春秋時狄伐晉魯等也如何邇而不服遠於流沙之外大荒之末方肆勇乎老子以定王時生中國自為戎狄所逼何不服之而云往天竺服彼胡人者哉又自古聖王皆遠者懷之何有陰期殄胤矯誡人道遠人不服則修文德以來之又云惟德動天無遠弗屆又無怠無荒四夷來王豈假絶其嗣胤矯為制誡者也詳夫三苗弘酷商鞅極法未甚於此者也舜時三苗之國左洞庭右彭蠡在荒服之外數千王誅不循王道也秦孝公時嬖臣景監進衛人商鞅以酷而佐秦後孝公卒惠王立發使捕之商君奔至關下欲舍客舍客人不知其是商君也曰商君之令舍人無驗者坐之商君曰嗟乎為法之弊一至此哉遂被攻裂而殺之今釋子非三苗之徒老聖非商鞅之類何至於此也而老聖言常善救物豈其然歟若爾則言與行違也賓曰違父命貽母戚輕畏就險可謂孝乎太子悉達欲出家父王不許加婇女以虞之太子半夜潛去逾城是違父命也令姨母悲泣肝腸摧裂是貽母戚也居儲副之位而獨處山谷是輕畏也在雪嶺之中是就險也如此可得名孝乎為瓶沙王師處迦毗羅族阿闍逆害琉璃攻伐既不果救可得仁乎瓶沙王則頻婆娑羅也住王舍城阿闍世王父闍王囚之以至餓死佛不能救又波斯匿之子琉璃王未利夫人生則釋種之外甥也以婢子之言乃加兵盡殺釋族佛知其宿業相對而皆不能救也調達天倫調達斛飯王之子佛之堂弟也善星至性生被黜辱死嬰塗炭可謂義乎調達善星俱陷地獄踞寶玉之床受君父之拜言大違謙色高象傲可謂禮乎懸弧未旬母后窮年罔極之禍愆莫大焉可謂福乎太子生以桑弧蓬矢懸於門也昔佛為太子生才七日而摩耶亡也夫如是其利安在欲使中國行之者也主人曰愛惡之論譽辱何定古有罪三皇而毀五帝者有譽漢陰而抑仲尼者莊子漢陰丈人抱甕入井取水以灌園子貢教之作桔橰漢陰丈人盛抑仲尼之巧偽也有強漁父而責三閭者三閭大夫屈原遭靳尚所讚懷王疑之遂貶長沙獨行江畔見漁父問之故曰舉世皆醉唯我獨醒舉世皆濁唯我獨清漁父勉之不可遂沈水而卒有劇秦法而美新室者秦始王莾法殘虐後世有揚雄著美新一篇劇秦始而美王莽討其向背壞壁穿墉為雀鼠之功矣有習古人槽柏更增穿窬以鼓是非者若王充劉子玄等唯事雌黃也禮曰大孝嚴親其次不辱其次能養嚴親謂使尊其祖考也不辱修身持行也若夫化家為國天下稱之為大化凡為聖天下孰謂之小哉故雖邇失嚴愛遐蹈山林而使天下之人知父為大聖之父知母為大聖之母既知之而尊之既尊之而安之孝子之義真曰不匱匱乏也此乃嚴親之道也詩云孝子不匱永錫爾類曾是以為不孝則孰能為之孝乎曾子曰養可能也敬為難至於犬馬皆能有養不敬何以別乎敬可能也安為難安可能也卒為難父母既沒慎行其身不遺父母惡名可謂能終也始於毗嵐終於鶴樹有善皆稱無惡可謗實謂孝之終也而大聖豈不篤其備耶若乃聖人有作不違兩曜昏旦不違四時榮落所可違者暫化而已矣化久則愆於物性恢怪詭譎生焉雖聖人不能違宿業也至若幽囚餒喪坑骸刃肌蓋酬因於往世瓶沙為無子占云山中仙人當作子遂殺之令急受生又未生更作白兔亦殺之故今被闍王幽囚而死也釋種又以宿殺摩竭大魚故也報應前緣非聖人不能使暫違之但非業理之長謝也經云假使經百劫所作業不亡因緣會遇時果報還自受夫后善播順天時也扁鵲工醫資有命也違時與命非彼所可故去形方影滅除業方報亡若使滅影留形遣報存業則巫幻作矣未經懺洗令業除謝則同巫誑妖幻之説昔者食馬麥目連請求地味阿耆違多婆羅門請佛九十日唯食馬麥劫初有地味陷在地下目連欲運通取之如來皆不許意示後世者也迦毗被圍目連請以鐵為城釋種被琉璃王所圍目連欲化鐵城以護之如來不聽以業不可逃大聖皆以業報不然之也故可為而不為不仁也不可為而不為何謂不仁乎若乃得理雖傷謂之義也失理雖存未云義也丹均薄於堯舜以其不才故薄之而不使嗣位也管蔡夷於周旦管蔡二叔流言謗周公周公不以骨肉而不誅遂殺管叔而𥻦蔡叔鄭莊克段共叔段鄭莊公之母弟也以作亂莊公克之于偃石碏屠厚石碏石厚之父厚與公子州吁弒衛桓公自立問定君於碏碏使朝陳而殺之也蓋骨肉是忍也保宗祧為事也舉其刑法以示將來使不子不弟之流是懼是厲如調達善星儻假鴻私免其罪戾則勸天下之為逆耳故呼食唾以辱之調達學神通已化作一小兒於闍王𣍿上闍王因唾其口調達承而食之故佛以此辱為食唾之人彰重苦以期之佛夜行道善星以時久欲歇遂假作薄俱羅鬼恐佛故陷地獄使臭味所同有恥且格格正也雖於骨肉似有恥辱理歸於正同族為臭味同罔有務幸于其免矣不以幸門而免之也由是聖人刑自邇而及遠不密親而間疏大權之義於焉何測若乃大禮與天地同節道德與天地同尊聖人與道德同體而君父率乎禮則尊天地尊天地則親道德親道德則敬聖人敬聖人則合天地之節廣道德之風矣非我大聖要上以求尊重蓋君父由道德而自尊重之也禮法既彰而人是俲故使形儀異俗則不異者禮敬之順道德也形儀不異俗使異俗者禮敬之則背道德也雖異者不必賢於不異不異者不必愚於異然土石之偶旌其像飾猶可敬也土木偶雕塑像也農賈之子表其服貌安不敬也四姓出家皆同釋族不以賤族而不敬也敬其不肖猶愈不敬不以凡庸而敬之猶勝不敬存夫羊而識禮魯之常禮必殺羊告朔於廟自文公後不行告朔之禮猶祭羊而已至哀公時子貢為司倉主祭廟告朔之禮因君不視朔遂兼欲廢祭羊之事夫子曰爾愛其羊我愛其禮君雖不視朔見羊猶知此禮若兼去羊則禮無所記今敬亦然市駿骨以招賢昔燕昭王將慕賢士郭隗曰請王以黃金築臺而尊於臣則四方之賢者至矣以臣不肖王尚用之況賢者乎昔有求龍馬不獲有得死馬首者上之王以千金相酬聞者皆至一月獲三龍馬請王尊臣後果有樂毅等數人而至蓋人倫之大道也故君父敬不敬在已以沙門受不受在人非大聖必欲抑君父致敬沙門必當欲坐受拜揖禮云子新冠而母拜禮記冠義云已冠而字之成人之道也見於母母拜之見於兄弟兄弟拜之成而具為禮也介胄者不拜皆不失君親之敬也況儒有不臣天子不仕諸侯者乎若巢許四皓等若乃摩耶假壽待為佛母聖既誕矣還形于天華嚴經過去未來諸佛皆以摩耶為母生佛既了遂歸于天母子有裕奚非福乎昔夏啓生而母化為石帝王世紀曰鮌納葉氏女曰修已山行見流星意感又吞意茨三年不産後破背而生禹今蜀汶山廣葉縣有地名石細乃禹母化石處又禹欲通轅山謂塗山女曰餉我聞鍾鼓聲而來禹躍石能中鼓聲女往餉見禹方化動而至嵩山下化為石女方孕啓禹曰我子石也歸破而生啓母化為石也伊尹生而母為空桑伊尹湯相生而母化為空桑豈則不祥耶故二教直辨於此生釋教統示於他生如彼二母化為桑石精魂何往聖母俯瞰日月下哀人世實則福履將之矣賓曰虐魏門誅於內信昏周不類於玄侶魏太武拓跋燾太延五年滅法有藏沙門者死周武宇文雍建德二年滅佛教玄僧也類享使統宇嗷嗷王澤竭焉始若有逞終則遄害二王初滅法似協于志尋亦終於惡疾也彼何至於此哉主人曰沴氣蒸而五義敗矣姦邪作而萬靈怒矣五行既敗百神是怒故天之所助者順也人之所助者信也匪信匪順人天合誅焉得不亡乎書云天作孽猶可逃自作孽不可逭初魏太祖太宗太祖拓跋圭太宗拓跋嗣號明帝太祖武帝長子篤於因緣之教沙門法果戒行精純開演法籍太祖詔為沙門統太宗彌加崇敬授以輔國宜城子忠信侯安城公盡辭焉帝幸其居以門狹不容輿輦詔廣之八十而卒帝親臨其喪贈老壽將軍皆旌帝之寵也趙靈公世祖即位太武皇帝初遵行之每引高德沙門與之談論四月八日輿像於廣衢帝御門臨檻散花稽顙致敬但以八歲在極訪國政於司徒崔皓皓極言莊老深蠧釋宗帝雅信重求方術士及得天師寇謙詔諸州鎮立道壇會蓋吳反於杏城關中騷擾太延五年己卯帝西伐長安後魏時都平城時沙門有種麥於寺中者御騶牧帝入寺觀馬從官窺便室有財産弓矢牧守富豪所寄藏物萬計時帝年二十四春秋方富寡於理學覩其事符於崔皓之言由是下詔焚破經像惟留臺下四寺如長安太平真君五年又下詔王公已下至於庶人有私養沙門者限其年二月十五日過期不出沙門身死容者誅一門時宗恭奉太子監國表諫刑殺沙門濫酷又非圖像之罪今宜罷其道杜諸寺門世不修奉土木丹青自然毀滅奏不行是歲太子晃師沙門玄高皓譖皆死與太子皆也七年春三月詔佛法一切蕩除沙門無少長悉坑之宗恭言雖不用猶緩宣詔命令遠近各得祕藏逃匿為計皓死於十一年間武帝彌留為閹人宗愛所害後魏初都平城姓拓跋至孝文皇帝乃遷都洛陽方改姓元氏西魏依宇文泰都長安東魏撤洛陽宮闕都鄴城也初崔寇同從駕寇爭而崔不從寇曰卿今促年壽滅門戶矣竟臨誅仍令溲其口小便也周高祖以沙門應黑讖初太祖黑泰挾魏西奔衣物旗幟盡尚黑於後沙門並著黃衣齊民尤忌而周人以為莫黑匪烏誅烏姓也莫黑匪豆誅竇姓也有衛元嵩反服蜀新繁縣人反服上狀沙汰黃冠張賓相耦耕耦對耕以墾於宗教春秋二五耦晉國帝躬受符籙天和四年己丑春三月大集三教有嘉聞者并文武二千餘人僉議興廢不克定夏四月詔司隸甄鸞詳較之五年鸞上笑道論在藏帝以彰露道法訛醜甚矣俾燎之道安獻二教論帝謀稍寢至建德三年夏五月資二教相毀其計復行釋李同棄於芻狗芻狗草作狗也老子道經以萬物為芻狗也坑像誅人不可聞也六年春周師克齊自以為滅教之祐建德六年正月十九日平北齊得秦制傳玉璽方四寸文曰受命于天既壽永昌得州五十五郡一百六十一縣三百八十五戶三百萬二千五百二十八口三千萬二千八百八十六二月師還七年改元曰宣政是歲不及嘗而崩於雲陽也嘗秋祭也六月帝崩太子贇立日宣帝改元宣政又改大成大象年荒淫酒色入市人稅各一錢尋立太子為帝自稱天元皇帝夫貪夫重利何顧於君親如商臣蒯瞶無避惡也商臣楚成王太子也弒父仍加惡諡父目不瞑改諡為成乃瞑受唅蒯瞶衛靈公太子欲殺母南子不捷遂奔公薨乃立蒯瞶之子輒父子相攻爭國出入相殺豈避於惡名也拓跋以譖言而殺元子太子晃為宗愛譖云淫于內帝怒晃懼誅將謀逆帝乃詐死使召太子至以鐵籠罩之撻三百遂殺之擲棘中常侍宗愛尋害帝宇文以猜忌而害家宰晉公宇文護為太宰執政帝疑忌之建德元年三月帝自以簡擊殺之於宮內帝自總萬機彼尚鯨鯢於骨肉而豈能仁恕於道德乎鯨鯢之魚大而好鬪故今三尺童子無不抵掌太息於其事也抵掌擊手掌而談説也哀彼二武不得為鬼何厚顏於祖考乎賓曰魏靈太后造浮圖罄億兆之産屹若造化人實保之天若棄之故一朝為災煙焰赩乎九垓蒸焦貫於重垠未喻天意可得辨乎主人曰夫物以合度為德失度為孽為德則常為孽則亡胡氏孽矣過於大壯故也豈神鬼之庸蓋人力也其高千尺其層有九剎上金瓶容二十五斛金承露盤一十一重四角鐵鎖四道引剎並垂金鐸如一斛器四面各有三門間以六窗朱扉鏤鐶繡柱金鋪秋風朗夜熠爚耀空鏗鏘之響聞十餘里延袤博敞登降崢嶸居閻浮提為第一也易曰古者穴居而野處後世聖人易之以宮室上棟下宇以待風雨蓋取諸大壯未有違謙越禮能其壯者也雖盛則極矣而南有強鄰中分日月時太后居洛陽武金陵國有姦臣求主之瘼謂爾朱榮之類金玉既竭物役亦苦其後爾朱乘釁震動瀍洛河橋之下衣冠葬於魚鱉矣太后不修德政爾朱榮等抗表云今海內皆言先帝為鴆毒所害奉未言之兒以臨四海榮乃率衆渡河遂至洛陽使騎拘太后及少主等並沈于河昔後趙尚書張離張良各起一大塔佛圖澄謂之曰事佛在於清淨無欲慈矜為心檀越宣奉大法貪吝未已畋獵無度積聚無窮方受見世之罪何福報之可希耶離等後並被誅惟人心無寄故託塔像以辨理詣則宜見聖人慈恕之心矣若外伐佞善內祕殘虐必業害所鍾非聖力而能黨之也且大聖割肌塗膚等情無二如來有三平等一左以旃檀塗右以利刀割中一人非塗非割如來於此三人心皆平等曷可以一塔而與其非善乎故為善者當以善至善不可以非善至善書云牝雞無晨牝雞之晨惟家之索荒哉胡后索元氏之家矣牧誓文也以婦人知國政喻母雞代雄雞鳴則人家當蕭索也喻胡后知政雖欲樹不世之功而實營家之不造焉後魏靈太后胡氏宣武之后孝明之母也曰胡充華尊為皇后孝明幼太后臨朝稱制淫亂于朝命侍臣射不能者罰之自射針孔中之大悅大臣宣淫有揚白花者有才貌后逼之白花懼禍及乃奔梁太后追思不已令文士作歌詞日夜令宮人連唱踏聲甚悽切矣黃門侍郎元順諫之明帝崩后臨朝書曰黍非馨明德惟馨易曰東鄰殺牛不如西鄰之禴祭言鬼神享于克誠而況聖人乎或有謂不道之財為善猶愈於濟惡不宜顯貶者彼乃阿利容非輕本重末之士也夫沙門貯販為像律家不禮不重非道也狐丘盜財為食義士却吐袁精目者嘗飢於道狐丘之見而餉之因問子何人也曰我狐丘之憫子飢竊父飯以餉子也曰吾義士也不食子無義之食遂兩手據地嘔之而死矣出列子也禮曰父母既沒必求仁者之粟以祀之此之謂禮是知財由不義不為福也若使誠如所論蓋小人於不道中自辨優劣其由賞凶酗之子以不繼父為德不紹父凶酗為德胠篋之盜以能行仁義為賢鬼谷子曰胠篋探囊胠旁也從傍開取物為胠也非是昭犬典之流訓也賓曰梁武盡志弘宣名冠宇宙宜天勳遐統降天永命何分崩離析骨肉相殘非畢世而有裕乎梁武帝蕭衍受齊禪志崇佛教宗廟素食身披法服捨身入寺臣下具錢贖歸至侯景作逆石頭城陷憤悶而崩簡文孝元並皆遇害也主人曰曆數在天知微在聖而賢者猶其昧之況謏才之所宜言乎謏寡薄也大統蕭氏膺大寶之位行聖人之教或不見聖人之心遠矣夫服文彩帶利劍負扆以臨群后何必損已為臺隸乎臺隸賤者又作皂隸通必若厭黃屋齊卑宮齊好也胡不歷有德而高讓履金繩而不返胡何也祇園以金繩界地豈俟君臣之請歟梁武居萬乘之尊三度捨身沒常住以供賤隸朝臣以錢一萬意贖之遂還楊朱云唐堯偽讓以享福夷齊真讓而致餒況梁氏兼亡於真偽乎雖四十五年江表無事而政刑襄缺禮樂崩弛征徭不減鰥寡無告君倡臣和父倡子和自謂無為致理高談治國遂使侯景伺隙憑天作威既喪其身亦棄其族上九在元安得無悔易乾卦上九辭六亢龍有悔處上位之極為言知進不知退知存不知亡知得而不知喪也太清元年侯景反於壽春遂濟江圍臺城陳帝之十失援軍莫有鬪志遂陷臺城景自為丞相帝憂憤成病口苦索蜜不得荷荷而卒年八十六宋文帝謂求那跋摩曰弟子常欲齊戒不殺迫以身徇於物不獲從志法師何以教之跋摩曰帝王與匹夫所修各異匹夫身賤名劣言令不威若不克己苦躬將何為用帝王以四海為家萬民為子出一嘉言士女以悅布一善政人神以和固當刑不夭命役無勞力則使風雨順時寒暖應節百穀滋繁桑麻鬱茂如此持齊齊亦大矣如此不殺德亦衆矣清潔為齊防非為戒寧在闕半日之餐全一禽之命然後方為弘濟耶帝撫几曰法師所言真謂開悟人心明達物理可謂談於人天之際矣懿哉若人非獨誘進於真門抑亦俾興於王化而齊之與戒雖天子至庶人達其至理猶五孝不同其經也天子以博愛廣敬為孝諸侯以不驕謹法為孝卿大夫以遵法約禮為孝士以愛父同君為孝庶人以謹身養親為孝聞一以知二者其在宋文乎文帝名義隆宋高祖第三子即位改元元嘉有文武之才蘊寬明之德勤苦節儉在位三十年向使梁武納大麓難庶官順考古慎厥終麓録也謂親萬機選任衆官惟難得人順稽古帝道而行之敬慎其終也所謂安必思危治不忘亂之道也省乎前言而或不及於此難也若梁武常省前言恐不及侯氏之難其太子綱簡文也帝第三子綸卲陵王也紀益州刺史武陵王也宗室諸王亟弄文墨請帝自講敕答曰汝等未達稼穡之艱難安知天下之負重庸主少君所以繼踵顛覆皆由安不思危況復未安者耶殷鑒不遠在於前世吾今所行雖異曩日但知講説不憂國事則與彼人異術同亡耳術道路也而前後纍請帝亦纍拒但年高氣昏精華已竭家有佞父之子朝無匪躬之士前否後允卒如所言如異術同亡之言暨侯景作亂帝崩之後景立簡文尋幽之於永福省以絶人望景尋弒之及王僧辨破侯景立孝元帝後魏兵至城陷被擒仍賦詩為土囊殞之前梁四主國歸陳後梁三主國入隋賓曰一人失馭已塞天譴百工周行何咎預難致使死者股荷首倚而日繼之乎主人曰是何言歟夫君辱臣死況君死耶凡帝天下者以任忠良為聖忠良以衛社為賢故文武之臣進思盡忠退思補過雖當時應金陵之氣偶時雍之運台袞不聞於廟算征帥匪思於取勝是以尸素之門各各以文章自衒沈約何尚之顏延年等如法寶聯璧形神滅論并答佛性二諦難等君罔其威臣與害鄰罔無也害侯景綢繆苑囿物役非任莊氏云庖人雖不治庖尸祝豈可越於樽俎耶昔陳平不對於廩粟文帝問周勃天下粟廩多少庫藏錢物出入日有多少周勃流汗而不能對問陳平平云廩庫之事各有司存宰相但調陰陽而已邴吉但問於牛喘丙吉字少卿北海人漢宣帝時為相見喘牛問之來近遠若近則是陰陽失度故為王者當為於無為天子垂衣裳而端拱冕旒黈纊而已此即無為也不以己能於有為不以己能於無為不使君為於無為也臣不能執政使君自主之也由是燎原之火焯厥無赦書云惡之易也若火之燎于原不可向邇其由可撲滅乎脫輻輿尸易小畜卦九二辭也輿脫輻師卦六五爻辭云弟子輿尸何嗟及矣詩曰靖恭爾位正直是與神之聽之式穀以汝詩小雅靖治也爾汝也式用也穀祿也言敬治汝職位政事正直之人乃與為倫神聽汝之所為用福與汝彼不與直式穀何望焉賓曰憍陳如弊服五錢須菩提華房百寶俱聖人也憍陳如亦云憍陳那則五俱倫也不求華飾耳須菩提出家之後久不得道果佛問阿難阿難云闕於寶玩之具故也佛令阿難為置阿難無寶具佛令王宮借之布於房內即得解脫證阿羅漢果衡嶽終身一衲南嶽惠思也玄景每曙更衣高僧玄景每日必換新衣經於身則以施人俱高僧也將修于已四者何先主人曰善乎善者無不善不善乎善者無可善故此四者克不克在于我可不可不在乎物能修不能修在於人非由乎外物也何則夫貧則獨善其身富則博施廣濟奢則務禮儉則近仁是賢智也貧則隕穫富則家食大畜卦文也大畜之實以之養賢命賢者不家食也奢則僭逸不遜故也若季氏等儉則固陋如晏嬰儉不合禮皆為固陋也是愚鄙也故聖不隔於貧富處貧富俱為聖人賢不隔於奢儉處奢儉俱為高僧古人言儉德之恭也侈惡之大也而實不德不儉惡盈而侈誠為禍胎安不忌歟易曰豐其屋蔀其家窺其戶閴其無人三歲不覿凶蔀覆障也易豐卦上六爻辭也其意云無德而祿身之災也三年必受其殃故云閴其無人也但繒纊皮革聖慈所許今有行之則為寡德反之則為合道是惑也以著絲綿者為寡德以屏棄為合道殊不知如來有開遮之道以俗情堅執也其有務自苦節麻艾充軀高靜其業茲可尚也若矯行沽名服輕緆曳纖絇沽賣也矯誑也緆細布也本無道德詐見孤節以細布為衣以黲布作襪何儉之有誠則侈靡傷財孰為廉士夫服者心行之表得其儀則鮮辱寡過違其義則啓姦納害故禮云君子居縗絰則有哀色居端冕則有敬色居介胄則有不可辱色方茲沙門居稻畦則當有虛靜之色稻畦袈裟也佛見水田指示阿難言我弟子當割截為衣如此水田有出生之義可以生於福田也虛者道也故所服在乎道不必抑以皮纊而舉氈紵獎人務詐矣若專獎布紵則詭詐者務於矯飾也梁沈約以沙門食肉小教雖容而後教塞違蠶綿之理則何不然但教來遺闕非所可也遂撰究竟慈悲論廣申其例然慮沈説非也沈約字休文吳興武康人流寓孤貧篤志好學晝夜不捨母恐其勞常減油滅火及佐梁武龍飛纍遷尚書久居端揆有志臺司帝終不用致書徐勉勉為言於帝但加鼓吹而已約性不飲酒少嗜欲左目重瞳子腰有紫志聚書二萬卷為丹陽尹侍中卒官著晉宋齊等書雖欲廣顯其特見而聖人之意或則不然夫因患制戒去損就益食肉之過凶而無謀涅槃經云食肉之人衆生遠離楞嚴云是諸佛怨斷大慈種一切鬼神夜臥舐其脣吻福德日消仁智猶鄙況聖人乎孟子曰是以君子之於禽獸也見其生不忍見其死聞其聲不忍食其肉是以不近庖厨綈革資形儀服修潔世人未嘗譏之故馬勝比丘以威儀攝衆也聖人由其美之故經云懸繒幡蓋又云柔軟繒纊以為絪褥法華經若酌以今所未斷由經未至者而涅槃許有憍奢耶衣謂赤色好衣也又名衣上服價直千萬施佛及僧何為不備哉但蕭陳之世人過乎信法教滋彰嘗讀齊太子并梁陳書屢捨袞冕乘輿寶玉為諸經懺秉筆流辭以菩薩行願為童戲也方於周魏則愈求於風教則病矣賓曰法雲馳騖吊慶譏者謂之侫靈裕儉陋布褐時議謂之矯法雲者周處之後丁母憂毀瘠過禮纍曰不食殆不勝喪僧旻諫之曰聖人制禮賢者俯就不賢者企及毀不滅性尚出儒書況佛有旨近奉色養遠發菩提況恩愛之賊不可寬放乃割哀情微進粥食靈裕以周滅法乃潛形世瓌衣斬縗三升之布頭絰麻帶如喪考妣誓得佛法更始方襲舊儀夫如是德行安得不偷乎偷薄也主人曰書云與人無求備禮云以義度人則難為人不可求備也以人望人則賢者可知已矣以賢望不賢則知勝劣也夫以法服趑趄為法則辱已不為法則兼辱法為數為衆趨塵猶可庶幾非此則為辱也但大士或以理通為美違教順理亦可行也然教有權實矣故黃裳元吉信在內也坤卦六五辭也黃中正之色也裳下之飾也坤為臣道盡美於下任夫文理垂黃裳以獲元吉如法雲等為法趨塵也晉文公譎而不正非不霸也文公重耳也復晉之後大霸諸侯將朝周自嫌強盛遂召王使出而行覲禮夫子云以臣召君不可訓故春秋改云天王狩于河陽也是為譎而不正也如雲者豈得不為高僧乎其人天縱英敏挺生于世感通靈瑞身死言立實為法之祥也雲母吳氏生雲日見祥雲滿空故名之為法雲住義興莊嚴寺講法華淨名等經如疾風應變時人謂之幻法師然方彼遠公影不出山迹不入俗迎送不過虎溪慧熙莓苔一徑三十餘載端坐榻心兩頭塵合固則忝矣蜀空惠寺僧慧熙成都人幼好篇詠因與大石寺沙彌道徵連唱詩章遂成言隙乃回意栖心禪觀及具受乃遍習經律究三論夜宿本房但坐床心兩頭塵合自餘房地唯有一蹤餘並莓苔也靈裕曰吾縱矯世為善猶愈於直心為惡斯則言興於古人繼之在裕矣夫管晏皆為賢大夫也管僣晏陋前禮卒同譏之管仲齊大夫夷吾也娶三國九女官事不攝以樹屏塞門及置反坫皆為僣也然相桓公九合諸侯尊獎王室責楚苞茅故稱賢也晏嬰齊大夫性儉豚肩不掩豆之類然相景公一言省刑等皆得稱賢也但幾其儉曾子曰國奢示人以儉國儉示人以禮晏子之然也齊景公有馬千駟死之日民無德而稱焉故晏子示之以儉但沈潛者不盡得魚龍之變處陸者不盡得飛走之功物象不可以盡窮其性也豈衣縫掖則盡孔門之學縫掖大袖雖稱儒士實昧典墳徒號書生安知稽古冠芙蓉則盡老聖之風俾貪命米豈尚清虛唯讀竈經寧窮道德執鐶杖則盡釋氏之道只憑一毳便過浮生不勵進修安知討習而則有揭其短長望崖而信望崖而沮沮未必喪其賢信未必得其人唯人難知自知亦難且仲尼採數千年賢智所行之事為禮樂使一士百年之內行之固不究也仲尼以天縱之才生魯襄公二十二年十八歲往西周問禮門徒三千達者七十二魯哀公十一年自衛返魯修春秋述易道刪詩書定禮樂而古之賢哲明窮一經鬚鬢皓首莫得其涯也故云仰之彌高鑽之彌堅況善惡不相遠攻一是則亦一非隨焉故陳司敗以諱國惡為黨陳司敗問夫子昭公知禮乎子曰知禮曰君娶於吳為同姓豈知禮司敗曰吾聞君子不黨君子亦有黨乎以諱國惡為是黨君知禮非也若不黨為是則彰國惡為非也季康子以問晝寢為忤而忠不必恭恭不必孝孝不必義今釋氏子統億世所行之善而欲使一身一世行之固不可也遂有智而無節有慧解而無節操也質而篤道撲鈍而純直者勤體被物尚行專已但可嘉其所能矜其所不能非構廈則𭫲梠期之𭫲椽也梠桷端連綿木將無廢也雖非梁棟之才亦可小用也驥稱其德不稱其力鳳稱其瑞不稱其鷙夫何備哉鷙搏擊也賓曰虐周之際靜靄剖心靄諫周武極言抗旨不遂乃入山遍割身肉以腸桂樹剖心而卒卒後骨坐不侄靈裕縗絰慧遠奔喪北遠也奔竄山林避道喪也普曠簪笏曠樊川郿人值周武沙汰置通道觀選俊才三百學士曠應召仍剃髮帽以烏紗斷決如流至教興出家也孰為賢乎主人曰彼各任其能也靜靄以不克荷負殺身動俗雖無當時之益而實彰君之罪也其若尸諫謀與後悔懷沙之恨不其怨乎衛靈公常寵彌子瑕史鰌數諫不納及死令家人陳尸於窗下君必臨喪若問云大夫生欲進蘧伯玉退彌子瑕不遂所以死不成喪君果問遂納其事令遷尸於堂位屈原諫楚懷王不納遂懷沙沈汨羅江而死靄事同之也靈裕以吾教運鍾百六百六四千六百一十七歲為一元一百六歲曰陽九之厄出文選三國名臣讚苴杖而斬若喪考妣之服無喪而服去國而亡故也建德二年癸巳滅法甲午興丁酉君薨辛丑國滅也慧遠法嗣在已避世圖存數不終否必授以泰但己存而法亡於我如不亡也教興重演故也普曠以哀樂俯仰與時推移為鳶能天為魚能淵晦恥和光潛伺興替貌雖改而氣不可奪也古者殷亡而三人異志仲尼皆曰仁乎微子啓紂庶兄先奔周以存宗廟之計箕子紂之諸父囚國佯狂比干諫而剖心雖殊行而同稱仁賓曰萬德歸仁仁無不死為無為者俟河之清修行期道何年乃證曷若咀味靈英浸澤雲腴輕舉神丹下可躋年高者上升免為一函之腐骨實長生之良算也今而何謂端居待化歟主人曰長生由乎仙骨仙骨者吾教謂之宿植德本自非纍世陶冶塵滓修鍊精魂寧可率由枯蕪燋石而詎能度世耶故長桑漸乎仙階扁鵲救世為名莊周遷於桐柏蓋功未備而不登于雲天克遐其壽矣若階由宿學何不志於釋氏乎夫黃帝乘蒼龍列子之御風王喬之飛舄軒轅乘龍仙於鼎湖列御寇乘風而行出莊子王喬為葉令化舄為鳧而乘之也彼宿有仙骨焉於其人也猶介之有龜羽之有鶴宿稟氣運之所壽也非龜之介非鶴之羽雖同其族莫得其方也如黿鼉之屬又如衆禽之類若使效而得成者仲尼之門德行之儔生無不貴知無不博何不精意求之變化以克永世乎周穆乘八駿會王母於瑤池可不求長生羽化之藥秦皇方士往蓬萊採藥竟死沙丘漢武好道求仙竟歸蒿里燕昭方士有幾存乎惑慕者衆矣得者誰矣歷於所獲不多於所喪矣夫老聃含粹孕靈立五千文治于家國道味凝乎太和至德含乎太虛故能壽能少以隱以顯至若駕螭鸞挾日月磅礴宇宙出入死生假彼神用以彰道德非謂不撤腥肥不潔心慮但由克意草木而能駐彼爽口腐腸之性命者也故老聖云孔德之容惟道是從孔甚也從順也言甚有容德之人所行唯以虛極之道是順也夫師以德義為本疑遊覆以張其末其或本之病矣末奚以為德行為本伎藝為末而吾教雖有神仙五通之化皆由定力而後乃成矣晉單道開服松脂吞細石能日行七百里而不能過百年之壽高僧單道開好道常餐松脂竟歸無常梁慧約餌松木凡三十餘年年近于期頤亦高僧禮記期頤百歲也長生之道未有聞也但世途好修惡短惑惑然不自決吾教以去殺施食為長壽因胡不遵歟世途好堅惡朽惑惑然不自決吾教以除難授法為不壞因胡不勉歟至若以凡世言之處萬載若旦暮同盡者也夫新新之運未嘗不為物就化修者君此世之化短者先後世之化與不化奚異焉莊生云生者死之悲死者生之悲也故古之達者安時而處順哀樂之所不能入矣孟孫問於楊朱曰有人於此愛生貴身以祈不死可乎曰理無久生夫生非貴所能存身非愛所能厚且久生奚為五情好惡古猶今也四體安危古猶今也世事苦樂古猶今也變易治亂古猶今也既聞之矣既見之矣既遍之矣百年猶厭其多況久生之苦乎居世若不進道修行長生亦奚以為賓曰子貢問於孔子曰死人有知乎子曰吾欲言有知將恐孝子順孫妨生以送死吾欲言無知將恐不孝之子孫棄其親而不葬賜欲知有知與無知非今之急後當自知之矣出家語也仲獻子曰仲獻子仲孫蔑也夏后氏用盟器示民無知也殷人用祭器示民有知也周人兼用之示民有疑也因緣之經將必極焉此乃三世因緣之事儒教未明故有茲問也主人曰死者形謝而精神有往綿續五道輪復無窮以無明發行支感愛取潤見在十支因未來二支果輪回無已此以彼生為死彼以此死為生也南華文也死有生是生有死也生有生則死有死也故為鬼則有知是死不為鬼則無知也而鬼有小大焉大則知大小則知小至若嶽瀆社為綱為紀大焉在簷霤在戶竈為罔為蜲蛇小焉季路問事鬼神仲尼亦所未答但云未能事人焉能事鬼以其冥道幽昧慮益生人之惑矣宋何承天云生必有死形斃神散猶春榮秋落四時代換奚有更受形哉詩曰三后在天言精靈之升遐也神滅論也顏延之讓曰若精靈必果異乎草木則受形之論無乃更資將由三后萃善報在生天若徒有精靈尚無體狀未知在天當何憑以立也梁范縝形神滅論云宗廟祭饗周孔之道以敬也申生伯有恢怪之妖也狐突往曲沃見申生使之御云夷吾對余無禮余得請於帝當以晉卑秦言訖而滅後惠公果為秦獲鄭殺伯有後忽介甲而見也雖人間有鬼自是天地之一物如人畜類非死者而為之也當時詔百官精詳曉諭其人愚反非聖人之法不可教也易曰仰以觀於天文俯以察於地理是知幽明之故原始反終是故知死生之説精氣為物遊魂為變是故知鬼神之情狀斯言所謂至矣哉文子稱黃帝之形有𮮈而神不化以不化之化乘變無窮延陵季子適于齊長子死葬於嬴博之間嬴博齊地太山縣也其坎深不至泉殮以時服曰骨肉歸于土命也若魂氣為變無所不之仲尼賢之也莊子將死弟子欲厚葬莊子曰吾以天地為棺椁日月為連壁星辰為珠璣萬物為資送吾葬具不備耶何以加其弟子曰吾恐烏鳶之食夫子也莊子曰在上為烏鳶食在下為螻蟻食奪彼與此何其偏耶
